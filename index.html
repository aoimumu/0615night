var VOLUMES = [
  {title:'第一卷 静流咖啡店',content:'# 第一卷 静流咖啡店\n\n四月，东京。\n\n樱前线刚过，世田谷区的街道上还残留着几分凉意。路上的行人裹着薄外套，步伐匆匆。唯有道旁的樱树，枝头已是一片沉沉的墨绿，像是把盛极一时的粉白全数吞进了叶脉里。\n\n桜井瞬推开「静流」的玻璃门时，门铃发出了一声清脆的响。\n\n他习惯性地扫了一眼店内。\n\n靠窗的老位置空着。角落里坐着一对低声交谈的情侣，吧台前有个埋头敲笔记本电脑的中年男人。店内弥漫着浅烘焙豆子的香气，混着一点肉桂粉的甜。背景音乐是他认不出的爵士乐。\n\n「いらっしゃいませ——」\n\n熟悉的女店主冲他微笑。瞬微微点头，径直走向靠窗的双人桌。\n\n他从包里抽出那本翻了一半的《存在与时间》，再把耳机塞进耳朵。马勒的第二交响曲缓缓流淌开来——第一乐章，葬礼进行曲。他翻到夹着书签的那一页，纸张泛出一点旧书店特有的霉味。\n\n这是他每周三下午的固定仪式。三小时的咖啡店时光。美式咖啡，不加糖。\n\n「请问——」\n\n一个声音穿透了马勒。\n\n瞬抬起头，摘下一边耳机。\n\n站在他面前的，是一个女孩。\n\n她穿着米白色的针织开衫，里面是淡粉色的内搭，背着一个帆布包。头发在脑后扎成松松的马尾，几缕碎发垂在耳边。她的眼睛很亮，像四月晴空下的樱花——不，樱花已经谢了，应该更像五月的杜鹃。\n\n「这里可以坐吗？」她指了指他对面的空位，语气里的歉意和不好意思恰到好处，「其他位置都满了。」\n\n瞬环顾四周。她说得对——刚才那对情侣不知什么时候走了，但新来了三组客人，把剩下的空位全占了。\n\n「请便。」\n\n他重新戴上耳机。\n\n女孩在他对面坐下，先是把帆布包放在旁边的椅子上，然后从包里掏出了——菜单。不，准确地说，是从包里掏出了手机，打开了她保存在备忘录里的、这家店的所有推荐菜品清单。\n\n她的表情变化让瞬忍不住多看了一眼。那种皱眉认真研究的样子，像是在解一道极其复杂的数学题。\n\n「那个——」\n\n她又开口了。\n\n瞬再次摘下耳机。\n\n「请问你平时来这家店吗？有什么推荐的？」\n\n这个问题让瞬愣了一下。不是因为问题本身有多难，而是因为——作为一个每周都来的人，他在这家店只点过美式咖啡。\n\n「……美式咖啡。」\n\n「诶？」\n\n「我只点美式咖啡。」\n\n女孩眨了眨眼，然后「噗」地笑出声来。\n\n「来咖啡店只点美式咖啡的人，居然还每周都来——你是来喝咖啡的，还是来蹭WiFi的？」\n\n瞬沉默了一秒。\n\n「至少我不是来记备忘录的。」\n\n女孩的笑容僵了一下。\n\n「你偷看我手机？」\n\n「你举得那么高，看不到反而比较难。」\n\n她的脸颊微微鼓起。是那种既被说中又不服气的表情。\n\n「我叫高橋陽菜。」她忽然正色，伸出手来，「東都大学文学部二年级。」\n\n瞬看着那只伸过来的手，过了大约两秒，才伸手握了一下。她的指尖有点凉，可能是因为刚从外面进来的缘故。\n\n「桜井瞬。同校，同级。」\n\n「诶——」\n\n陽菜收回了手，但眼睛一下子睁大了。\n\n「等等，你是……文学部？不会吧，我也是。你是哪个班的？」\n\n「二年C组。」\n\n「骗人——」\n\n陽菜的声音骤然拔高了半度，随即意识到自己在安静的咖啡店里，又猛地捂住嘴。她身体前倾，压低声音：\n\n「我也是二年C组的。」\n\n瞬沉默地看着她。\n\n在她脸上，他读出了三种情绪的交织：惊讶、困惑，以及一种微妙的……挫败感？\n\n他不知道的是，高橋陽菜这个人，自认为认人的能力很强。开学两周，她已经记住了班里大多数人的脸和名字。但眼前这个人——桜井瞬——在她的记忆库里完全检索不到。\n\n「你确定你真的是二年C组的？」她狐疑地打量着他，「该不会是在骗我吧。」\n\n「要不要看学生证？」\n\n「……不必了。」陽菜向后靠回椅背，「不过，你存在感也太低了吧？我们开学两周了耶。」\n\n「因为没必要被注意到。」\n\n他说这句话的时候语气很平淡，像是在陈述一个再普通不过的事实。但陽菜听着，却觉得这句话里藏着某种微妙的距离感。\n\n这个人，有点奇怪。\n\n这是陽菜对瞬的第一印象。\n\n她很快就把注意力转回了菜单上。最终，她点了一份春季限定的樱花芝士蛋糕、一杯抹茶拿铁、一份焦糖布丁——老板说可以外带——以及，在她犹豫要不要再点一份三明治的时候，被瞬打断了。\n\n「你是来吃饭的？」\n\n「美食鉴赏。」她纠正道，「这是我的爱好。」\n\n「点这么多，你的胃不抗议吗？」\n\n「我的胃和我的感情一样——很包容的。」\n\n瞬沉默了一秒。\n\n「那你一定很缺朋友。」\n\n陽菜正要反驳，忽然想起今天约她来的人——山下，说好了要一起尝新品，结果临时说「男朋友突然找她」。\n\n她确实是被放鸽子了。\n\n「……今天例外。」她的语气软下来，「本来朋友一起来的。」\n\n瞬没有追问。\n\n他只是重新戴上耳机，翻开了那本书。\n\n陽菜看着他低头读书的样子，忽然觉得这个人很像一本合上的书——封面朴素，书脊上没有烫金的标题，放在书架上你永远不会多看一眼。但翻开之后，也许每一页都写满了意料之外的句子。\n\n她舀了一口樱花芝士蛋糕。\n\n好吃。\n\n窗外，四月的阳光透过玻璃洒进来，在木桌面上切出一道明亮的分界线。瞬的书页被照得有些发白，但他没有变换坐姿。陽菜则恰好坐在阳光照不到的那一侧。\n\n很久以后，陽菜想起这个下午的时候，会觉得自己当初真是个笨蛋。\n\n为什么没有注意到呢——那个时候，阳光没有照到她身上。那是命运的暗示。\n\n但此刻，她只是在仔细品尝每一口蛋糕，偶尔偷偷观察对面的人翻书的动作。他翻页时习惯用食指轻轻摩挲书页的边缘，然后才翻过去。那是爱书人才有的小动作。\n\n她注意到他的耳机线的颜色——深灰色，和他深灰色的卫衣几乎一模一样。这个人，好像很喜欢把自己藏在不起眼的颜色里。\n\n「你在看什么书？」\n\n她忍不住问。\n\n瞬第三次摘下耳机。\n\n「海德格尔。」\n\n「……讲什么的？」\n\n「存在。」\n\n「存在？」陽菜歪了歪头，「那——结论是什么？」\n\n瞬看着她。\n\n「人类是『向死而生的存在』。」\n\n陽菜的手停住了。她的叉子插在蛋糕上，没有拔出来。\n\n「好沉重啊。」她轻声说。\n\n「哲学就是这样。」\n\n「我是说，」陽菜抬起头，认真地注视着他，「你在咖啡馆看这种书，不觉得太沉重了吗？」\n\n瞬没有立刻回答。\n\n他低头看着翻开的书页，看着那些德文单词和日文注释交织在一起的铅字。然后他抬起眼，望向陽菜。\n\n「那你觉得应该看什么？」\n\n「漫画啊。」陽菜毫不犹豫地说，「少女漫画。或者，嗯——」她想了想，「轻松一点的小说。比如最近很火的那个，《命运》什么来着——」\n\n「《命运石之门》。」\n\n「对对对！就是那个！」陽菜眼睛一亮，「你看过？」\n\n「游戏玩过。」\n\n「诶——你居然玩游戏。」\n\n「我对游戏的兴趣比对人的兴趣大。」\n\n「因为游戏里的人物不会坐到你对面打扰你看书？」\n\n瞬的嘴角动了一下。\n\n那是非常微小的幅度，如果不是陽菜刚好盯着他的脸，根本不会注意到。\n\n「原来你会笑啊。」\n\n瞬立刻恢复了面无表情。\n\n「没有。」\n\n「明明笑了。」\n\n「面部肌肉痉挛。」\n\n「嘴硬。」\n\n「彼此彼此。」\n\n陽菜发现自己说不出话来了——不是因为生气，而是因为一种奇怪的、像被挠到痒处的新鲜感。很少有人能这样和她一来一回地对话。她的朋友们大多会笑着附和，而那些喜欢她的男生则会更殷勤地接话。\n\n但桜井瞬不一样。他明明在怼你，却让你觉得他很认真地在和你对话。\n\n这种感觉很奇妙。\n\n陽菜吃完最后一口蛋糕，用纸巾擦了擦嘴角。\n\n「桜井君。」\n\n「嗯。」\n\n「下次周三——你还会来吗？」\n\n瞬终于合上了书。\n\n他看着她。陽菜迎着他的目光，没有移开。\n\n「看情况。」\n\n「那我偶尔也会来。」陽菜站起来，把帆布包背好，「毕竟这家店的东西真的很好吃。」\n\n她走向吧台结账。\n\n经过瞬身边的时候，她停了一下。\n\n「下次我会记得带漫画来的。」\n\n「我不会看。」\n\n「那你就继续看你的『向死而生』吧。」\n\n她推开门。风铃又响了。\n\n四月的风灌进来，把桌上的餐巾纸吹得动了一下。瞬看着陽菜的背影消失在街道拐角。\n\n他重新戴上耳机。\n\n但这一次，马勒第二交响曲已经播到了第四乐章——「原光」。那段女低音的独唱，像是从极深极深的地底，唱出了对光明的渴望。\n\n他翻回了刚才看的那一页。\n\n却发现书签不知什么时候滑落到了地上。\n\n瞬弯腰捡起书签。那是一张旧得发黄的银杏叶标本，被夹在透明塑料膜里。是蛍很久以前给他的。\n\n他想起出门前——\n\n「去哪儿？」\n\n对面二楼的窗户推开了一条缝。雨宮蛍的声音从那条缝里飘出来，像三月的雨丝，细而轻。\n\n「咖啡店。」\n\n「还是那家？」\n\n「嗯。」\n\n「早点回来。」\n\n三句话。每次都是这三句话。\n\n去哪儿。还是那家？早点回来。\n\n然后窗户关上。她大概又躺回了那张靠窗的床上，听着收音机里的音乐，翻着一本她读过无数遍的小说。\n\n瞬把银杏书签重新夹进书页中。\n\n他端起已经凉了的美式咖啡，喝了一口。\n\n苦。\n\n他站起身，走到吧台结账。\n\n「今天和你一起坐的那个女孩，是新朋友？」女店主笑眯眯地问。\n\n「……陌生人。」\n\n「哎——」女店主拉长了声音，笑意更深了，「看着不像啊。」\n\n瞬没有接话。他付了钱，推门出去。\n\n东京四月的傍晚，天边烧着淡淡的橙红。电线杆上停着一排灰鸽子，咕咕地叫着。\n\n他沿着熟悉的街道往家走。经过便利店，经过那个总是有人遛狗的公园，经过挂着「閉店セール」横幅的旧书店。\n\n走到自家门口时，他停下脚步，抬头望了一眼对面二楼的窗户。\n\n窗台上搁着一盆白色的桔梗花。\n\n窗帘拉着。\n\n瞬看了大约三秒，然后走进了自己的家。\n\n「哥哥你回来啦——晚饭吃什么——」\n\n妹妹桜井美咲的声音从客厅传来，伴随着游戏机的音效。\n\n「随便。」\n\n「又说随便——你不能每次都说随便——」\n\n瞬没有回答。他上了二楼，走进自己的房间。脱掉卫衣，坐到书桌前。\n\n窗外，蛍的窗台上亮起了一盏小小的灯。\n\n橘黄色的，像一只静止的萤火虫。\n\n他看了一会儿那盏灯，然后拉上了窗帘。\n\n---\n\n**蛍的日记 — 4月某日**\n\n今天，瞬君又去了那家咖啡店。\n\n回来后，他和美咲说话的语气，和平时有一点点不一样。\n\n只有一点点。\n\n窗台上的桔梗花开了第三朵。\n\n下午三点钟的时候，我听见鸟叫声——是黃鶲。春天真的来了。\n\n瞬君回来的时候，在门口站了一会儿，我能感觉到他的目光落在我的窗帘上。我没有拉开窗帘。\n\n我怕他看到我的表情。\n\n因为今天早上，主治医生打电话来了。他说最近的心电图结果不太理想，建议我再去医院做一次详细的检查。\n\n我说好的。\n\n然后我挂了电话，把窗台上的日历翻到今天。\n\n用红色的记号笔，用力地画了一个×。\n\n我没有告诉瞬君。\n\n我知道他会担心的。而他担心的方式，就是不说出来——只是用那种安静的、沉重的沉默，陪在我身边。\n\n那样的话，反而是我更难过。\n\n所以我没有说。\n\n春夜的风很温柔。我开着窗，听见街上有一对情侣在说笑。\n\n女生的声音很清脆，像跳跳糖。\n\n而瞬君今天回来得比平时晚了十一分钟。\n\n那十一分钟里，发生了什么呢。\n\n我不知道。\n\n但我很想问。\n\n又觉得，不问比较好。\n\n晚安，瞬君。\n\n晚安，四月。\n\n（第一卷 完）\n\n---\n\n*「你知道吗。人类是向死而生的存在。」*\n*「那我们为什么还要活着呢？」*\n*「——大概，是为了某个人吧。」*\n'},
  {title:'第二卷 文学部的午后',content:'# 第二卷 文学部的午后\n\n第二天，桜井瞬走进二年C组的教室时，第一眼看到的是窗边围着一圈人。\n\n或者说，他一眼就看到了被围在中间的那个人。\n\n高橋陽菜。\n\n她正在眉飞色舞地讲着什么，手势很大，声音隔着半个教室都听得见：「——然后那个樱花芝士蛋糕真的超级好吃！入口即化！你们一定要去试试！」\n\n围在她身边的人——瞬大致认了一下脸，有两个是同班的女生，还有一个是隔壁班的男生，以及一个他不认识的戴眼镜的男生。\n\n这就是高橋陽菜。永远被朋友们环绕，永远笑得那么大声。\n\n瞬收回目光，走向自己的座位——靠窗倒数第三排。\n\n他把包挂好，拿出那本《存在与时间》。耳机还没戴好，就听到有人喊——\n\n「桜井君！」\n\n是陽菜的声音。\n\n全教室至少有六个人转头看向了她。\n\n然后顺着她的目光，看向了他。\n\n瞬的手停在半空，耳机线悬在耳侧。\n\n陽菜已经站起来了，脚步轻快地穿过教室，走到他面前。\n\n「早上好呀。」\n\n「……早上好。」\n\n「昨天回去之后我想了很久，」她双手撑在他的课桌上，身体微微前倾，「你学号是多少来着？」\n\n「17。」\n\n「啊——我是19。难怪。」陽菜点了点头，忽然又皱眉，「等等，那18号是谁？」\n\n「——是我。」\n\n一个弱弱的声音从瞬后方传来。一个戴着厚底眼镜的男生举了举手，表情像是在课堂上被点名回答不会的问题。\n\n「哦——佐藤君！」陽菜冲他灿烂一笑，然后转回瞬，「你看，我们就隔着一个人。你居然两周都没注意到我的存在。」\n\n「是你没注意到我的存在。」瞬纠正道。\n\n「……无法反驳。」\n\n陽菜鼓了鼓腮帮子。\n\n「不过我确认了，你确实不是幽灵。你有体温。」她伸出手指，在他的课本上戳了一下，「而且，你的书是真的会翻页的。」\n\n「感谢你的科学鉴定。」\n\n「不客气。」\n\n她笑了一下，然后转身走回自己的座位。\n\n在她转身的瞬间，瞬闻到了一股淡淡的香味——不是香水，更像是某种洗衣液的香气，带着一点柑橘的味道。\n\n他不知道她为什么要在意他是不是幽灵。\n\n也不知道她为什么要在意他翻不翻书。\n\n但那股柑橘味在空气中停留了很久。\n\n上午的课是日本近代文学史。教授讲到夏目漱石的《心》时，提到了一句——\n\n「『私はその人を常に先生と呼んでいた。』——这个故事一开始，就注定是悲剧。」\n\n瞬翻了一页笔记本。\n\n他没有写笔记。\n\n他只是在页边空白处，用钢笔点了一个墨点。\n\n午休的时候，瞬照例找了个安静的角落吃饭。他选的位置是图书馆后方的露天走廊，那里除了他和偶尔路过的图书管理员，几乎没有人。\n\n但今天，他刚坐下，手机就震动了。\n\n是健太发来的LINE。\n\n「喂，听说你和班上的高橋昨天在咖啡店约会了？」\n\n瞬盯着屏幕上的「约会」两个字，停顿了大约两秒。\n\n「不是约会。」\n\n「佐藤说他今天早上亲眼看见高橋主动找你说话诶。」\n\n「所以？」\n\n「所以——你居然认识女生！还是高橋那种级别的！你一个存在感为零的人！」\n\n「谢谢你的评价。」\n\n「这不是夸你。说吧，怎么回事。」\n\n瞬把昨天的事情简单说了一遍。\n\n健太回复了一串感叹号。\n\n「这就是命运的相遇啊!!!」\n\n「她是被朋友放鸽子，我是固定去那里看书。和命运没有关系。」\n\n「你这种就是典型的命运否定论者。」\n\n瞬没有继续回复。\n\n他把手机翻了个面，屏幕朝下。\n\n但健太的话在他脑子里绕了一圈。\n\n——巧合和命运之间，到底有没有区别？\n\n他咬了一口梅干饭团。\n\n酸。\n\n下午的课结束后，瞬准备去文学部的活动室。\n\n東都大学的文学部有一个传统——每个学生都要加入一个研究小组。他选的是「近现代文学研究会」。这个研究会的好处是，基本不需要发言。只需要每两周交一篇读书报告，偶尔参加一下读书会就行。\n\n活动室在社团楼的三楼。一间只有图书室一半大的小房间，堆满了历届学生留下的旧书。\n\n瞬推开门的时候——\n\n里面已经坐了一个人。\n\n高橋陽菜。\n\n她正趴在桌上，翻着一本厚厚的书，眉头皱得像是在看纳税申报表。\n\n「……你在这里干什么？」\n\n陽菜抬起头，看到瞬的瞬间，脸上闪过一丝复杂的神情。\n\n「啊，桜井君——」她叹了口气，「我来补交读书报告。上学期欠了三篇。」\n\n瞬沉默地走到书架前，开始挑今天要借的书。\n\n「你怎么会在这里？」陽菜问。\n\n「例会。」\n\n「诶——那你是研究会的？」\n\n「嗯。」\n\n「为什么我完全不知道——」\n\n「因为你上学期欠了三篇读书报告。」\n\n陽菜的表情像是在说「这句反击完全无法反驳」。她趴回桌上，下巴搁在手掌上，看着瞬从书架上抽出一本书。\n\n「你选的什么主题？」\n\n「存在主义文学对日本私小说流派的影响。」\n\n陽菜眨了眨眼。\n\n「……说人话。」\n\n「就是——『我为什么活着』这种无聊的事，写成小说。」\n\n「无聊吗？」陽菜轻声说，「我觉得很重要啊。」\n\n瞬的手指在书脊上停住了。\n\n她继续说：「我以前好像没想过这个问题。但是昨天你说的，『向死而生』——我回去查了一下。然后就想了好久。关于自己为什么活着。」\n\n「结论呢？」\n\n「还没想出来。」陽菜笑了一下，「不过想到肚子饿了，就去便利店买了布丁吃。」\n\n瞬转过身，看着她。\n\n陽菜抬起头，迎着他的目光。\n\n「桜井君。」她说，「你的读书会——我可以参加吗？」\n\n「你不是我们研究会的。」\n\n「那我现在加入。」\n\n「已经到了第二学期。」\n\n「那就当旁听。」\n\n瞬沉默了片刻。\n\n「随便你。」\n\n他在她斜对面坐下，翻开了书。\n\n陽菜低下头，把注意力转回面前那本大部头。但她的嘴角微微翘起了一个弧度。\n\n接下来的一个小时，活动室里只听得见翻书的声音。\n\n窗外的光线缓缓移动，从书架滑到桌子，再从桌子爬到墙上。\n\n陽菜的第一篇读书报告写到一半的时候，抬起头，看向斜对面的瞬。\n\n他正专注地看书。阳光从窗外洒进来，落在他的肩膀上。他的睫毛很长——陽菜第一次注意到。他的手指不时摩挲着衣角，像是在思考什么。\n\n然后他翻了一页。\n\n陽菜忽然想起昨天他说的话——「没必要被注意到」。\n\n她开始觉得这句话不是谦虚，而是一种奇怪的自我定位。\n\n他是真的觉得自己不需要被注意。\n\n但陽菜觉得，这是不对的。\n\n因为此刻的阳光，明明把他照得很温柔。\n\n远处传来棒球部的喊声。有人在操场上奔跑，有棒球击中了手套，发出短促而清脆的一响。\n\n「桜井君。」\n\n「嗯。」\n\n「下次周三——我也去咖啡店。」\n\n瞬没有回答。\n\n但陽菜注意到，他翻书的动作慢了半拍。\n\n她在读书报告的最后一页写上题目，然后把笔搁下。\n\n窗外，一个女孩推着自行车缓慢地经过社团楼的楼下。车篮里放着一束白色的花。\n\n陽菜目送着那辆自行车消失在拐角。\n\n「那我先走了。」她站起来，把笔记本塞进包里，「下周读书会见。」\n\n瞬点了一下头。\n\n陽菜走到门口的时候，忽然回头。\n\n「对了，桜井君。」她说，「你并不是『没必要被注意到』。」\n\n瞬抬起头。\n\n「我只是觉得，你还没有习惯被别人注意。」陽菜笑了一下，「以后会习惯的。」\n\n门关上了。\n\n她的脚步声在走廊里渐渐远去。\n\n瞬坐在椅子上，一动不动。\n\n窗外那辆自行车又出现了，骑车的女孩这回身边多了一个同行的男生。两人有说有笑地驶过了樱树下的路。\n\n他合上书本。\n\n站起身，把书放回书架。\n\n走到门口时，他停了一下。\n\n陽菜的笔记本安安静静地躺在桌上。\n\n她忘记带走了。\n\n瞬犹豫了一秒，走过去，拿起了笔记本。\n\n蓝色的封面，右下角贴着一张猫咪贴纸。他已经拿出了手机，想告诉她笔记本落下了——\n\n然后他意识到，他们没有交换过联系方式。\n\n他握着那本笔记本，站在活动室门口。\n\n窗外，天色渐晚。\n\n---\n\n瞬回到家的时候，对面二楼的窗户开着。\n\n蛍趴在窗台上。她穿着一件宽大的淡蓝色睡衣，头发披散在肩上。几缕发丝被风吹起来，横在她面前，她也不去撩开。\n\n「瞬君。」\n\n她的声音永远是这样——轻轻的，平平的，像是在陈述一件和自己没有太大关系的事。\n\n「今天回来晚了。」\n\n「嗯。」瞬在自家门前的台阶上坐下，「文学部去了。」\n\n蛍看着他。\n\n「发生什么事了吗？」\n\n「为什么这么问？」\n\n「你进门的时候看了我的窗户，然后没有立刻进屋。」蛍说，「平时你只会看两秒。今天看了五秒。」\n\n瞬没有说话。\n\n他和蛍之间，隔着一条窄窄的巷子。四月的晚风从巷子那头灌进来，吹得电线轻轻晃荡。\n\n「我遇到了一个人。」他终于开口。\n\n蛍没有催他。\n\n「在咖啡店。她坐到了我对面。然后今天，我发现她和我是同班。然后她又出现在了文学部的活动室。」\n\n「她？」\n\n瞬抬眼，望向蛍。\n\n蛍的表情没有变化。她平静地听着，像是在听一段不相关的天气预报。\n\n「女の子。」他说。\n\n「是嘛。」\n\n蛍把头靠在窗框上。风把她的头发从左边吹到右边，露出她苍白而纤细的脖颈。\n\n「她是什么样的人？」\n\n「很吵。」瞬想了想，又补充道，「笑得很大声。朋友很多。还有，吃东西的时候表情很幸福。」\n\n蛍沉默了好一会儿。\n\n「那很好啊。」她说，「瞬君身边有这样的人。」\n\n「你不觉得烦吗？」\n\n「我为什么要觉得烦？」\n\n瞬没有回答。\n\n蛍是知道他在说什么的——「烦」，指的是被别人闯入自己日常生活的那种不适感。他有固定模式的生活，固定节奏的日常。而陽菜是那种会把这套节奏彻底打乱的人。\n\n「我觉得，」蛍慢慢地说，「有人能闯进来，对瞬君来说是好事。」\n\n「为什么？」\n\n「因为你的圈子太小了。」\n\n蛍说这句话的时候，轻轻笑了一下。\n\n那是非常淡的笑容，但瞬注意到了——因为蛍笑得很少。\n\n「你的圈子，只有学校、咖啡店、家。还有我。」她说，「多一个人不好吗？」\n\n「你把自己放在最后？」\n\n「因为我是最不会变的那个。」蛍说，「我一直在这里。」\n\n风又吹过来。窗台上的桔梗花轻轻摇晃。\n\n瞬站起来。\n\n「我回去了。」\n\n「嗯。」\n\n「晚饭吃了吗？」\n\n「妈妈煮了粥。」\n\n「多吃一点。」\n\n「好。」\n\n他走向家门。推开门的瞬间，蛍的声音又飘过来。\n\n「瞬君。」\n\n他回头。\n\n蛍的脸笼在窗框的阴影里，看不清表情。但她的声音穿过巷子，清清楚楚地落进他耳中。\n\n「如果那个女孩不错的，就多和她说说话吧。」\n\n瞬握着门把，站了两秒。\n\n「你说话很像我妈。」\n\n「我才不要当你妈。」\n\n蛍说完这句话，就把窗户关上了。\n\n但瞬看到她嘴角那一瞬间的弧度。\n\n他进了家门。\n\n妹妹的声音从客厅传来：「哥哥你又不回答晚饭想吃什么——」\n\n「咖喱。」\n\n「诶——今天居然不是『随便』！」\n\n瞬走上二楼，把陽菜的笔记本从包里拿出来。\n\n蓝色的封面。猫咪贴纸。他翻开第一页，她的字有些圆，但不是潦草的那种圆，而是一种看起来很有生命力的圆。\n\n在空白页上，她写了一个标题——\n\n《关于我为什么活着——当前结论：因为布丁很好吃。》\n\n瞬看着那行字，沉默了很久。\n\n然后他把笔记本放在桌上，拿过手机。\n\n他打开LINE，在班级群聊里找到了她的名字。\n\n头像是一份草莓芭菲。\n\n他发了加好友请求。\n\n几秒后。\n\n「桜井瞬さんが友達になりたいと言っています。」\n\n再过三秒。\n\n「同意しました。」\n\n然后是陽菜的消息——\n\n「你居然主动加我好友!!!!」\n\n「你笔记本落活动室了。」\n\n「我知道啊。就是留给你的。」\n\n瞬盯着屏幕。\n\n「因为我知道你没我LINE。」第二条消息紧跟着弹出来，「作为赔礼——所以笔记本先放你那里。明天给我。」\n\n「赔什么礼？」\n\n「赔你昨天在咖啡店看我手机被我发现了。」\n\n瞬把手机放下。\n\n但他发现自己的嘴角，不受控制地上扬了一点。\n\n---\n\n**蛍的日记 — 4月某日，晴**\n\n瞬君说起那个女孩的时候，声音比平时轻了一点。\n\n他自己大概没有注意到。\n\n但我注意到了。\n\n就像我能注意到他每天回家的时间误差不超过三分钟一样。\n\n那个女孩，是什么颜色的呢。\n\n听瞬君的描述——「吵」「笑声很大」「吃东西很幸福」——感觉是像向日葵一样的颜色。\n\n金黄色的。明亮的。有温度的。\n\n而我是什么呢。\n\n大概是白吧。\n\n没有颜色的白。\n\n今天温度不错。自从上次晕倒后，已经有四天没有异常了。\n\n我把日历上的×又画了一个。\n\n今天医生打来电话的时候，妈妈接了。\n\n她以为我在午睡，但我听见了。\n\n「雨宮女士，检查结果已经出来了。建议尽快来一趟医院。」\n\n妈妈挂了电话后在厨房站了很久。\n\n她洗了一个苹果，切了一半放在我桌上。\n\n然后什么都没说。\n\n我没问。\n\n不问就不需要面对。\n\n我靠在窗台上，看瞬君进家门。\n\n他今天回来晚了三十一分钟。\n\n那三十一分钟里，他遇到了什么呢。\n\n我想问他。\n\n可我没有问。\n\n因为他的声音里，有一种他自己还没发现的东西。\n\n那是一种即使不知道前因后果，也会让人鼻子发酸的东西。\n\n晚安，瞬君。\n\n晚安，那个我不知道名字的、像向日葵一样的女孩。\n\n（第二卷 完）\n\n---\n\n*「有人能闯进来，是好事啊。」*\n*「因为你的圈子太小了。」*\n*她说完这句话，把窗户关上了。*\n*他看不到她转身后，靠着墙壁滑坐在地板上的样子。*\n'},
  {title:'第三卷 青梅与闯入者',content:'# 第三卷 青梅与闯入者\n\n陽菜发现笔记本里夹了一页便签。\n\n是瞬放进去的。淡黄色的便签纸，用钢笔写着：「标题太傻了。」\n\n她盯着那四个字看了五秒，然后趴在课桌上笑起来。笑声压得很低，肩膀一抖一抖的。\n\n正在讲台上的教授朝她这边看了一眼。\n\n她立刻低下头，假装抄笔记。但手里的笔写的是——\n\n「哪里傻了。明明很真实。」\n\n然后把便签纸仔细折好，塞进笔袋。\n\n午休，陽菜走到瞬的课桌前。\n\n「今天周三。」\n\n瞬正在合上便当盒的盖子。他今天的便当只剩下一颗梅干——又是挑食过后的残局。\n\n「所以？」\n\n「所以——咖啡店啊。」陽菜说，「你不会忘了吧。」\n\n「我没说要去。」\n\n「你也没说不去。」\n\n瞬看着她。陽菜眨着眼睛，嘴角弯弯，一副「你找不到理由拒绝」的表情。\n\n「我还要去文学部。」\n\n「今天又不是例会日。」\n\n「……」\n\n「你看，沉默就是默认。」\n\n瞬站起来。陽菜很自然地跟上他，步伐轻快，像一只找到了队伍的企鹅。\n\n他们走出教室的时候，佐藤優摘下眼镜使劲擦了擦，重新戴上，然后给健太发了LINE：\n\n「桜井和高橋一起出去了。第二次。」\n\n健太秒回：「我靠。」\n\n走出校门，穿过那条种着银杏树的小路，拐进一条偏巷。周三的午后，街上人不多。面包店的老板娘正在把新出炉的菠萝包摆上货架，香气飘了半条街。\n\n「好香——」陽菜的脚步明显慢了。\n\n「你不是要去咖啡店？」\n\n「是啊。但闻一下又不花钱。」\n\n「闻够了没有。」\n\n「再来五秒。」\n\n五秒后，她恋恋不舍地继续往前走。\n\n到了「静流」咖啡店。推开门，风铃响。\n\n女店主看到瞬走进来，正要微笑——然后看到了他身后的陽菜。她的笑容里多了一层微妙的意味。\n\n「いらっしゃいませ——今天还是两位？」\n\n「是！」陽菜抢在瞬前面回答了。\n\n靠窗的座空着。瞬照例坐靠窗那边，陽菜在对面坐下。\n\n「美式咖啡。」\n\n「我要——」陽菜翻开菜单的动作行云流水，「新品！那个抹茶红豆厚松饼。还有一杯热的焦糖拿铁。」\n\n「你上次不是点了抹茶拿铁？」\n\n「所以这次换个口味呀。」\n\n「你对吃这件事，真是坚定不移。」\n\n「你也是啊——永远的美式。」\n\n「美式就够了。」\n\n「因为苦的东西能让你觉得自己活着？」\n\n瞬端起水杯的手停了一下。陽菜说完这句话之后，自己也愣了一下。她连忙摆手：「啊不是，我不是那个意思——只是昨天看你那本存在主义的书，就随口——」\n\n「也许吧。」\n\n瞬打断了她的慌乱。\n\n「也许你说的是对的。」\n\n陽菜看着他的眼睛。\n\n那双眼睛藏在有些长的刘海后面，看不太分明。但她觉得，那双眼睛里装着的，比他说出来的多得多。\n\n松饼上桌了。\n\n厚厚的一大块，松饼上浇着抹茶酱，旁边挤了一圈红豆泥和白玉团子。陽菜双手合十：「いただきます——」然后切下一大块塞进嘴里。\n\n「好吃——」\n\n她的表情变化让瞬想起小时候养的仓鼠——两颊鼓鼓的，眼睛眯成一条缝。\n\n「你不尝尝吗？」陽菜把盘子往他面前推了推，「分你一半。」\n\n「不用。」\n\n「为什么？」\n\n「我不喜欢甜食。」\n\n「骗人。」陽菜用叉子指了指他的手，「你的便当盒里，每天都有玉子烧。」\n\n瞬沉默了。\n\n「而且，」陽菜咬着叉子，「你妹妹跟我说了——你喜欢吃草莓大福。」\n\n「……你什么时候和我妹说话了？」\n\n「LINE啊。」陽菜理所当然地说，「美咲酱超可爱的。」\n\n瞬闭了一下眼睛。\n\n他觉得自己的生活正在以一种不可控的方式被入侵。而且入侵者似乎完全没有「自己在入侵」的自觉。\n\n「来——张嘴。」\n\n陽菜叉着一块松饼递过来。\n\n瞬看着那块松饼。抹茶酱正缓缓淌下。\n\n「我自己吃。」\n\n「那给你叉子。」\n\n他接过叉子，切下一小块放进嘴里。松饼很软，带着淡淡的抹茶苦味，然后是红豆的甜。两种味道在舌尖上缠绕，像是某种不用言语就能懂得的对话。\n\n「好吃吗？」\n\n「……还可以。」\n\n陽菜弯起眼睛笑了。\n\n瞬忽然发现，当她笑的时候，左边脸颊上有一个很浅的酒窝。不仔细看看不出来。\n\n他把叉子放下，佯装喝水。\n\n那一天傍晚，陽菜跟瞬一起走到了他家附近。\n\n倒不是瞬邀请的——陽菜说要去买附近一家和果子店的「天下第一豆大福」，瞬说「那家店在我家旁边」，陽菜说「那就正好一起」。\n\n于是就这样了。\n\n他们走到那条种着榉树的街道时，对面二楼的窗户开着。\n\n雨宮蛍正坐在窗台上——不是趴在窗框，而是整个人坐在窗台内侧，背靠着窗框，膝上摊着一本书。她的头发今天用发卡别在耳后，露出整张脸。脸色在落日余晖下显得格外苍白，嘴唇几乎没有血色。\n\n她抬眼，看向街对面的两人。\n\n「蛍。」\n\n瞬在巷子这头喊了一声。声音比平时轻了一点——陽菜敏锐地捕捉到了这一点。\n\n蛍抬起手，慢慢地挥了两下。\n\n陽菜站在原地，抬起头，看着那个坐在窗台上的女孩。\n\n夕阳从蛍背后打过来，把她的轮廓镀上了一层金边。但因为逆光，陽菜看不清她的表情。\n\n只觉得那个人，像是玻璃做的。\n\n「——她是？」\n\n陽菜低声问。\n\n「雨宮蛍。」瞬说，「住在对面。」\n\n「青梅竹马？」\n\n「……」\n\n瞬没有否认。\n\n陽菜抬起头，冲着蛍的方向挥了挥手，大声说：「你好——我是高橋陽菜！瞬君的同学——」\n\n蛍的脸似乎动了动。\n\n然后她轻轻笑了一下。\n\n「こんにちは。」她的声音不大，但很清晰，像风穿过风铃，「我是雨宮蛍。」\n\n「我们家就在对面，」瞬指着身后的房子，「蛍从出生就住在这里。」\n\n「哇——」陽菜看看左边的房子又看看右边的，「那你们岂不是每天都能看到对方——」\n\n「能看到。」蛍说，「他的房间窗户正对着我的。」\n\n陽菜忽然意识到——她这句话的意思是：她能看到瞬的房间里面。而瞬也能看到她。\n\n「我去买豆大福了——」陽菜眨了眨眼，「瞬君你快回家吧，我自己过去。」\n\n「店在那边。」\n\n瞬指了指反方向。\n\n「……我知道！」陽菜的脸微微一红，转身往正确的方向走去。\n\n等她走远了，瞬才慢慢穿过巷子，走到蛍的窗下。\n\n「就是她。」蛍说。\n\n不是问句。\n\n「嗯。」瞬靠在墙上，仰头看着蛍，「就是她。」\n\n「很亮的女孩子。」蛍合上膝头的书，「像向日葵。」\n\n「你之前也是这么说的。」\n\n「因为找不到更合适的比喻了。」\n\n晚风吹过来。蛍把一缕头发别到耳后。她的手指很细，能看到手背上淡蓝色的血管。\n\n「她喜欢你。」\n\n瞬转过头，看着蛍。\n\n「别乱说。」\n\n「我没有乱说。」蛍的语气很平静，像是在念一段天气预报，「她看你的表情，你自己看不到。但是我看得到。」\n\n「你隔着这么远能看到？」\n\n「我就是能看到。」\n\n蛍说这句话的时候，用的是不容置疑的语气。\n\n瞬沉默了一会儿。\n\n「她只是比较自来熟。对谁都一样。」\n\n「是吗。」蛍淡淡地说，「那瞬君觉得，她也会对佐藤君这样吗。」\n\n瞬没有回答。\n\n他知道答案。\n\n蛍轻轻地笑了一下，然后翻开膝上的书。\n\n「不早了。回去吧。」\n\n「你吃饭了吗。」\n\n「吃了。」\n\n「真的？」\n\n「……喝了一碗粥。」\n\n「那不算吃饭。」\n\n「对我来说就是吃饭。」\n\n瞬看着她的眼睛。蛍的手指按住书页，指节发白。\n\n「我去给你做点什么。」他说。\n\n「瞬君做的东西——」\n\n「我做的玉子烧还是能吃的。」\n\n蛍不说话了。\n\n瞬走回家。妹妹不在——大概是和同学出去玩了。妈妈在厨房里留了一张便签：「加班，冰箱里有咖喱，自己热。美咲的份也在里面。」\n\n他从冰箱里拿出鸡蛋，熟练地打散、调味、倒入平底锅。手法意外地熟练——这个年纪的男生里，能做到这一步的不多。\n\n他端着玉子烧穿过巷子时，蛍的母亲——雨宮静子——刚好从门口出来。\n\n「瞬君——」静子愣了一下，看到他手里的盘子，随即露出一个温柔的微笑，「又来给蛍送东西啊。」\n\n「伯母。这个——」\n\n「去吧去吧，她在楼上。」\n\n瞬上了楼。推开蛍的房门。\n\n房间里弥漫着淡淡的药味，混合着旧书纸张的气息。蛍坐在床上，靠着枕头。窗台的桔梗花影子在地板上轻轻地摇。\n\n「给。」\n\n他把盘子放在她床边的矮桌上。\n\n蛍拿起筷子，夹起一块玉子烧。她小口小口地吃着，嚼得很慢。\n\n「好吃。」\n\n「是吗。」\n\n「嗯。」她放下筷子，「瞬君什么时候学的？」\n\n「网上搜的。」\n\n蛍低头看着盘子里的玉子烧。\n\n「以后……瞬君的妻子会很幸福吧。」\n\n「说这个干什么。」\n\n「没什么。」她笑了一下，「就是忽然想到了。」\n\n瞬在她床边的椅子上坐下。\n\n窗外，榉树的影子被路灯拉得长长的，落在巷子地上。\n\n「今天她又坐在我对面吃了松饼。」瞬开口，「点的是抹茶红豆厚松饼。」\n\n「嗯。」\n\n「她会用叉子递到我面前，逼我吃。」\n\n「嗯。」\n\n「然后她还加了我妹妹的LINE。」\n\n「嗯。」\n\n「她明天还要去文学部旁听。」\n\n「嗯。」\n\n蛍只是应着。每一声「嗯」都很短。但她听得很认真。\n\n「蛍。」\n\n他转过头，看着她。\n\n「你为什么要问『她是什么样的人』？」\n\n蛍抬起眼睛。\n\n「因为你想说。」她说，「你想说，但你又不知道怎么说。所以我问你，你就可以说了。」\n\n瞬沉默了很久。\n\n窗外的路灯闪了一下。\n\n「……你是这样的人吗？」\n\n「什么样的人？」\n\n「一直替别人着想的人。」\n\n蛍轻轻歪了一下头。\n\n「我没有替别人着想。」她说，「我只是觉得，听瞬君说话，很开心。」\n\n「开心？」\n\n「开心。」\n\n她说完这个字的瞬间，脸上露出了一种瞬很少见到的表情——不是笑，而是一种淡淡的宁静。像是冬夜的雪，无声地落在无人的屋檐上。\n\n「夜深了，」蛍说，「回去吧。」\n\n「明天我带便当过来。」\n\n「不用——」\n\n「已经决定了。」\n\n瞬站起来。走到门口时，他说了一句——\n\n「不要说那种话。」\n\n「什么话？」\n\n「『以后』什么的。」\n\n蛍没有回答。\n\n瞬下了楼。和静子礼貌地道别，走出雨宮家。\n\n穿过巷子的时候，他停了一下。\n\n抬起头。\n\n蛍的窗户还亮着灯。橘黄色的，像一只静止的萤火虫。\n\n他推开门，走进自己家。\n\n妹妹正在玄关换鞋，看到他便说：「哥哥你和陽菜姐约会去了——」\n\n「不是约会。」\n\n「陽菜姐说的呀——她说你们去咖啡店了。」\n\n「她去吃东西。我看书。分开的。」\n\n「那就是约会。」\n\n瞬决定放弃和妹妹讲道理。他上了二楼，把房门关上。\n\n打开手机。\n\n陽菜的消息已经刷了五条。\n\n「豆大福买到了！」\n「这家店真的绝了」\n「老板说他们家的红豆馅是手捣的」\n「（图片消息）」\n「诶你睡了吗」\n\n他打字：「没睡。」\n\n陽菜秒回：「你看这个豆大福！圆滚滚的！」\n\n「看到了。」\n\n「你平时吃这家吗？」\n\n「偶尔。」\n\n「那你下次带我去——」\n\n瞬看着屏幕上还在跳动的对话泡泡，忽然想起蛍刚才的话。\n\n——「她喜欢你。」\n\n他放下手机，拉开窗帘。\n\n对面的窗户还亮着灯。\n\n那道橘黄色的光，安静得让人心头发紧。\n\n---\n\n**蛍的日记 — 4月某日，晴转阴**\n\n她叫高橋陽菜。\n\n今天，她站在我家楼下，抬头看着我。\n\n夕阳从后面打着她。她的头发是栗色的。她的眼睛很亮。\n\n她挥手的动作很大，笑容也很大。和瞬君说的完全一样。\n\n但她有一样是瞬君没有说的。\n\n她看瞬君的眼神。\n\n那是我非常熟悉的眼神。\n\n因为很多年前，我就在镜子里见过。\n\n今天瞬君做了玉子烧给我。\n\n他说是网上搜的做法。\n\n我很开心。\n\n真的很开心。\n\n可是开心完了之后，窗帘拉上之后，房间里只剩下我一个人的时候。\n\n我哭了。\n\n不是因为难过。\n\n是因为我知道，他学会做玉子烧的那一天，一定不是为了让我的晚饭多一道菜。\n\n他是为了某个人学的。\n\n那个人是谁，我不会问。\n\n那个人也许是她。\n\n也许是以后的谁。\n\n但无论如何——\n\n我希望瞬君开心。\n\n这是真的。\n\n晚安。瞬君。\n\n晚安。陽菜さん。\n\n（第三卷 完）\n\n---\n\n*「你为什么要问『她是什么样的人』？」*\n*「因为你想说。你想说，又不知道怎么说。」*\n*「所以我问你，你就可以说了。」*\n*——这个世界上，大概只有一个人，会用这种方式来爱人。*\n'},
  {title:'第四卷 浅草寺的签',content:'# 第四卷 浅草寺的签\n\n五月。\n\n黄金周的第一天，瞬是被手机震醒的。\n\nLINE消息。不是一条。是十七条。\n\n全部来自同一个人。\n\n「おはよう——」\n「瞬君起床了吗」\n「今天天气超好的」\n「我们去浅草寺吧」\n「我查了攻略」\n「雷门的灯笼最近刚换新的」\n「还有那家抹茶冰淇淋店」\n「据说这个季节特别好吃」\n「我有优惠券」\n「两张」\n「所以你不用花钱」\n「怎么样」\n「是不是很划算」\n「你在看吗」\n「已读不回是不对的」\n「我看到已读了」\n「桜井瞬さん」\n\n瞬把手机翻了个面，继续睡。\n\n三秒钟后，他翻回来，打字：「几点。」\n\n「十点！雷门前集合！」\n\n现在是八点四十七分。\n\n瞬躺在床上，看着天花板。\n\n黄金周。浅草寺。人山人海。\n\n他昨晚的计划本来是：上午读《雪国》、下午听德彪西、晚上去蛍那边坐一会儿。\n\n但现在——\n\n他起了床。\n\n换衣服的时候，他特意选了最不起眼的搭配：灰色T恤，深蓝色薄外套，牛仔裤。全身唯一的亮色，是系在包上的铃铛挂饰——那是很久以前蛍送的。\n\n他盯着那个铃铛看了大约两秒。\n\n然后没有摘下来。\n\n浅草。黄金周的雷门前，人比他预想的还要多。游客、修学旅行的学生、举着小旗子的导游、站在路边啃人形烧的夫妇。还有鸽子——一大群，在石板地上踱来踱去，偶尔被小孩追得到处飞。\n\n陽菜站在雷门的大灯笼下，冲他挥手。\n\n她今天穿了一件鹅黄色的连衣裙，外面罩一件白色的防晒外套。头发放下来了，发尾微微卷着。\n\n「这边——」她的声音隔着二十米都听得到。\n\n瞬慢吞吞地走过去。\n\n「你提前了。」\n\n「是你卡点。」陽菜看了一眼手机，「十点零一分。桜井瞬，你的人生准则难道就是『决不多积极一分钟』？」\n\n「总结得很到位。」\n\n「所以说你是命运否定论者——」\n\n「这跟命运有什么关系。」\n\n「当然有关系。」陽菜转身往仲见世通走，步伐轻快，「如果你是我，你提前十分钟到了，看到满街的人和鸽子，你却一个人站在灯下等一个可能会迟到的人——这时候你就会想，万一他不来呢？万一他睡过头呢？万一他其实根本不想来呢？」\n\n「你想到第几个万一的时候决定继续等？」\n\n「第一个。」陽菜回头看着他，「因为我知道你会来。」\n\n瞬的脚步慢了半拍。\n\n「你怎么知道。」\n\n「直觉。」\n\n陽菜说完，转回头去，继续往前走。\n\n仲见世通两边挤满了店铺。人形烧、雷おこし、团扇、木屐、各种小玩意。陽菜每走几步就要停下来——「这个好可爱——」「这个看起来好好吃——」「诶这个是什么——」\n\n瞬跟在她身后半步的距离。\n\n他发现，陽菜在人多的地方走得很自然。她会侧身让过老人，会微微弯腰避开小孩的手，会用恰到好处的笑容回应店家的招呼。\n\n但她的眼睛，一路走来，一直在看那些食物和纪念品。\n\n几乎没有看过人。\n\n这和他看到的其他女生不太一样——她们三五成群，互相拍照，互相打闹。\n\n而陽菜的朋友虽然很多，但此刻她身边，只有他。\n\n「到了——」\n\n穿过仲见世通，登上台阶，浅草寺本堂就在眼前。朱红色的柱子，黑灰色的瓦顶，巨大的提灯。香火缭绕，烟雾缓缓升空。\n\n「先要净手。」陽菜拉着他走到手水舍。\n\n她用长柄勺舀水，先洗左手，再洗右手，然后把水倒进手心里漱口。动作娴熟，带着日本人特有的认真。\n\n「你经常来寺庙？」\n\n「嗯。」陽菜把勺子放下，「小时候跟着奶奶。现在自己偶尔来。」\n\n「来求什么？」\n\n陽菜歪了歪头。「嗯——学业？恋爱？大概就这两样吧。」\n\n「有效吗。」\n\n「学业的话——至少我现在是大学生了。」陽菜笑，「恋爱嘛……还在等。」\n\n他们走进正殿。陽菜投入一枚五日元的硬币，双手合十。\n\n瞬站在她身后，看着她闭着眼睛祈祷的样子。\n\n他发现她在祈祷的时候，眉毛会微微皱起，像是在对神明说一件很认真的事。\n\n然后她睁开眼，转过头。\n\n「轮到你了。」\n\n「我不拜。」\n\n「为什么？」\n\n「没有想求的。」\n\n陽菜看了他几秒，然后走过来，把一个五日元硬币塞进他手里。\n\n「五円。ごえん。缘分。」她轻声说，「不求也行。但投个币吧。就当——跟神明打个招呼。」\n\n瞬低头看着手心里的硬币。\n\n中间那个圆孔，把她的手心透过来——他看到了她手心里的纹路。\n\n他把硬币投进钱箱。\n\n五日元落进去，发出一声轻响。\n\n「接下来——」陽菜转身往外走，「抽签！」\n\n抽签处排着队。轮到他们时，陽菜先摇签筒。\n\n啪嗒。\n\n一根细长的签棒掉出来。她拿给工作人员看，换来一张签纸。\n\n「大——吉——」\n\n陽菜蹦了一下。然后她把签纸小心翼翼地折好，放进口袋里。\n\n「轮到你了——」\n\n瞬拿起签筒。摇了三下。\n\n一根签棒掉出来。\n\n「凶。」\n\n工作人员面无表情地把签纸递给他。\n\n陽菜的眉毛立刻皱了起来。\n\n「……你没事吧？」\n\n「这有什么。」瞬把签纸随手折了折，「只是概率问题。」\n\n「但是——」\n\n「如果我抽到大吉你抽到凶，你觉得会更好吗？」\n\n陽菜愣住了。\n\n瞬走向绑签纸的木架——按日本的习俗，抽到凶签就把签纸绑在架子上，把坏运留下。\n\n他把签纸折成窄窄的一条，在架子上打了个结。\n\n陽菜走到他身边。\n\n「你应该把那个换成大吉——」\n\n「不用。」\n\n「可是——」\n\n「凶不代表不好。」瞬绑好最后一道结，「『凶』是提醒。『大吉』是奖赏。奖赏有时候比提醒更危险——因为会让人放松警惕。」\n\n陽菜没有反驳。\n\n她沉默了一会儿，然后伸出手，把口袋里自己的大吉签纸也绑了上去。\n\n「你干什么。」瞬皱眉。\n\n「这样坏运就不会只缠着你了。」\n\n她绑得歪歪扭扭的，但很仔细。\n\n「而且——」陽菜退后一步，看了看两根并排绑着的签纸，「你说得对。奖赏有时候比提醒更危险。所以我把大吉也留下来。这样就扯平了。你凶，我大吉。一人一半。」\n\n她的笑容在五月的阳光下格外明亮。\n\n那一刻，瞬忽然意识到——\n\n他好像，在看着这个人笑的时候。\n\n心跳的频率和平时不太一样。\n\n这个念头让他有些慌。\n\n他移开了目光。\n\n「……吃你的抹茶冰淇淋去吧。」\n\n「诶——你请客吗？」\n\n「我有说请客吗。」\n\n「你刚才的良心说你请客！」\n\n「我的良心是哑巴。」\n\n两人从浅草寺出来，陽菜拉着他穿过言问桥，去了河对岸的咖啡店。\n\n不是「静流」。是一家可以看隅田川的小店。\n\n陽菜点了抹茶冰淇淋。瞬点了咖啡。\n\n他们坐在窗边，看着隅田川的水缓缓流向东京湾。\n\n「桜井君。」陽菜舀了一口冰淇淋，「你觉得人死了之后——会去哪里？」\n\n这个问题来得太突然。\n\n瞬端着咖啡杯，看着陽菜。她正在专注地挖第二勺冰淇淋，表情和刚才在浅草寺许愿时一模一样——认真，而虔诚。\n\n「你怎么忽然问这个。」\n\n「因为在寺庙的时候，我许的愿之一……不是给自己的。」\n\n「什么愿？」\n\n「秘密。」陽菜一笑，「说了就不灵了。」\n\n瞬没有追问。\n\n他喝了一口咖啡，看向窗外。\n\n隅田川的水面上，有一艘水上巴士缓缓驶过。窗玻璃映出陽菜的侧脸——她的眼睛在看窗外，但眼神没有聚焦在任何具体的东西上。\n\n「我觉得，」他终于开口，「死后去什么地方不重要。重要的是——死之前，有没有人对你说『谢谢你活着』。」\n\n陽菜停止了嚼冰淇淋的动作。\n\n「如果有人说了呢。」\n\n「那大概……就够了。」\n\n陽菜放下勺子。\n\n「那我说。」她转过头，看着他，「谢谢你活着，桜井瞬。」\n\n她用的是很轻的声音，轻得几乎被窗外的风声盖过。\n\n「——虽然不是我先说的。但我替那个人说。」\n\n瞬握杯的手指收紧了。\n\n「谁是那个人？」\n\n「不知道。」陽菜继续低头吃冰淇淋，「但总有一天会知道的吧。」\n\n窗外的水上巴士驶过了桥底。\n\n喇叭声传来，短促而模糊。\n\n傍晚。\n\n瞬回到家，洗了澡，拿了便当盒穿过巷子。\n\n蛍坐在窗台上。看到他便伸出手来，接过便当盒。\n\n「今天是筑前煮。」\n\n「嗯。」\n\n「浅草寺好玩吗？」\n\n瞬抬头看她。\n\n「你怎么知道。」\n\n「美咲说的。她说陽菜姐一大早把你叫走了。」\n\n「那丫头——」\n\n「好玩吗。」蛍又问了一遍。\n\n瞬靠着墙壁，仰着头。五月的晚风吹过来，带着一点不知名的花香。\n\n「人很多。她抽到大吉，我抽到凶。」\n\n「是吗。」\n\n「她把大吉也绑在架子上了。」\n\n蛍沉默了一下。\n\n「这样啊。」\n\n瞬看着她的反应。他发现，当他说起陽菜的时候，蛍的表情从来不会变。她永远是那副淡淡的、温和的样子。\n\n但今天，他发现她握着便当盒的指节，比平时白了一点。\n\n「蛍。你觉得浅草寺的签，灵吗。」\n\n「你觉得呢。」\n\n「我问你先。」\n\n蛍垂下眼睛。她的睫毛很长，在脸颊上投下两道淡淡的阴影。\n\n「我不知道。」她说，「我从来没有抽过签。因为我不想去寺庙。」\n\n「为什么。」\n\n蛍没有回答。\n\n她把便当盒打开，夹起一块胡萝卜，慢慢地嚼。嚼了很久才咽下去。\n\n「因为寺庙要走上台阶。」她终于说，「我走不动。」\n\n这句话很轻。轻得像尘埃落地。\n\n但瞬听着，觉得胸口被什么东西狠狠地撞了一下。\n\n他忽然想起——蛍有多久没有去任何地方了。\n\n好几年。\n\n她每天的活动范围，只有那间房间、那个窗台、以及偶尔下到厨房。\n\n学校、神社、浅草寺、渋谷、富士山——那些常人轻易就能到达的地方，对她来说，都是遥远的风景。\n\n「下次，」瞬开口，声音有些哑，「我帮你求一签。」\n\n蛍抬起眼睛。\n\n「不用，」她笑了一下，「我相信瞬君的签。」\n\n「我是『凶』。」\n\n「那等它变成『大吉』的时候吧。」\n\n晚风中，她轻轻地笑了。\n\n那是五月傍晚，一个属于他们两个人的、很淡很淡的约定。\n\n远处的榉树，叶子在夕阳下变成了深金色。\n\n---\n\n**蛍的日记 — 五月某日，晴**\n\n浅草寺。\n\n小时候，妈妈带我去过一次。\n\n我记得雷门的灯笼很大，仲见世通的人很多。我走了一半就走不动了，妈妈背着我走完了剩下的路。\n\n那天我抽到的签，也是「凶」。\n\n妈妈很紧张，连忙帮我绑在架子上。但我偷偷掰了一截签纸带回家，想留着证明自己「打败了坏运气」。\n\n现在那截纸应该还在抽屉的某个角落。\n\n瞬君今天说到了浅草寺的事。\n\n陽菜さん把自己「大吉」的签也绑了上去。\n\n我想象那个画面——两个年轻人在五月晴空下，在浅草寺的木架前，一人留下一张签。\n\n那个画面一定很美。\n\n可是。\n\n可是瞬君说这件事的时候，语气里有某种东西。\n\n我不知道怎么形容。\n\n那种东西，我以前没有在他嘴里听到过。\n\n是陽菜さん带来的。\n\n一定是。\n\n我的胸口今天疼了两次。\n\n第一次是在上午——瞬君走后不久。很快就过去了。\n\n第二次是傍晚——在听到他说话的时候。\n\n这次疼得久一点。\n\n不是因为病。\n\n是因为我发现——\n\n瞬君，也许正在被另一个人改变。\n\n而我只能坐在窗台上，看着。\n\n晚安，瞬君。\n\n晚安，五月的风。\n\n（第四卷 完）\n\n---\n\n*「凶是提醒。大吉是奖赏。奖赏有时候比提醒更危险。」*\n*「所以你把自己的大吉也绑上去了。」*\n*「嗯。一人一半。」*\n*——浅草寺的签架上，两根签纸在风中轻轻相碰。*\n*像两个并排站着的人，还不知道前面等着的是什么。*\n'},
  {title:'第五卷 雨天的便利店',content:'# 第五卷 雨天的便利店\n\n六月的东京，正式进入梅雨季。\n\n一连四天，雨没停过。\n\n文学部活动室的窗玻璃上蒙着一层薄雾。陽菜伸出手指，在雾气上画了一个笑脸。水珠顺着笑脸的轮廓往下滑，把弧线拉成了一个意味不明的形状。\n\n「今天不回去？」\n\n瞬合上书，看向窗外。雨比下午更大了，打得窗户噼里啪啦响。\n\n「等雨小一点。」\n\n「那一起等。」陽菜在他对面坐下，从包里掏出一袋软糖，「吃吗？」\n\n瞬看着那袋五颜六色的软糖。\n\n「你随身带零食的习惯真是让人叹为观止。」\n\n「你随身带哲学书的习惯也不遑多让。」陽菜把一颗绿色软糖扔进嘴里，「而且你刚才叫我名字的时候少加了一个『君』——『陽菜』好像也没人这么叫过，大家都叫我はるちゃん或者はるな。」\n\n「那你是觉得我在故意套近乎？」\n\n「不是。」陽菜的手托着腮，「我是觉得你这样很自然。」\n\n瞬从袋子里拿了一颗橘色的软糖。\n\n甜的。\n\n外面的雨没有变小的意思。反而越下越大，天色也越来越暗。\n\n「不行，这雨一时半会儿停不了。」陽菜站起来，「走吧，便利店。我饿了。」\n\n「你又饿。」\n\n「人类一天要吃三顿饭，这是进化的结果。你身为文学部学生，应该尊重文明发展的规律。」\n\n瞬沉默了两秒。\n\n「你说的那个是历史学部的事。」\n\n便利店在从大学到瞬家的半路上。是一家FamilyMart。蓝色的招牌在雨中亮得有些刺眼。\n\n陽菜先冲进去，在门口甩了甩头发上的水珠。瞬跟在她后面，慢悠悠地走进来，除了肩膀湿了一点之外，并没有多狼狈。\n\n「为什么同样是走过来，你的状况比我好这么多——」\n\n「因为我用伞。你不是不用，你是不会用。你的伞在你包里只撑了五十米就歪了——你把伞面正对着风向。」\n\n陽菜的嘴角抽了一下。\n\n瞬去货架那边转了一圈。回来的时候，手里拿了一罐咖啡。\n\n陽菜已经坐在便利店靠窗的吧台位上了。面前摆着两个饭团、一份炸鸡排、一盒布丁、一瓶蜜瓜汽水。\n\n瞬坐到她旁边的高脚凳上。\n\n窗外的雨声被自动门的开合声打断过几次。有人进来买伞，有人进来取快递，有人买完晚饭匆匆离开。\n\n「呐，瞬君。」陽菜嚼着炸鸡排，「你说——梅雨季的时候，店里的伞会不会涨价？」\n\n「会。」\n\n「那如果我提前一天多买几把伞，第二天转手卖给别人——」\n\n「那叫非法商贩。」\n\n「这叫经济学。」陽菜纠正他，「供给与需求。你在学校都学了什么啊。」\n\n「存在主义。」\n\n「——好的，话题终结。」\n\n陽菜喝了一口蜜瓜汽水。碳酸的气泡在瓶口噼噼啪啪地响。\n\n两人沉默了一会儿。\n\n便利店的背景音乐是一首很老的J-POP。阳菜不知道名字，但旋律很耳熟，好像小时候去哪里都会听到。\n\n「其实，」陽菜盯着窗外，「我不讨厌梅雨季。」\n\n「为什么。」\n\n「因为梅雨季的时候，整个世界都是灰色的。大家都不高兴。天气不好，气压低，每天出门都很麻烦。」\n\n「这叫不讨厌？」\n\n「你听我说完。」陽菜转过头看着他，「因为所有人都一起不开心——所以就不用假装开心了。我觉得这样比较轻松。」\n\n瞬的手指停在咖啡罐的边缘上。\n\n他忽然想起蛍说过的话——「你的圈子太小了。」\n\n陽菜的朋友很多，她在学校里有说有笑，她被一群人围着的时候永远是焦点。她说「因为所有人都一起不开心的时候，就不用假装了」——\n\n意思是，她平时是「假装」的吗？\n\n「你——」瞬开口。\n\n「嗯？」\n\n「是不是用热闹来骗自己。」\n\n陽菜握着蜜瓜汽水的手停了下来。\n\n便利店的自动门开了一下。一个穿着雨披的中年女人走进来，抖了抖雨伞上的水。\n\n「你这个人，」陽菜终于说，「有时候说话很讨厌。」\n\n「抱歉——」\n\n「但是很准。」陽菜把汽水瓶放下，手指在瓶盖上转了一圈，「我不知道怎么说……大概就像是，周围有很多人的时候，就不会被看到。谁会被看到呢——当然是那些闪闪发光的人。所以我努力让自己变得闪闪发光。这样就不会有谁来问我：你在不开心吗。」\n\n她顿了顿。\n\n「直到你。」\n\n瞬没有说话。\n\n陽菜看着他的眼睛，笑了一下。但这次的笑容，和她平时那种灿烂的笑容不一样。它更轻、更淡、更不像她。\n\n「你居然问我『是不是在用热闹骗自己』。你知道吗，就连我一个社团的人都没问过我这种问题。你明明认识我才两个月。」\n\n「两个月，够了。」\n\n「够了？」\n\n「看你吃十七顿饭，听你讲四十二个冷笑话，看你在文学部睡着五次——就足够形成判断了。」\n\n陽菜睁大了眼睛。\n\n「你数着的？」\n\n「……没有。」\n\n「你明明有！」\n\n「没有。」\n\n「你脸红什么——」\n\n「你看错了。」\n\n这一次，陽菜笑了。是真的笑。她笑得趴在吧台上，肩膀一抖一抖。\n\n「桜井瞬，你这个人——」她抬起脸，眼睛里有因为大笑而渗出的眼泪，「你是我认识的最奇怪的人。」\n\n「彼此彼此。」\n\n雨渐渐小了。\n\n他们从便利店出来的时候，街上积了一层薄薄的水。路灯倒映在水面上，一晃一晃的。\n\n「明天见。」陽菜冲他挥手。\n\n「嗯。」\n\n她转身走了两步，又回头。\n\n「瞬君——」\n\n「嗯？」\n\n「谢谢你发现。」她说，「关于那个——假装的事。」\n\n然后她转身，撑着伞走进了细雨里。\n\n瞬站在原地，看着那把亮黄色的伞慢慢变远、变小、最后消失在街道拐角。\n\n便利店的自动门在他身后合上了。\n\n六月的雨，落在他的肩上。\n\n回到家的时候，他习惯性地抬头看向对面的窗户。\n\n灯亮着。\n\n但窗户关着。\n\n他没有立刻进门，而是掏出手机看了一眼。LINE上蛍没有消息。她的最后一条消息，是昨天发的——\n\n「瞬君，明天的雨会很大，记得带伞。」\n\n他握着手机，穿过巷子，敲了敲雨宮家的门。\n\n静子来开门。她的眼睛有些红，但在看到瞬的瞬间，立刻换上了一个微笑。\n\n「瞬君——」\n\n「伯母。」瞬看着她的眼睛，「蛍怎么了。」\n\n静子的笑容抖了一下。然后她垂下手，声音低得像耳语。\n\n「今天下午又晕了一次。醒了之后说不想吃东西，也不说话——」\n\n瞬没有等她说完，直接进了门，上了楼。\n\n蛍的房间。门虚掩着。\n\n他推开。\n\n蛍躺在床上，脸侧向窗外。听到门响，她慢慢转过身来。\n\n房间里只有一盏小夜灯，光线很暗。瞬还是看到了她脸上的神情——那不是痛苦，而是一种空空的平静。像是暴风雨过后的海面，没有浪，却让人觉得很不安。\n\n「你来了。」她的声音比平时更轻。\n\n瞬在床边的椅子上坐下。\n\n「为什么不告诉我。」\n\n「怕你担心。」\n\n「你不告诉我，我更担心。」\n\n蛍沉默了一下。然后她慢慢坐起来，靠着枕头。这个动作让她有些喘，她停顿了几秒才说下去。\n\n「瞬君。」她说，「你知道我今天醒过来的时候，在想什么吗？」\n\n「什么。」\n\n「我想——窗帘没拉开。外面是白天还是晚上，我不知道。手机在桌上，但我拿不到。房间很安静，妈妈大概在下面做饭。我躺了一会儿——」她看着自己的手，「然后我想，如果我就这样不在了，大概也要过很久，妈妈端饭上来的时候才会发现吧。」\n\n瞬没有说话。\n\n他的手指扣在膝盖上。\n\n「所以我让妈妈帮我把窗帘拉开了一点。只是右边那一半。」蛍看向窗户，「这样如果明天不下雨了，早上会有阳光照进来。照在我脸上——我就知道，该醒了。」\n\n窗外，路灯的光透过半开的窗帘，在地板上切出一道窄窄的光带。\n\n「蛍。」瞬的嗓子有点紧，「我明天——」\n\n「明天早点回来。」蛍接过他的话，「顺便给我讲今天的事。比如你去了便利店，遇到了什么。」\n\n「你怎么知道我去了便利店——」\n\n「你衣服上有FamilyMart的炸鸡味。」蛍淡淡地说，「而且你手里拿着咖啡罐。」\n\n瞬低头看着自己手里的咖啡罐。那是他刚才在便利店买的第二罐。\n\n「我没买炸鸡。」\n\n「那你是陪别人去的。」\n\n瞬没有否认。\n\n蛍把枕头垫高了一点，靠在床头。她穿着淡粉色的睡衣，袖子有些长，只露出指尖。她的锁骨在昏暗的灯光下显得格外突出。\n\n「是高橋さん吧。」\n\n「嗯。她从文学部出来，饿了。雨太大，我们就在便利店等雨小。」\n\n「她开心吗。」\n\n「……什么？」\n\n「她和你在一起的时候，」蛍的语气很平静，「开心吗。」\n\n瞬不知道怎么回答这个问题。\n\n但他想到了陽菜的笑。在便利店里，笑得趴在桌上，一抖一抖的那种笑。\n\n「大概。」他说。\n\n「嗯。」蛍点了点头，「那就好。」\n\n然后她把被子往上拉了拉，盖住了下巴。\n\n「瞬君。雨停之后——夏天就要来了。」\n\n「嗯。」\n\n「夏天。」蛍看着天花板，「去年的夏天，你在做什么？」\n\n「考大学。」\n\n「前年的夏天呢。」\n\n「……高三。」\n\n「你看。」蛍的嘴角弯了一下，「你每年夏天都有事情可以回忆。而我呢，每年夏天都是一样的事情。看窗台的花，听收音机，划日历。」\n\n「今年夏天——」瞬开口。\n\n他本想说「今年夏天不会让你只待在屋里」。\n\n但话到了嘴边，他忽然想起蛍走不动石阶——\n\n于是他没有说出口。\n\n「今年夏天，」蛍替他接下去，「也会一样的。」\n\n她说这句话的时候，看着窗外。\n\n雨声落在屋顶上，很密，很细。\n\n瞬在蛍的床边坐了很久。\n\n久到他离开的时候，雨已经彻底停了。天空被洗得深蓝，几颗星星从云缝里漏出来。\n\n他穿过巷子，回头望了一眼。\n\n蛍的窗户半拉着窗帘。路灯的光打在窗帘上，隐隐约约映出一个侧躺的身影。\n\n她大概睡着了。\n\n瞬推开自家的门。\n\n妹妹在客厅里喊道：「哥哥你又不回我LINE——」\n\n他拿起手机。\n\n陽菜的消息。\n\n「今天很开心。谢谢瞬君。晚安。」\n\n他将消息往上划了划。两张图——陽菜拍了他喝咖啡的侧脸。而他的背影也出现在第三张照片的最边缘处——大概是陽菜在便利店随手拍的。\n\n他回复：「晚安。」\n\n然后他关上手机，躺在床上。\n\n天花板上，有窗外映进来的淡淡的光影。\n\n他的脑子乱乱的，却又不知道具体在想什么。\n\n半梦半醒之间，他似乎听到了雨声。\n\n但外面其实已经没有再下雨了。\n\n---\n\n**蛍的日记 — 六月某日，雨**\n\n今天把日历上的六月全划完了。\n\n用红笔。一笔一笔。\n\n从一号到三十号。\n\n每一笔都画得很用力。\n\n纸都快划破了。\n\n窗台上的桔梗花谢了一朵。我让它落在花盆的土上。反正过几天还会有新的开出来。\n\n瞬君晚上来了。\n\n他衣服上有炸鸡味。是便利店的炸鸡。\n\n但不是他买的。\n\n他从来不买便利店的炸鸡。他说那种炸鸡太油。\n\n所以是高橋さん。\n\n高橋さん和他一起在便利店躲雨。\n\n他们在便利店里做了什么。\n\n说了什么。\n\n有没有笑。\n\n我不知道。\n\n但我知道高橋さん一定笑得很开心。因为在瞬君身边，有些事情是发生过后，人就会不自觉地笑的。\n\n比如被他一针见血地吐槽了。\n\n比如看他喝咖啡的时候不自觉皱眉的样子。\n\n比如看到他其实很温柔的眼神。\n\n——我知道。这些我全部都知道。\n\n因为我是世界上第一个发现这些事的人。\n\n妈妈今天又和医生通电话了。\n\n她以为我在睡觉。\n\n其实我没有。\n\n我听她说：「下个月，再不住院的话——」\n\n后面的话被关门声挡住了。\n\n我不想住院。\n\n不是怕打针或者吃药。\n\n是怕住院期间，瞬君那边发生了什么我不知道的事。\n\n虽然那些事也与我无关。\n\n晚安。\n\n瞬君。\n\n晚安。\n\n六月的最后一天。\n\n（第五卷 完）\n\n---\n\n*「今年夏天，也会一样的。」*\n*她说。*\n*窗外，六月的最后一滴雨落下去了。*\n'},
  {title:'第六卷 隅田川花火大会',content:'# 第六卷 隅田川花火大会\n\n七月末。\n\n隅田川花火大会的日子。\n\n陽菜提前一周就在LINE上刷屏了：「今年规模比往年都大——两万发——超期待的——」「有位置推荐吗——」「瞬君你知道哪里看花火最好吗——」「桜井瞬你到底有没有看过花火大会——」\n\n瞬最后的回复是：「我奶奶家屋顶。但是今年不开放。」\n\n「为什么——」\n\n「因为奶奶不在东京。」\n\n陽菜连着发了六个哭泣的表情。\n\n然后她说：「那我负责找地方。瞬君负责来就可以了。」\n\n瞬盯着这行字看了很久。\n\n其实他知道几个看花火的好位置，也每年都会看。只不过，是和对面的窗户一起看的——蛍不能去河边的人潮中挤。每年隅田川花火大会的晚上，他会坐在自家门口的台阶上，蛍坐在窗台上，两人隔着一条巷子，听着远处的声响，看着偶尔从屋顶上方溢出的、高大的烟火。\n\n这是他们的约定。\n\n但现在——\n\n「蛍。」\n\n「嗯。」\n\n「后天花火大会。陽菜说要一起看。」\n\n蛍正低头在笔记本上写着什么。听到这句话，她的笔顿了一下。\n\n「那挺好。」她说，「隅田川的花火，是最好看的。」\n\n「你要不要一起。」\n\n笔尖离开了纸面。\n\n蛍抬起头。她的脸色在七月傍晚的光里，有一种近乎透明的白。\n\n「我能去哪里看。」\n\n「可以去河对岸。那边有个小公园，人少，不用走太多路。而且——」瞬顿了顿，「那里有一张长椅。你可以坐着看。」\n\n蛍看着他的眼睛。过了几秒，她轻轻笑了一下。\n\n「是约会吧？」\n\n「不是。」\n\n「高橋さん不是只约了你吗。」\n\n「……她说可以带家人。」\n\n蛍把笔搁在本子上。她偏过头，看向窗外的天空。暮色正从东边慢慢铺过来，几只乌鸦飞过榉树的树梢。\n\n「好。」她说，「我一起去。」\n\n花火大会当天。\n\n东京的夏天，热得像在蒸笼里。蝉鸣声铺天盖地，连空气都在微微颤抖。\n\n陽菜穿了一件白底粉花的浴衣，头发挽起来，别着一朵米色的花簪。她站在浅草站出口，手里拿着团扇，轻轻扇着风。\n\n瞬远远看到她的时候，脚步骤然慢了。\n\n不是因为人多。\n\n而是因为——\n\n那件浴衣，配着她的笑容，在蝉鸣声中格外鲜艳。\n\n「瞬君——这边——」\n\n她冲他挥手。团扇挥得很用力。\n\n瞬走过去。蛍在他身边。静子推着一辆轮椅——這是從附近药店租来的。蛍一开始不肯坐，但瞬没有给她说不的余地。\n\n蛍今天穿了一件淡紫色的浴衣。没有花纹。只有下摆绣了一小簇桔梗。她的头发也是挽起来的，但挽得很松，几缕发丝散在脖间。\n\n陽菜看到蛍的时候，眼睛亮了一下。\n\n「蛍ちゃん——好漂亮——」\n\n她小跑过来，在蛍的轮椅前弯下腰，认真地打量着蛍的浴衣。\n\n「这件浴衣的颜色真的好好看……淡紫色，配蛍ちゃん的皮肤刚刚好。桔梗的刺绣也太精致了——在哪家店买的？」\n\n蛍眨了眨眼。\n\n「妈妈帮我做的。」她轻声说。\n\n「诶——」陽菜抬起头看向静子，「すごい——阿姨，您是裁缝吗？」\n\n静子微微笑了。「就是一点业余爱好。」\n\n瞬站在一旁，看着陽菜俯身和蛍说话的样子。陽菜的语气里没有客套，也没有过度的小心翼翼——她只是很自然地、像一个普通朋友一样在表达欣赏。\n\n这种自然，让蛍也没有任何不适。\n\n瞬发现自己握着包带的手，松了一点。\n\n小公园在隅田川东侧，离主会场有一段距离。人不算多，但也能清楚地看到河对岸的花火发射台。\n\n他们到的时候，长椅还空着。静子把蛍的轮椅停在长椅旁边。陽菜在长椅上坐下，瞬坐在长椅另一头。\n\n静子说去买饮料，很自然地走开了。\n\n于是长椅这边，只剩他们三个。\n\n黄昏正在沉入隅田川。河面被染成深金色，水上巴士缓缓驶过，留下一道白练。\n\n「还有五分钟。」陽菜看着手机，「两万发——据说今年有特别设计的『富士山之春』。整片天空都会被染成白色。」\n\n「你会背花火目录。」瞬说。\n\n「那当然！花火大会的攻略，我都做了三十页——」\n\n「三十页？」\n\n「打印出来的！要不要看——」\n\n「不用——」\n\n「蛍ちゃん要不要看——」\n\n蛍微微摇了摇头。「我不想先知道。我想被花火……先吓一跳。」\n\n陽菜愣了一下，然后笑了。\n\n「对啊。你说的对。先知道的话，就不好看了。」\n\n第一朵花火升空的时候。\n\n「咚——」\n\n低沉而巨大的爆炸声。河对岸，圆形花火在夜空中迅速绽放。金色的光点向四面八方射开，然后缓缓坠落。\n\n一朵接一朵。\n\n红色、绿色、金色、银色。\n\n天空变成了花火的幕布。大的裹着小的，圆的裹着散的。有些像垂柳，一路上扬然后一路凋落。有些像瞬间炸开的花瓣，美得让人屏息。\n\n「好漂亮——」\n\n陽菜仰着头，嘴唇微微张着。她的眼睛里倒映着五颜六色的花火，亮得像藏着一条小银河。\n\n瞬看着陽菜。\n\n花火的光打在她脸上，明灭交替。浴衣上的花朵被照得忽明忽暗。她的睫毛在花火爆开的那一瞬会轻轻颤动。\n\n他无法移开视线。\n\n然后他忽然想起——\n\n他转头看向蛍。\n\n蛍也正在看着他。\n\n花火在她背后的夜空中绽放，光芒把她的脸照成了淡金色。她的眼睛里没有花火，只有他的方向。\n\n两人目光相遇。\n\n蛍立刻移开了眼。\n\n她抬起头，看向夜空。\n\n「真的很漂亮。」她轻轻地说，「上一次在近处看花火——是多久以前了呢。」\n\n瞬没有说话。\n\n陽菜听见了。她转过头，笑着对蛍说：「那下次再一起——台场那边秋天也有花火哦！虽然规模小一点，但是海边放花火也超美的——」\n\n蛍没有说话。她只是弯起嘴角，轻轻点了点头。\n\n花火大会进入了高潮。\n\n「富士山之春」升空的时候，整片天空真的被染成了白昼。银色光点铺天盖地，倒映在隅田川的水面上，上下对称，仿佛整个世界都在发光。\n\n「瞬君——」\n\n陽菜忽然站起来。\n\n「蛍ちゃん——你们看——」她指着天空，「那朵！像不像一个心形！」\n\n花火在夜空中确实呈现出了一个不太完美但足够辨认的心形。\n\n瞬看了一秒。\n\n「那是偏的。左半边比右半边大一圈。」\n\n「你的眼睛是圆规吗——」\n\n蛍听着他们两个斗嘴，轻轻地笑了一下。\n\n花火大会结束了。\n\n人潮开始回流。静子推着蛍的轮椅，慢慢往车站走。陽菜跟在轮椅旁边，时不时低头和蛍说两句，逗得蛍弯起眼睛。\n\n瞬走在陽菜身后半步。\n\n他想起去年、前年、大前年——每一年的隅田川花火，都是在自家门口听的。只有声响，没有画面。蛍坐在窗台上，他坐在台阶上。\n\n而今年。蛍第一次走出那条巷子。\n\n她看到了花火。\n\n她想出这个决定的时候是什么心情呢。\n\n瞬不知道。\n\n但走到车站前，他无意中看到蛍的手——她的手指正紧紧攥着轮椅的扶手。\n\n指节发白。\n\n不是因为害怕人群。\n\n而是因为——\n\n在花火之下，她看到了。\n\n瞬君看阳菜的表情。\n\n走在前面的蛍忽然转过头。\n\n她望向瞬，轻轻摇了摇头。\n\n然后她给了他一个不易察觉的微笑。\n\n那微笑很安静。\n\n像是在对他说：没关系。\n\n回家之后。\n\n瞬推开雨宮家的门，把租来的轮椅搬到玄关。蛍已经被静子扶着上了楼。\n\n他正打算离开的时候，听到楼上传来一声轻响。\n\n是笔掉在地上的声音。\n\n瞬三步并两步上了楼，推开蛍的房门。\n\n蛍正靠在床沿，一只手撑着床，另一只手用拇指和食指按住太阳穴。她的脸色白得像纸，嘴唇在轻轻发抖。\n\n「叫救护车——」\n\n「不用。」\n\n蛍的声音很轻，但很坚决。\n\n「只是有点晕。坐一会儿就好。」她抬起头看他。额头上有一层细密的汗珠。\n\n瞬在她床边蹲下来。他伸出手，把她额前的碎发拨开。她的额头冰凉。\n\n「你有带药吗。」\n\n「在抽屉里——那个棕色的小瓶。」\n\n瞬找到药，倒出两粒。又从楼下倒了温水端上来。\n\n蛍吃了药，靠着枕头慢慢深呼吸。\n\n「谢谢。」\n\n她闭着眼睛说。\n\n瞬拉过椅子，坐在床边。\n\n「下次不要勉强了。」他说。\n\n「不是勉强。」蛍慢慢睁开眼，「是我自己想去。想看花火。想听你们说话。」\n\n「你在家也能听到我们说话。花火结束后我就跟你讲。」\n\n「不一样的。」蛍轻声说，「在现场看，和听别人转述，是不一样的。就好像——」\n\n她顿了顿，似乎在挑选合适的词。\n\n「——就好像，看一本书的简介，和读这本书，是不一样的。」\n\n她的声音在房间里慢慢飘散。\n\n瞬看着她。她靠在枕头上，浴衣还没换下来，桔梗花的刺绣在被单上映出淡淡的紫色痕迹。\n\n「今天的花火，」他说，「你最喜欢哪一朵。」\n\n「第一朵。」蛍毫不犹豫地答。\n\n「那么早就出最大了吗。」\n\n「不是最大。」她说，「是第一朵——在所有人都不知道接下来会发生什么的时候。天空是空空的。然后忽然——『咚』。」\n\n「没有形状？」\n\n「没有。」蛍笑了一下，「但我最喜欢那一朵。因为它是『开始』。」\n\n夜深了。\n\n蛍睡下之后，瞬回到自己家。\n\n他打开房间的窗，看向对面。\n\n灯还亮着。\n\n橘黄色的，像一只静止的萤火虫。\n\n他想起陽菜在花火下的侧脸。也想起蛍在绽放声里移开目光的动作。\n\n他想起浅草寺的签。想起便利店的雨夜。想起咖啡店里的第一面。\n\n四月的樱早已谢了。\n\n七月的花火也散了。\n\n而八月还没有来。\n\n---\n\n**蛍的日记 — 七月末，隅田川花火之夜**\n\n花火很漂亮。\n\n陽菜さん的浴衣也很漂亮。\n\n她今天帮妈妈推了一会儿轮椅，还给我买了一杯苹果果汁。她说苹果果汁很甜，喝了会心情好。我跟她说，我的心情本来就很好。\n\n其实不是。\n\n但也不算说谎。\n\n因为在花火之下，大家都是开心的。\n\n开心到可以好像忘掉所有事情。\n\n今天我做了一件事，一件不对的事。\n\n在花火开到最大的时候，我转过头，看了瞬君一眼。\n\n他看到陽菜さん的表情，是我从小没有见过的。\n\n那个表情像什么呢。像我第一次看到雪时候的脸吗？不是。像小时候他第一次读到喜欢的书时的脸吗？\n\n也不是。\n\n那个表情，他看我的时候，从来没有出现过。\n\n所以我知道了。\n\n然后我对自己说：没关系。\n\n我真的觉得没关系。\n\n只是胸口有点闷。\n\n不是心脏。是心的那一边。说不清。\n\n今天要谢谢陽菜さん。她是真的喜欢瞬君，也是真的对我很友善。\n\n这样就好。\n\n这样的夏天，也许还会有下一个吧。\n\n也许。\n\n晚安。瞬君。\n\n晚安。陽菜さん。\n\n晚安。隅田川的花火，和今晚的每一朵光。\n\n（第六卷 完）\n\n---\n\n*「你最喜欢哪一朵？」*\n*「第一朵。因为它是开始。」*\n*「那最后一朵呢？」*\n*他没有问。她也没有说。*\n*——最后一朵，是结束。*\n'},
  {title:'第七卷 她的秘密',content:'# 第七卷 她的秘密\n\n八月初。\n\n瞬发现那个信封纯属偶然。\n\n蛍去卫生间，让他帮忙从抽屉里找一个药盒——专门装一日份药片的那个小盒子——他说找不到。蛍说在左边抽屉，他在翻找的时候，手指碰到了一叠纸。不是信封的颜色让他停下来，而是信封上的字——\n\n「东京大学医学部附属病院 循環器内科」。\n\n信封没有封口。\n\n他拿出来的时候，几张纸滑了出来。最上面那张，是心电图报告。一堆他不认识的英文缩写和数字。再往下翻——\n\n「二尖瓣狭窄合并关闭不全。重度。」\n\n「建议手术治疗。」\n\n「手术成功率为——」\n\n「瞬君。你在找什么？」\n\n蛍的声音从走廊尽头传来。\n\n瞬把信纸按原样放回抽屉，动作比平时慢了半拍。\n\n「找到了。」他的声音尽量保持平稳，「在右边的抽屉里。」\n\n他拿着药盒走出房间。蛍靠在走廊的墙上，等着他。她的呼吸有些急促——这段路对她来说已经算一段距离了。\n\n「在这儿。」他把药盒递给她。\n\n「ありがとう。」\n\n蛍接过药盒，从里面倒出两粒药，就着手里的水杯咽下去。她没注意到瞬看她的眼神有什么不同——又或者说，她故意不去注意。\n\n「那我回去了。」瞬说。\n\n「嗯。你回去记得把门带上。」\n\n他走到楼梯口。忽然停住。\n\n「蛍。」\n\n「嗯？」\n\n「那件事——我回头再问你。」\n\n他没有回头。下了楼。推开门。穿过巷子。走进自己家。上楼。关门。\n\n然后他靠在房间的门上，慢慢滑坐到地上。\n\n重度。手术。成功率。\n\n他把脸埋进双手里。\n\n上一次这样做，是十六岁，因为父亲的工作变动差点要搬家。那一次他跑到雨宮家的院子里，冲着蛍的窗户吼了一声：「我不会搬走的。」然后听到蛍在上面轻轻说了句「よかった」。\n\n那是他生命里为数不多的、展露情绪的时刻。\n\n之后他就习惯了把一切都压下来，用冷冷的语气来回应所有的波动。\n\n但现在——\n\n那个信封上的那些词，像刀子一样。隔着一个年纪的钝感，切了过来。\n\n八月第二周。\n\n「瞬，你最近怎么了。」\n\n陽菜的声音穿过午后的教室。暑假期间的补课教室里只有五六个人，空调吹得有点冷。\n\n「什么怎么了。」\n\n「你这几天话特别少。」陽菜把头探过来打量他，「我知道你平时话也不多——但最近是『比平时还少』。连吐槽都少了。」\n\n「没什么。」\n\n「骗人。」陽菜的手撑在他的课桌上，「你这个人一共就两个模式：吐槽模式，和沉默模式。沉默模式变多，就一定有事。」\n\n「那你怎么不觉得我是优化了能量分配策略。」\n\n陽菜想了一下。「因为你不是机器人。」\n\n瞬没有回答。\n\n窗外传来棒球部的喊声。有人在操场上奔跑。阳光明晃晃的，刺得人眯起眼。\n\n「是和蛍ちゃん有关对不对。」\n\n瞬抬起头。\n\n陽菜的眼睛很认真。那种认真和她平时的明朗不太一样——少了一点温度，多了一层沉静。\n\n「你怎么知道。」他说。\n\n「因为只有蛍ちゃん的事情，你不会对任何人说。」陽菜慢慢坐下来，坐在他左侧的课桌上，居高临下地看着他，「不对我说，不跟你妹妹说，也不跟你那两个死党说——你把这些都放在自己心里。」\n\n「你什么时候学会读心了。」\n\n「认识你之后。」陽菜说，「因为关注一个人，就会学会。」\n\n她说完这句话之后，两人的目光撞在一起。教室里只有空调的低鸣声，和窗外隐约传来的棒球哨响。\n\n陽菜先移开了目光。她拨了拨耳边的碎发。\n\n「你可以不告诉我具体的事。」她说，「但你不用一个人扛。」\n\n瞬看着她的侧脸。\n\n「陽菜。」\n\n她转回头。\n\n「如果有个人——」他开口，「她的未来比普通人短。你说她会不会，早就已经原谅了整个世界。而那个世界却还不知道。」\n\n陽菜没有立刻回答。\n\n她垂下眼睛，睫毛盖住了瞳色。然后她伸出手，把瞬桌上的课本翻到最后一页。\n\n那是空白页。\n\n她拿起桌角的笔，在上面画了一个圆。\n\n「这个圆，」她指着那个圆，「如果它一开始就比别的圆小。但是它自己的面积——」她在圆里面涂了涂，「——和别人一样饱满。那它就不是『不完整』的圆。」\n\n她把笔放下。\n\n「它只是一个『不同的圆』。对吧。」\n\n瞬看着那个歪歪扭扭的、不太圆的圆。\n\n「你画得真难看。」\n\n「——这个时候你居然吐槽我画的圆——！」\n\n「是你在画完之后停下来等我评价的。」\n\n「那不是等你评价我在等你回答——」\n\n「你的圆确实画得很难看。边缘都锯齿状了。」\n\n陽菜深呼吸了一下。然后她弯下腰，从包里掏出了一个便当盒。\n\n「——我给你带了玉子烧。本来想作为下午零食的——现在不给你了。」\n\n「……」\n\n「想吃吗？」\n\n「……想。」\n\n「道歉。」\n\n「——为哪个部分道歉。圆的部分，还是玉子烧的部分。」\n\n「两个都要——」\n\n「我的道歉只限于玉子烧的部分。圆的评价是客观事实。」\n\n陽菜瞪着他。三秒后。\n\n她笑出来了。\n\n「……你赢了。」她把便当盒推到他面前，「给你。」\n\n瞬打开盒盖。玉子烧被切成整齐的小块，每一块里卷着海苔。\n\n他夹起一块放进嘴里。\n\n甜的。\n\n八月第三周。\n\n蛍发现瞬知道的那一天，下了很大的雨。\n\n窗外暴雨如注。雷声在远处一响一响的，把窗户震得轻微发抖。蛍靠在床头，手里翻着那本读过无数遍的小说。然后她抬起头，对坐在床边的瞬说——\n\n「你看到了吧。」\n\n瞬的手止住了。\n\n「什么。」\n\n「抽屉里的信封。」蛍翻了一页书，「你那天帮我找药盒的时候，我后来想起来——信封本来是塞在药盒下面的。你放回去的时候压在药盒上面了。」\n\n她的语气平淡得像在说今天下了雨。\n\n「为什么不说。」瞬的声音很低。\n\n「为什么要说。」蛍的目光没有离开书页，「你知道了，你难过。你装作不知道，我更难过。所以我觉得——你知道了也好。」\n\n「这样就好了吗。」\n\n「嗯。」蛍抬起头，「因为现在你可以选择。是继续每天来看我，还是——」\n\n「雨宮蛍。」\n\n瞬的语气从未这样冷。\n\n蛍愣了。\n\n「你敢把后半句说完。」\n\n蛍看着他。他的眼睛在昏暗的房间里显得很深，像暴雨中的井。\n\n「瞬君，你生什么气。」她轻声说。\n\n「生气你对我这么好。」\n\n他说完这句话，自己都有点惊讶。\n\n蛍垂下了眼睛。她的睫毛在脸颊上投下淡淡的两道影。\n\n「不是对你好。」她说，「是对我自己好。因为如果你不知道，我每次在你面前笑的时候，都会觉得自己在撒谎。我不喜欢撒谎。」\n\n「所以你宁愿让我知道你要做手术。而那个手术的成功率——」\n\n「百分之六十二。」\n\n蛍自己说出来了。\n\n「而且手术成功也只是延长。根治是不可能的。一生要吃抗排斥药。一生要小心翼翼地活。」\n\n窗外，一道闪电劈下来。白光把房间照得雪亮，然后又暗下去。雷声紧跟着滚过来，震得书桌上的水杯轻轻晃荡。\n\n「瞬君，你知道吗。」蛍慢慢地说，「我从很小的时候，就明白了一件事。那就是——我对谁来说，都是负担。」\n\n瞬要开口。\n\n「听我说完。」蛍抬起手，「爸爸就是因为我，才离开的。」\n\n瞬沉默了。\n\n雨宮家的父亲，在蛍七岁那年离开了。瞬记得。那天蛍站在玄关，看着父亲提着箱子走的背影。她没有哭。甚至连表情都没有。\n\n那天晚上，瞬从自己家拿了三个草莓跑到她家。蛍接过草莓，吃了一个，然后说——\n\n「甜。」\n\n再也没有提过父亲的事。\n\n「所以我从那时候开始，就想好了。」蛍继续说，「我不会和任何人在一起。不会结婚。不会生孩子——」她顿了顿，「因为这个病，会遗传。我不想让任何人，再因为我而……离开。」\n\n「你是想说，你不想让我离开你。」\n\n蛍没有说话。\n\n她的手指抓紧了书页。\n\n「瞬君。你对我很重要。」她的声音低下去，「我没有什么别的东西了。我没有学校。没有工作。没有未来。我只有——窗台上的花。日历。收音机。还有你。就这么多。」\n\n「所以——在我还能这样和你说话的时候，我想对你好一点。不是因为我是好人。是因为——这就是我唯一能做的事。」\n\n她说完之后，低着头，看自己的手指。\n\n暴雨的声音铺天盖地。\n\n窗玻璃模糊成了一片水帘。\n\n瞬站起身。\n\n他走到她床前。弯下腰。伸出手——\n\n然后把她按进了怀里。\n\n蛍没有挣扎。她把脸埋在他的肩上，闻到他衣服上淡淡的洗衣液味道。她的肩膀微微地、轻轻地抖了起来。\n\n没有哭声。\n\n但她的眼泪，渗透了他肩膀的布料。\n\n「你听着。」瞬的声音在她耳边，「你不是负担。从来不是。」\n\n蛍没有说话。\n\n「你爸爸的事——不是你的错。你出生的时候，DNA不是你选的。心脏不是你选的。病不是你选的。」他的手臂收紧了一点，「你是那个留到最后的人。他们走了。你没有走。你每天划日历。你种桔梗花。你听收音机。你在窗户后面等一个人回来。你这样的人——不可能是负担。」\n\n蛍的眼泪流得更凶了。\n\n但她还是没有出声。\n\n只是肩膀抖得越来越厉害。\n\n雷声又响了一次。更远了。\n\n雨渐渐变小。\n\n---\n\n**蛍的日记 — 八月某日，暴雨**\n\n今天我说了很多不该说的事。\n\n瞬君听了。\n\n然后他说：「你不是负担。」\n\n他说了两次。\n\n我想相信他。\n\n但我知道，只要有这个病在——总有一天，我还是会变成他的负担。\n\n不只是他的。\n\n是所有人的。\n\n所以我其实不太在意成功率。\n\n百分之六十二也好，百分之九十九也好——对我来说都不重要。\n\n重要的是，我现在还能看着他。他还能坐在我的床边。天气好的时候，我还能趴在窗台上和他隔着巷子说话。\n\n这样就够了。\n\n阳台上的桔梗花开了第五朵。\n\n历翻到了八月。后面的日子，我不打算划了。\n\n让它们留着。\n\n至少看起来，还有很多空白可以填。\n\n晚安。瞬君。\n\n今天你的肩膀湿了，是我的眼泪。\n\n对不起。还有，谢谢。\n\n（第七卷 完）\n\n---\n\n*「你不是负担。」*\n*「从来不是。」*\n*——她哭了。而这是她七岁以后，第一次在别人面前掉眼泪。*\n'},
  {title:'第八卷 台场的摩天轮',content:'# 第八卷 台场的摩天轮\n\n九月。新学期开始了。而新学期意味着——陽菜意识到了一件事。\n\n准确地说，是她的闺蜜鈴木絵里帮她意识到的。\n\n那是一个周末。絵里窝在陽菜家的沙发上，一边吃薯片一边看陽菜的Ins。陽菜在厨房里泡茶。\n\n「ねえ——陽菜。」\n\n「嗯——」\n\n「你最近的更新——感觉怪怪的。」\n\n陽菜端着茶杯走出来。「哪里怪？」\n\n絵里把手机举起来，屏幕上是一张隅田川花火大会的照片：「这张。」然后她往后划了几张，「还有这张。」再划，「还有这张——」\n\n陽菜看着那些照片。花火、抹茶松饼、浅草寺雷门、便利店窗边的蜜瓜汽水。每一张都拍得很日常，有的人入镜，有的没有。\n\n「哪里怪了？」\n\n「这些照片里，有一半——」絵里用手在屏幕上画了个圈，「拍到了同一个人的背影。或者侧脸。或者一只手。」\n\n陽菜端着茶杯的手，不动了。\n\n「而且，」絵里放下手机，盯着陽菜，「你最近说『和朋友一起』的时候——从来没提过那个朋友的名字。但我们共同认识的那些人，你都会点名。」\n\n陽菜把茶杯放在茶几上。瓷器碰出了一声轻响。\n\n「他叫桜井瞬。」\n\n「……」\n\n絵里沉默了三秒。然后她把薯片袋啪地拍在桌上。\n\n「你完了。」\n\n「什么完了——」\n\n「你谈恋爱了。而且你自己还不知道。」絵里坐直身体，「不对——你大概隐隐约约地知道，但你在故意装傻。因为你害怕。」\n\n陽菜想要反驳，但她发现自己没有找到合适的措辞。\n\n絵里深深地叹了口气。她把手机还给陽菜。「你知不知道，你发那些照片的时候，给它们分组了没有？」\n\n「分了。」\n\n「可见范围？」\n\n「朋友可见——」\n\n「那你有没有注意到，」絵里扒着手机算了算，「这些照片，平均点赞数是——七个。」\n\n陽菜眨了眨眼。\n\n「你的Ins关注者有一百多个。」絵里说，「但点赞只有七个。说明他们都不怎么关注你发什么。而你呢，每一张都拍得很认真。构图、光线、滤镜——全部花了很多时间。」\n\n陽菜没有说话。\n\n她忽然想起瞬在便利店里说的话——\n\n「你是不是用热闹来骗自己。」\n\n「所以，」絵里的声音软下来，「那个叫桜井的男生——他点赞了吗？」\n\n「他不怎么用社交媒体。」\n\n「那他在你发照片的时候，做什么了。」\n\n陽菜低头看着茶杯。茶面上的热气缓缓摇晃。\n\n「他会吐槽我。说我把食物拍得太认真了，有一种奇异的压迫感。」\n\n絵里愣了一下，然后哈哈大笑起来。\n\n「那种人——」她一边笑一边喘，「那种人，才值得你追。」\n\n陽菜抬起头。\n\n「因为他说的是实话。而你需要听实话。」絵里认真地看着她，「听朋友夸你，很舒服。但听他说你——你才会想起来你是谁。」\n\n陽菜把茶杯握紧了一点。\n\n「可是他……有一个很重要的人。」\n\n「女朋友？」\n\n「不是。」陽菜摇了摇头，「是青梅竹马。从小一起长大。就住他家对面。」\n\n絵里的手指在薯片袋上轻轻敲着。过了好几秒，她说：「陽菜。你有没有想过，你一直不表白——不是因为怕被拒绝，而是因为你怕打破了什么东西。」\n\n陽菜低头看着自己的手指。\n\n絵里又说：「但是你想过没有——如果你们三个人都不动，那就永远是这个样子。而有些东西，是经不起『永远这个样子』的。」\n\n第二天。陽菜给瞬发了一条LINE——\n\n「这个周六，去台场。别问为什么。也别说不去。十点，临海线。」\n\n瞬的回复来得很慢。过了三分钟——\n\n「你知道台风13号正在靠近吧。」\n\n陽菜打开天气预报App。确实有个台风在太平洋上转悠。她咬了咬嘴唇，回：「不是还没到吗。周六天气可以的。周六之后台风才登陆——你查。」\n\n又过了两分钟。\n\n「已查。你说得对。周六多云转晴。风力三级。」\n\n「对吧——」\n\n「但你上周三也查了天气，结果淋成落汤鸡。你确定这次会看天气预报了？」\n\n「那次是意外！」\n\n「行。十点。」\n\n陽菜把手机放下，发现自己嘴角是翘着的。\n\n周六，台场。\n\n台风前的天空，澄净得不可思议。云被前夜的雨洗得一干二净，只留下纯粹的、一眼望不到底的蓝。\n\n陽菜和瞬并排走在临海线的出口。海风迎面扑来，带着淡淡的咸味和远处游乐园的音乐。\n\n「你知道吗，台场这个摩天轮，」陽菜指着前面巨大的圆形建筑，「直径一百一十五米。一个车厢可以坐六个人。转一圈是十六分钟。」\n\n「你在背维基百科。」\n\n「因为今天雾有点大，」陽菜的耳朵微微一红，「所以我提前做了点功课——既然是台场，总不能什么都不知道吧。」\n\n「你只需要知道一件事。」\n\n「什么事？」\n\n「摩天轮的票，我已经买了。」\n\n陽菜转头看他。\n\n瞬的表情很平淡，像是他只是去买了两罐咖啡。\n\n「你什么时候买的——」\n\n「你发LINE的那天晚上。网上买的。」\n\n「瞬君——你不是来陪我的吗——」\n\n「是陪你的。」瞬走在她前面半步，「但买票这种事，让女生花钱不太好。」\n\n陽菜快步跟上去，走到他身边。\n\n他们登上摩天轮的时候，阳光恰好从云缝里漏下来。车厢缓缓上升。台场的景色在脚下慢慢铺开——彩虹大桥、东京湾、远处的房总之山。海面上有白色的帆影，天空中有飞翔的水鸟。\n\n「好漂亮——」\n\n陽菜趴在玻璃窗前，眼睛贴在玻璃上。和花火大会时一模一样的表情。\n\n瞬靠在另一侧，看着她。\n\n车厢缓缓攀升。\n\n「陽菜。」\n\n「嗯——」她没回头。\n\n「你今天——是不是有什么事要说。」\n\n陽菜的动作停住了。她的手指按在窗玻璃上，留下一个淡淡的指纹。\n\n「为什么这么问。」\n\n「因为你今天话比平时少。而且从出门到现在，你没有看过一次手机。」\n\n陽菜慢慢转过身。在小小的车厢里，他们面对面。海面上粼粼的波光透过玻璃，投在她的脸上，幽幽地晃着。\n\n「瞬君。」她说，「你觉得摩天轮的设计师——为什么要把车厢设计成这样？」\n\n「因为视野好。」\n\n「我是说，为什么是一对一对地坐。」\n\n「……」\n\n「不说话的意思是你懂了。」\n\n车厢升到了最高点。整个东京湾都在脚下。远处的楼群在九月末的光里，恍恍惚惚，像海市。\n\n「瞬君。我想说的事——」陽菜看着他，「其实你大概已经猜到了。因为你很聪明。太聪明了——聪明到，有些话我不说出来，你也知道我要说什么。」\n\n瞬没有说话。他的目光落在陽菜的脸上，看着她眼中微微晃动的波光。\n\n「但是我今天不说了。」陽菜弯起嘴角，「因为你还没有准备好。」\n\n「陽菜——」\n\n「没关系的。」陽菜打断他。她的声音很轻，但很稳，「我可以等。等我准备好的时候——或者等你准备好的时候——」她深吸了一口气，「——或者，等那个不想让任何人准备好的时候。」\n\n车厢开始缓缓下降。\n\n陽菜重新转向玻璃窗。台场的街景慢慢升回来切断了海面的视线。\n\n「那家可丽饼店据说很不错。」她指着下面，「下去吃吧。」\n\n瞬没有动。\n\n陽菜：「怎么了——」\n\n「没什么。」他说，「走吧。」\n\n摩天轮缓缓停稳。他们走出来的时候，陽菜走在前面，脚步轻快——和来时一模一样。\n\n但她没有回头。\n\n瞬看着她扎着马尾的背影。海风把她的碎发吹起来，像一面很细很细的丝线。\n\n他忽然想起一句不该想起的话。\n\n是蛍说过的——\n\n「如果有那么一天，瞬君遇到了一个比我更适合的人，我会更开心。」\n\n他站在原地。台场九月末的海风，把他的头发也吹乱了。\n\n---\n\n那天晚上。陽菜回到家，把台场的照片发了一张到Ins上——\n\n照片是摩天轮的车厢玻璃上映出的一枚云倒影。没有人出现在画面里。配文只写了三个字：「快了。」\n\n絵里秒回了一个「？」，然后「！」，然后直接打电话过来。\n\n「你说的什么快了！」\n\n「秘密。」\n\n「你——」\n\n「我真的说出口了。虽然不是全部。但是——快了。」陽菜躺在床上，看着天花板，「絵里。我害怕得手心全是汗。但是我没哭。而且我说完之后——觉得很轻松。」\n\n「你怕什么。」\n\n「我怕他会因为另一个人，拒绝我。」\n\n电话那头安静了几秒。然后絵里说了一句——\n\n「那如果他没有呢。」\n\n陽菜没有回答。\n\n她握着手机，听着絵里在那边轻轻地叹了口气。\n\n「陽菜。不管结果怎样——至少你说了。这个世界上，有很多人一辈子都没有把真心话告诉过任何人。你做到了。」\n\n陽菜按掉了通话。\n\n她翻身朝向墙壁。窗外的东京灯火，在墙壁上投出淡淡的光斑。\n\n她把手掌贴在墙壁上。凉凉的。像秋天。\n\n台场之后，从摩天轮下来的那一瞬间，她看着他的背影——\n\n忽然意识到。\n\n如果失去了他，自己大概会很痛苦。\n\n可是她从来没有得到过。\n\n没有拥有过的东西，要怎么失去呢。\n\n她开始不明白自己在想什么了。\n\n后来她翻了个身。\n\n手机亮了一下。\n\n瞬的LINE——\n\n「今天的可丽饼挺好吃的。」\n\n陽菜盯着这行字。\n\n然后把脸埋进枕头里。\n\n笑了。\n\n---\n\n**蛍的日记 — 九月某日，台风前夕**\n\n今天瞬君去了台场。\n\n他出门的时候在巷子里站了一会儿，抬头看我的窗户。我冲他挥了挥手。他说：「去台场。陽菜约我。」\n\n我说：「玩开心点。」然后关上了窗。\n\n因为他没有看到我的表情。\n\n窗帘后面，我在发抖。\n\n不是因为生气。是因为——我知道陽菜さん今天要说什么。虽然瞬君没有讲，但我知道。一个女生约一个男生去台场的摩天轮——那只有一个理由。\n\n我没有生气。\n\n我只是害怕。\n\n害怕他回来之后告诉我：「陽菜对我表白了。」\n\n害怕他会问我：「我该怎么办。」\n\n也害怕他不会问我。\n\n他的LINE来了——只有一句话：「我回来了。」\n\n没有提摩天轮的事。没有提陽菜说了什么。\n\n他不知道——他不知道我整个下午都在盯着手机。手机屏幕暗了我按亮，亮了我又不敢看。\n\n妈妈来送稀饭的时候看到我的脸，问我是不是不舒服。我说没有。她说：「你脸色很差。」\n\n她不知道那不是因为心脏。\n\n是因为那个人。\n\n晚安。瞬君。\n\n（第八卷 完）\n\n---\n\n*「我今天不说了。因为你还没有准备好。」*\n*她说这句话的时候，摩天轮恰好经过最高的顶点。*\n*车厢开始下降。*\n*有些话错过了最高点——就只能在下降中等待另一个上升。*\n'},
  {title:'第九卷 秋叶原的午后',content:'# 第九卷 秋叶原的午后\n\n十月中旬。秋意渐浓。\n\n这天下午没课。瞬在自家客厅里看着书，被健太一通电话叫了出去——理由是：「紧急！优要买限定版手办，我们都没审美，你快来！」\n\n于是桜井瞬就这么被拖着去了秋叶原。\n\n中央通。周日的人潮比平日多了一倍。到处都是举着应援扇的宅男、拖着行李箱的外国游客、以及举着女仆咖啡店招牌的打工店员。巨大的电子屏幕在头顶闪烁，动画主题曲和便利店的门铃混在一起，轰炸着每个人的耳膜。\n\n「所以我为什么要来。」瞬站在Radio会馆门口，面无表情地看着优趴在一排玻璃柜前久久挪不动步。\n\n「因为你需要晒太阳。」健太拍了拍瞬的背。\n\n「我不需要。」\n\n「你都快变成吸血鬼了。不对——吸血鬼都比你有社交。」\n\n「吸血鬼不社交。它们住城堡。」\n\n「那是你未来的自画像。谢谢确认。」\n\n瞬决定不和这个体育系肌肉男比吐槽功力。\n\n他们在秋叶原逛了将近两个小时。优最终买下了一个初音未来的限定手办——包装盒子比他的脸还大。健太买了一副耳机——说是为了打FPS听脚步声。瞬——什么也没买。\n\n「瞬。你有想要的东西吗。」健太忽然问。\n\n「没有。」\n\n「我说的是——什么都行。想要的。」\n\n瞬想了想。\n\n「安静的环境。」\n\n「除了这个——」\n\n「没了。」\n\n优抬起眼镜，看了瞬一眼。然后他说了一句完全不像是他会说的话——\n\n「瞬。你今天怪怪的。虽然平时也怪。但今天尤其怪。」\n\n「哪里。」\n\n「你刚才在动漫周边区，看到命运石之门的周边都没停。」\n\n瞬没有说话。\n\n健太和优对视了一眼。\n\n他们都知道瞬对《命运石之门》的感情。这不是什么「喜欢的游戏」那么简单——高中的时候，有一次瞬在蛍的病床边，用手机放了全部的广播剧。蛍听完后说了一句话：「如果我也能跳线就好了。」\n\n从那之后，命运石之门在瞬心里就有了一种近乎仪式般的分量。\n\n所以他不去看周边，只能是——他不愿意想起「跳线」这件事。\n\n三人从中央通拐进了一条小街，找了家二楼的家庭餐厅。点了三份蛋包饭，三杯饮料，坐在窗边。\n\n「和你那个青梅有关吗。」优问。\n\n瞬没有否认。\n\n「她情况不好？」健太把声音压低了一点。\n\n「手术可能提前。下个月。」\n\n「成功率——」\n\n「百分之六十二。」\n\n健太沉默了。他用吸管搅了搅可乐。冰块发出清脆的碰撞声。\n\n「而陽菜那边——」优又推了推眼镜，「她对你是什么态度，你应该清楚吧。」\n\n瞬抬起眼睛。\n\n「优。你是我们三个里最不爱说话的。你今天话怎么这么多。」\n\n「因为再不说话，你就要自己把自己关死了。」优看着窗外的广告牌，「你这个人，遇到事情，就像乌龟缩进壳里。壳是你的书柜和耳机。但这次的事——不是一本书和一首交响乐能解决的。因为你面对的不是书。是两个活人。」\n\n健太在旁边默默地吃着蛋包饭。咀嚼的声音忽然变得格外清晰。\n\n瞬把叉子放下。\n\n「那你们说，我应该怎么办。」\n\n健太把嘴里的饭咽下去。\n\n「如果是我——」\n\n「如果是你，你的情感处理方式是写一百条LINE然后第二天假装没事。」优打断他。\n\n「……」\n\n健太的三角肌肉眼可见地垮下去了。\n\n优转过头看着瞬。\n\n「你先想清楚一件事。你对雨宮——是责任还是感情。你对高橋——是习惯还是喜欢。」\n\n「有区别吗。」\n\n「当然有。责任是『因为她在等我』。感情是『因为我想去找她』。习惯是『她在真好』。喜欢是『她不在了我不知道怎么办』。」\n\n瞬握着饮料杯的手指，不自觉地收紧了。\n\n优说完之后，自己也有些意外。他端起橙汁喝了口，小声嘟囔：「好像说得太多了——」\n\n健太在旁边张着嘴，愣了足足有五六秒，然后说——\n\n「佐藤優。你是被什么附身了？」\n\n优没有回答。\n\n窗外的秋叶原，霓虹灯一盏盏亮起来。电子屏幕上的虚拟偶像换了一首歌，是一首节奏很快的电音。餐厅里有个小孩在哭，有位妈妈在哄。远处女仆咖啡店门口的店员在喊：「ご主人様——お帰りなさい——」\n\n瞬忽然开口。\n\n「小的时候。有一次冬天下雪。蛍在我家门口堆了一个雪人。她自己只出去堆了十分钟——」\n\n「然后呢。」健太问。\n\n「然后发烧了。烧了四天。从那以后，她就再也没碰过雪。」\n\n他把饮料杯转了一圈。\n\n「那时候我就想——以后，不能让蛍一个人。因为如果她是一个人的话，发烧的时候没人叫医生。晕倒的时候没人扶。划日历的时候——没人问她今天是什么日子。所以我要在。不是因为她需要我。是因为如果我不在，她的世界就更小了。」\n\n他停顿了很长的一段时间。\n\n「但现在不一样了。」\n\n「因为她不是一个人了。」优接道。\n\n「对。现在还有陽菜。」\n\n瞬说这句话的时候，声音没有变。但健太和优都注意到了——他用了「还」。不是「因为陽菜在」，而是「因为陽菜也在」。\n\n「那问题就很简单了。」健太把空了的蛋包饭盘子推到一边，把两张手臂交叉在桌上，「你喜欢谁。」\n\n瞬没有回答。\n\n「你不知道。」优替他说了。\n\n「不是不知道。」瞬说，「是——我没有资格喜欢任何人。因为喜欢这种事，是要给对方未来的。」\n\n健太和优同时沉默了。\n\n窗外的霓虹灯又换了一个颜色。\n\n瞬拿起杯子，把剩下的饮料喝光了。\n\n「……我回去了。」\n\n他站起来，把餐费放在桌上。\n\n「瞬——」健太转头看着他。\n\n「我只是需要走走。秋叶原到世田谷。三个小时。够想了。」\n\n他走出了家庭餐厅的门。\n\n夜色已经完全降下来了。秋叶原的夜晚，灯光比白天更亮。大屏幕上一个动画角色的眼睛，泪水滑落，被一个麦克风接住。\n\n瞬没有看。\n\n他沿着中央通往西走。穿过上野，穿过鶯谷，穿过日暮里。\n\n他耳机里放的是巴赫的无伴奏大提琴组曲。\n\n第一号。前奏曲。\n\n琴弦一根一根地响。像黑夜里的心跳，不急，不慢，不带任何情绪。\n\n但他听了三遍。\n\n因为他在想陽菜说的话。\n\n——「因为关注一个人，就会学会。」\n\n也在想蛍划日历时的笔迹。\n\n——红笔，一笔一笔，纸都快划破了。\n\n巴赫播到第四遍的时候，他走到了家门口。\n\n巷子里的灯亮着。二楼的窗户开着。蛍不在窗台上——她的灯暗着。\n\n瞬拿出手机。没有新消息。\n\n他正打算进家门的时候——\n\n「シュン——」\n\n蛍的声音。不是从对面二楼传来的。而是——从巷子尽头。\n\n瞬转过头。\n\n蛍坐在轮椅上，停在巷子尽头的电线杆旁边。披着一条薄薄的毯子。路灯把她的影子拉得很长。\n\n「你怎么出来了。」\n\n「我想看星星。」蛍指了指头顶，「今晚可以看到猎户座。」\n\n瞬走过去，在她旁边蹲下来。\n\n他顺着她手指的方向，看到高层楼之间那一小片暗蓝色的天空。猎户座的七颗主星，在这都市的灯光里若隐若现。\n\n「你是等着我回来吧。」\n\n「被发现了。」蛍笑了一下，「因为你今天去秋叶原了。那是个快乐的地方。快乐之后回来，容易觉得冷清。所以我想——巷口有个人的话，可能好一点。」\n\n瞬蹲在她旁边，看着前方巷子的石板路。\n\n「蛍。今天优跟我说了一件事。」\n\n「什么事。」\n\n「他说——『你先想清楚。你对雨宮是责任还是感情。』」\n\n蛍没有转头看他。她的目光依旧在天上。但她握着轮椅扶手的手，紧了又松了。\n\n「那你想清楚了吗。」\n\n「没有。」瞬说，「但是我想了一路。最后的结论是——」\n\n他转过身，看着蛍。\n\n「不管是什么。我不会让你一个人。」\n\n路灯光落在他们之间。\n\n蛍沉默了一会儿。然后她说——\n\n「瞬君。你知道吗。你这句话——是我这辈子听过最开心的一句话。也是最难过的一句。」\n\n晚风吹过，树影动了动。\n\n「回家吧。」蛍说，「外面凉。」\n\n瞬站起来，推着她的轮椅往巷子深处走。\n\n两人都没再说话。\n\n但蛍的手背不知道什么时候湿了。\n\n而她希望瞬不要发现。\n\n---\n\n**蛍的日记 — 十月某日，星夜**\n\n今晚看见了猎户座。\n\n其实不算是「看见」。只是透过高层楼之间的缝隙，辨认出了那三颗并排的腰带星。其他的部分被城市的光遮住了。\n\n瞬君今天去了秋叶原。\n\n他回来后没有立刻进屋。他在巷子里蹲下来，和我一起看星星。\n\n他说：「我不会让你一个人。」\n\n这句话应该是全世界最好听的话。\n\n但我听了之后很难过。\n\n因为我忽然想到——如果有一天，他真的不在了。那剩我一个人，也在他的世界里找不到他了。那句话就不算数了。\n\n就像猎户座。三颗腰带星看得见，但整个星座其实比那大得多。\n\n我们能看到的部分，永远只是光到达我们的部分。\n\n我不知道我还能看见多久。\n\n但今晚——他推着我回家的那段路，我会记得。\n\n晚安。\n\n瞬君。\n\n晚安。秋夜。\n\n（第九卷 完）\n\n---\n\n*「我不会让你一个人。」*\n*「这句话是我这辈子听过最开心的一句。也是最难过的一句。」*\n*——因为她知道，有些承诺是做不到的。*\n*不是不愿意做。而是命运决定，不让他做。*\n'},
  {title:'第十卷 代代木公园的落叶',content:'# 第十卷 代々木公園的落叶\n\n十一月。银杏黄了整条青山通。\n\n这个季节的代々木公園，地上铺着厚厚一层金黄色的银杏叶，踩上去会发出干燥而清脆的声响。周六下午的阳光很好，照得每一片叶子都在发光。\n\n蛍是临时说想出门的。\n\n她的原话是：「今天没有风。温度也是十九度。可以出去吗。」\n\n瞬正在自己房间里看书。他看到这条LINE后，把书合上了。\n\n他先去雨宮家问静子。静子说蛍这几天状态还算稳定，出去走走应该没问题。但要在天黑前回来。还要带药。\n\n轮椅推出来。蛍今天穿了一件白色的毛衣，领口有点大，露出锁骨。外面是卡其色的风衣——去年瞬和美咲一起挑了送她的生日礼物。\n\n「去哪儿。」\n\n「代々木公園。银杏叶应该很好看了。」蛍顿了顿，「瞬君在电视里看到的。」\n\n「你什么时候看电视了。」\n\n「下午。NHK的风景节目。」\n\n瞬推着她往车站走。两人上了小田急线。车厢不算挤。蛍坐在轮椅上，瞬站在她旁边。\n\n窗外，东京西部的住宅区缓缓后退。\n\n「好久没有坐电车了。」蛍看着窗外，「上一次——大概是一年前吧。」\n\n「去年也是去看银杏。」\n\n「嗯。但去年是妈妈带我去的。瞬君那天在考试。」\n\n「对。期末。」\n\n「我记得你回来之后说——『考砸了。但银杏应该很好看。』」\n\n瞬的嘴角动了动。\n\n到了代々木公園。轮椅碾过银杏叶的时候，发出了一种像是翻开旧书页的声音。\n\n「好看吗。」\n\n「嗯。」蛍仰着头，看着两排银杏树形成的那条金色隧道，「和电视里看的不一样。电视只能拍到一个画面。但这里——可以看到左边、右边、上面、远处。还有风吹过来的感觉。」\n\n瞬停下轮椅，在她旁边蹲下来。\n\n蛍闭着眼睛。银杏叶的影子落在她脸上，一明一暗一明一暗。\n\n「真好啊。」她睁开眼，「活着，真好啊。」\n\n瞬没有回答。\n\n因为他知道蛍说这句话的时候，不是感叹，而是一种确认。她在确认自己还活着。用阳光、银杏叶、风，来确认自己的心跳还在。\n\n他们继续往公园里面走。经过篮球场，经过一片空旷的草地，经过一个卖热狗的小摊。就在小摊旁边——瞬看到了一个熟悉的身影。\n\n高橋陽菜。\n\n她站在热狗摊前，手里举着两个热狗，正在转身——\n\n然后他们的目光撞在了一起。\n\n陽菜的表情，在一瞬间变了好几个层次。先是他乡遇故知的惊喜，然后是看到蛍时的柔软，再然后——是一种瞬没见过的、从她脸上快速滑过的东西。\n\n像是心酸。\n\n但那表情只存在了不到一秒。\n\n「瞬君——蛍ちゃん——」\n\n陽菜抱着两个热狗跑过来。她的声音还是那么明亮，步伐还是那么快。\n\n「你们怎么也在这里——好巧——」她在蛍的轮椅前弯下腰，「蛍ちゃん好久不见——你头发是不是又长了一点——」\n\n「嗯。有一阵子没剪了。」蛍轻轻笑了笑，「陽菜さん，你好。」\n\n「我今天是和絵里一起来的——絵里——」\n\n瞬顺着陽菜指的方向，看到一个戴贝雷帽的短发女生正往这边走来。絵里手里也举着两杯咖啡。\n\n絵里的眼神比陽菜锐利得多。她打量了一下瞬，又打量了一下蛍，再看了一眼陽菜脸上的笑容，然后——\n\n她没有说任何话。\n\n只是礼貌地点了点头。\n\n「既然碰上了，要不要一起走？」陽菜看着瞬和蛍。\n\n瞬看了一眼蛍。蛍点了点头。\n\n于是四人一起沿着银杏大道往深处走。\n\n絵里牵着陽菜的手走在前面。瞬推着蛍走在后面。\n\n陽菜时不时回头和蛍说话——\n\n「蛍ちゃん你看——那片叶子好大——」\n\n「那边有人在遛一只超大的秋田犬——」\n\n「蛍ちゃん你平时出门吗——」\n\n「很少。」蛍说，「所以今天看到银杏很开心。」\n\n陽菜转过头去。瞬看到她肩膀动了一下，像是深呼吸。\n\n絵里忽然停下脚步。\n\n「陽菜——我想去一下卫生间。你陪我。」\n\n她拉着陽菜快步走开了。\n\n银杏树下的长椅旁边，只剩下瞬和蛍。\n\n「絵里さん，是陽菜さん最好的朋友吧。」蛍看着她们的背影说。\n\n「应该是。」\n\n「她刚才看我的眼神——不是讨厌。是戒备。」\n\n瞬低下头看着蛍。「你说什么呢。」\n\n「因为她知道，我是陽菜さん的某种——障碍。」蛍的声音很平静，「她为陽菜さん着急。这是对的。真正的好朋友，都会着急。」\n\n「你不是障碍。」\n\n「是不是，不重要。」蛍抬头看向前方的银杏大道。陽菜正和絵里并肩走过来，陽菜似乎在解释什么，絵里抿着嘴没说话。「重要的是，陽菜さん自己心里怎么想——她是什么时候开始觉得我是她的障碍了呢。」\n\n陽菜和絵里回来了。絵里的表情比刚才平静了些。\n\n「那个——我们要去渋谷那边——」陽菜的声音有一点不自然，但很快就恢复了，「蛍ちゃん，瞬君，今天能遇到真的很开心。」\n\n「我也是。」蛍轻轻点了点头，「陽菜さん，改天——来我家玩吧。虽然没什么东西招待你。」\n\n陽菜愣了一下。\n\n「可以吗？」\n\n「嗯。」蛍说，「只要你不介意房间里有药味。」\n\n陽菜看着蛍，然后很认真地摇了摇头：「不会介意的。」\n\n四人分别。\n\n瞬推着蛍往车站走。走到银杏大道的尽头，他忽然停了下来。\n\n「刚才，絵里跟你说什么。」蛍问的是瞬没有跟过去听她们讲的对话。\n\n「我去打听也听不到。」\n\n「你猜。」\n\n「大概是在跟陽菜说——『那个轮椅上的人，就是你情敌吧』。」\n\n蛍低着头。然后她轻声说：「不是的。我不是她的情敌。她是我的——」她顿了顿，「我是什么好呢。可能是——如果我有一个妹妹的话，希望她长成的样子。」\n\n这一次，瞬没有回答。\n\n银杏叶在他们身后落了一地。\n\n晚上。陽菜一个人坐在自己房间的床边，手里握着一杯已经凉透的茶。絵里今天说了很多话。在代々木公園分开之后，在渋谷的家庭餐厅里，絵里把手放在桌上，一字一字地说：\n\n「陽菜。你一定要想清楚。那个男生身边的位置——永远有一个人。你每往前走一步，都得算上她。」\n\n陽菜当时回答：「我知道。」然后沉默了很久。\n\n絵里又说：「我不是在说你不能喜欢他。我是说，你得想好自己受不受得了。」\n\n陽菜依然说：「我知道。」\n\n但是絵里最后问了一句：「那假如有一天——他必须在你们两个之间做选择呢。你觉得他会选谁。」\n\n陽菜没有回答。\n\n现在她坐在自己房间里，看着手机屏幕上瞬的头像——那是一只从书页间探出头来的猫。他不用自己的照片做头像。\n\n她开始打字：「今天遇到真的很开心——蛍ちゃん看起来状态不错呢——」\n\n发送。\n\n已读。\n\n瞬回复：「今天是专门带她去看银杏的。她看到你们很开心。」\n\n陽菜盯着「专门带她」四个字。\n\n然后她闭上眼睛，把手机翻面放在桌上。\n\n心里那头扎得很深的小野兽醒了一下。\n\n它说：「你看。他先想的是她。不是因为你约他才出门的。而是因为他要先带她出门。你们只是偶遇。」\n\n陽菜按住那头小野兽的头，把它按回去。\n\n然后她重新拿起手机：「那下次一起去啊——我查了十二月也有一个好天气——」\n\n发送之后她看着屏幕。\n\n已读。没回复。\n\n她把手机放下来。从桌上抽出一张便签纸，用圆珠笔写了几行字：\n\n「如果有一天，」\n「你的眼里，」\n「不再只有她的身影。」\n「那我——」\n「会告诉你。」\n\n然后把便签纸折成一小块，放进抽屉里。抽屉里已经有四张叠得大小不一的便签了。\n\n她关上抽屉，打开窗。\n\n十一月的夜风灌进来，冷得她打了一个寒颤。东京塔在远处亮着，温暖而遥远。\n\n她给絵里发了一条LINE：「我决定等。」\n\n絵里的回复来得很快：「我怕你等不起。」\n\n陽菜没有回复。但她也没有睡着。一直到凌晨三点，她还在翻来覆去地想着银杏树下那个淡淡笑着、坐在轮椅上、说「只要你不介意房间里有药味」的女孩。\n\n她想起一本书。内容是某个少女爱上某个少年。少年身边有一个不能行走的未婚妻。少女犹豫了很久，最后决定告白。而告白那天——\n\n陽菜想不起结尾了。她把那本书找出来，翻到最后一页。\n\n结尾是——\n\n「她终于决定说出来的时候，才发现已经太晚了。」\n\n陽菜把书合上，盯着天花板。\n\n然后她很小声地说了一句：「我不信。这次不会太晚的。」\n\n---\n\n**蛍的日记 — 十一月某日，晴**\n\n银杏叶很美。\n\n瞬君的手指很美。他握着轮椅把手的时候，指节分明。\n\n陽菜さん出现的时候，我看到了她脸上的所有变化。那些变化的专业术语在心电图上都见过：首先是一过性心律不齐，然后是ST段压低，最后是代偿性心动过速。\n\n开玩笑的。\n\n只是她眼里的东西，我全都认识。\n\n因为那些东西，以前在我的眼睛里也住过。\n\n其实我可以做一件事——在陽菜さん面前故意和瞬君靠得很近。说些只有我们两个人才知道的小时候的事。让她觉得插不进来。\n\n但我没有做。\n\n不是我人品好。而是我觉得——陽菜さん在银杏树下看到我们时候的表情，很像小时候站在玩具店玻璃窗前、口袋空空的我。\n\n那时候瞬君陪在我旁边，指着里面的洋娃娃说：「等你生日我买给你。」\n\n他真的买了。\n\n然后那个洋娃娃，一直放在我的枕头旁边。\n\n可是瞬君不是洋娃娃。瞬君不是我可以买到的。他也不是我可以让给谁的。\n\n他是他自己的。\n\n所以我只能把所有的事情都放在窗台上。让风吹。让太阳晒。让夜雾打湿。\n\n晚安。瞬君。\n\n晚安。银杏叶。\n\n晚安。那颗隐隐作痛的心。\n\n（第十卷 完）\n\n---\n\n*「我怕你等不起。」*\n*絵里说。*\n*陽菜没有回复。*\n*但她把台场的摩天轮门票，夹在了日记本的第一页。*\n*那是他们离得最近的十六分钟。*\n'},
  {title:'第十一卷 下北泽的演出',content:'# 第十一卷 下北沢的演出\n\n十一月末。大学文化祭。\n\n東都大学的校园里搭满了临时的帐篷和舞台。炒面、章鱼烧、苹果糖的香气混在一起，飘在银杏叶落尽的树枝间。广播里不停循环着各社团的活动预告。有人在发传单，有人在穿玩偶服摇摇晃晃地走。\n\n陽菜是轻音部的键盘兼主唱。这件事瞬是知道的——开学不久陽菜就在他耳边唠叨过十几次。但他这是第一次看她在台上演出。\n\n下北沢的一个小Livehouse，被轻音部借来做文化祭特别演出的场地。场子里站了大概七八十个人。瞬被健太和优架在中间——意思是强行拖来。\n\n「你就不能自己来看看吗——每次都让陽菜ちゃん招呼——」健太小声说。\n\n「我来了。」\n\n「是优提醒你来的——不算——」\n\n「安静。」优把眼镜推上去，「开场了。」\n\n灯光暗下去。台上几个乐手站位就绪。然后——\n\n陽菜从侧幕走出来。\n\n她穿了一件黑色的连衣裙，头发束成高马尾。舞台灯光打在她身上，把她整个人都勾勒出轮廓线。\n\n她走到麦克风前，没有立刻开口。而是环顾了一圈台下。目光在瞬的位置停留了一下——那就只有一小下。\n\n然后她笑了一下。\n\n「今日は——来てくれてありがとう。一、二——」\n\n鼓点起。吉他跟进。贝斯铺底。\n\n陽菜开口唱了。\n\n是一首J-ROCK。瞬没有听过这首歌。但歌词里有几句很清晰——\n\n「どうでもいいって思ってた／誰かの言葉が／今日はやけに胸を刺すのは／たぶん——」\n\n她唱歌时的表情，和平时完全不一样。没有大大咧咧的笑，没有挥手示意。只有专注——认真的、把每一个毛孔都浸在旋律里的专注。\n\n瞬站在人群中，看着陽菜的脸。他想起第一次在咖啡店见到她的时候，她举着手机备忘录找食物。那时的她和现在台上的她，像是同一个人，又有哪里不同。他想到一半，发现自己的心跳在跟着鼓点走——这说明不是马勒也不是巴赫，而是鼓膜附近有把吉他。\n\n演出结束。陽菜从侧幕跑出来，直接冲向人群中的瞬。\n\n「どうだった——」她额头上还有薄薄一层汗，呼吸也没完全平复。\n\n「不赖。」\n\n「就这——」\n\n「比不赖好一点。大概。」\n\n「你怎么这样——我练了两个月的好吗——」陽菜对着他的肩膀锤了一下，力道轻得像拍灰尘。\n\n健太在旁边开口：「超棒的——陽菜ちゃん你唱歌的时候，瞬全程眼睛没离开舞台——」\n\n「健太。」\n\n「呃——我什么都没说——」\n\n陽菜的眼睛亮了一下。但她没有追问。只是抿着嘴笑，用手指绕着马尾的发梢。\n\n「对了——」她忽然转头看向瞬，「蛍ちゃん呢？不是说一起来吗——」\n\n瞬的视线朝侧后方扫了一眼。蛍坐在轮椅里，在舞台侧方一处不起眼的角落里。静子陪在她身边。蛍穿着白色高领毛衣，膝盖上盖着一条暗紫色的毯子。\n\n「她来了。」\n\n陽菜顺着瞬的视线看过去，然后快步走过去。\n\n「蛍ちゃん——你来了——」她在轮椅前蹲下身，「怎么样——还能受得了吧——声音有没有太大声？」\n\n「不大。刚刚好。」蛍轻声说，「陽菜さん唱得真好。尤其是第二段副歌的部分——那句『全部間違いじゃなかった』。我很喜欢。」\n\n陽菜愣住了。她没想到蛍会认真听歌词，还能准确复述出来。\n\n「……ありがとう。」陽菜的声音哑了一点，「能被你这样说，真的很开心。」\n\n蛍抬眼看着她。\n\n「陽菜さん。我有一个小小的请求。」\n\n「什么——」\n\n「下一首歌——可以唱慢一点的吗。比如——」蛍想了想，「スピッツ的《ロビンソン》。瞬君以前很喜欢。」\n\n陽菜的眼睛眨了一下。\n\n「可以。当然可以。是献给蛍ちゃん的特别表演——」她站起来转头对身后的乐队成员挥手，「喂——我们加演一首！スピッツ，《ロビンソン》——」\n\n于是安可曲变成了慢板。スピッツ的旋律在Livehouse的狭窄空间里荡开来。那句「誰かの願いが叶うころ」响起的时候——\n\n蛍闭上了眼睛。\n\n她的睫毛轻轻颤着。\n\n瞬站在舞台侧边，远远地看着闭着眼睛的蛍。\n\n他想起自己很喜欢《ロビンソン》的时候，是初中三年级。那段时间他每天放学都在雨宮家的客厅里放这首歌。蛍躺在沙发上听，听完说：「这个人唱得好温柔，像秋天。」后来她的病房那几年，他在床边又放过一次。她睁开眼说：「还是秋天。」\n\n现在的Livehouse是地下空间，没有一扇窗。但蛍闭着眼睛的样子，像是看到了外面银杏落尽的枝头。\n\n演出结束后，Livehouse里剩下散场的喧闹。陽菜在后台收拾乐器和线材。\n\n「陽菜——」\n\n瞬靠在后台门口。\n\n陽菜转过头。马尾因为汗湿有点散，碎发贴在脖子上。\n\n「辛苦了。」他说。\n\n「就这样——」\n\n「还有——蛍说，你唱的那句『全部間違いじゃなかった』——她说谢谢。」\n\n陽菜拿着麦克风线的手停了下来。\n\n「瞬君。那首歌的歌词——你听懂了吗。」\n\n瞬没有回答。\n\n陽菜笑了一下。她把线材卷好，从地上捞起外套披在身上。\n\n「其实歌词是说——一个人站在舞台上说谢谢。不是对所有人说的。是对某一个人说的。但说出来之后，所有人都听到了。」\n\n她把外套的拉链拉到一半。\n\n「我就是那样。我对蛍ちゃん说谢谢是真的。但我唱的时候脑子里想的人——你。」\n\n她抬头，直视他的眼睛。\n\n「就是你。」\n\n后台很安静。只有棚顶上通风管道低沉的嗡嗡声。走廊那头的乐队成员在笑闹。而他们的这段距离中，没有声音。\n\n瞬伸出手。他的手在半空中停了一下。然后——他把陽菜肩上滑落的外套拉了上去。\n\n「冷。把拉链全拉上吧。」\n\n陽菜的眼眶忽然有一点热。\n\n她把拉链拉到头。然后抱着剩下的器材走出了后台。\n\n从那以后——她再也没有在瞬面前提到过自己在唱歌时想的是谁。但她加了斯ピッツ的《ロビンソン》到播放列表。每天都在循环。\n\n---\n\n那天晚上。瞬一个人坐在房间的书桌前。他打开了《ロビンソン》。按下播放键。那句「誰かの願いが叶うころ」从扬声器出来的时候——\n\n他想起蛍听过这首歌之后说过的话：「这个人唱得好温柔，像秋天。」\n\n也想起陽菜刚才在后台的眼神。\n\n他关掉音乐，拉起窗帘。对面窗户的灯还是亮着的。橘黄色的，和每一晚一样。但今晚——他有些希望那盏灯不是为他亮的。因为如果它是为他亮的，那它已经亮了太多年。\n\n几秒后，对面那扇窗被从里面推开了。\n\n蛍的身影出现在窗框内。她披着毯子，手里拿着一张折好的纸。\n\n「瞬君——」\n\n她的声音穿过巷子，漂向他的方向。\n\n瞬推开自己的窗。\n\n「怎么了——」\n\n「这个——」蛍把手里的纸举起来，「我下午在后台捡到的。是陽菜さん写的。」\n\n瞬的心脏停了一拍。\n\n「你看内容了吗。」\n\n「没有。」蛍看着纸，「但她把它折成很小的形状。上面写着『给蛍ちゃん』。应该是留给我的信吧。但我想——先问问你。如果你觉得应该由你看的话，我就——」\n\n「那是你的信。你打开吧。」\n\n蛍沉默了一下。然后她低下头。她轻轻展开那张纸。紙在路灯和窗灯的交汇处泛着蓝白色的铅字——\n\n一、二、三秒过去。\n\n她把信折回去了。\n\n「寫什麼了嗎。」瞬問。\n\n「她說——」蛍的聲音和平時一樣輕，但这一次多了一点点什么样的东西，「『蛍ちゃん、今日来てくれてありがとう。ロビンソン、瞬君と一緒に聴けてよかった。——高橋陽菜。』」\n\n瞬没有说话。\n\n蛍把纸放回窗台上，看着瞬。\n\n「瞬君。陽菜さん是真的很喜欢你。」\n\n晚风把这句话从巷子那边送过来。穿过十一月末凉凉的空气，一直抵达瞬的耳膜深处。\n\n瞬握着窗框的手，微微用力。\n\n「我知道。」他说。\n\n蛍没有继续。\n\n她收回目光，把窗户轻轻关上了。\n\n但她没有拉窗帘。于是瞬看到——她坐在窗台边，把那张折好的信纸贴在胸口。然后她对着玻璃的倒影，对着另一个方向的东京夜空，笑了一下。\n\n他听见自己脑子里某个齿轮「咔」地响了一声。他不知道那是什么。但他知道——从这一刻开始，有些东西不一样了。\n\n---\n\n**蛍的日记 — 十一月末，文化祭后夜**\n\n今天去看了陽菜さん的演出。\n\n她很适合舞台。灯光打在她身上，她就像另一盏灯。\n\n她唱了《ロビンソン》。送给我的。但其实她把那句「誰かの願いが叶うころ」唱给了瞬君。\n\n我听得出来。\n\n她写给我的信，其实只有一百多字。但我没有把真实内容告诉瞬君。她写了——\n\n「蛍ちゃん。我会等。等到我自己觉得『可以了』的那一天。但在这之前，请不要为我的等待而难过。因为这是我自己的决定。蛍ちゃん也要好好的。——陽菜」\n\n然后她画了一个简笔画的笑脸。\n\n这个女孩——比我勇敢太多了。\n\n而我呢。我只能把她的信贴在胸口。\n\n然后对着玻璃里的人说：「对不起。」\n\n晚安，瞬君。\n\n晚安，陽菜さん。\n\n晚安，ロビンソン。\n\n（第十一卷 完）\n\n---\n\n*「她唱的那句『全部間違いじゃなかった』——她说谢谢。」*\n*但他没有告诉陽菜的是——*\n*那一句，蛍听完之后，轻轻跟着唱了一遍。*\n*在没有人听到的角落里。*\n'},
  {title:'第十二卷 富士山的雪',content:'# 第十二卷 富士山的雪\n\n十二月中旬。冬天的气息铺天盖地地涌进了东京。呼出的气是白的，街头的银杏树只剩下骨架般的枝杈。\n\n这个周末，陽菜提议去富士山。\n\n准确地说，是她、瞬、健太、优、絵里、以及轻音部的另外两个人，一起租了一辆面包车。目的地是河口湖——那是看富士山最好的位置之一。\n\n「冬富士」是日本人的执念。雪顶最白、空气最澄净、山体的轮廓最凌厉。陽菜说，十一月就该看一次冬富士，不然冬天就不算正式开始。\n\n瞬其实不太想去——那天是蛍要去做入院前的心功能评估。但蛍说：「你去吧。妈妈说只是抽血和心电图。晚上就回来。而且陽菜さん需要司机——健太君虽然有驾照，但他是开碰碰车出身的。」\n\n瞬听到最后一句的时候，发现蛍居然在吐槽。于是他没忍住，嘴角弯了一下。\n\n周六清晨。面包车驶上中央高速。陽菜坐在副驾，负责导航。瞬在后排靠窗的位置，优和健太在他旁边。絵里在后面一排。\n\n「前面是谈合坂服务区——要不要停一下——」陽菜看着导航，「有信玄饼和甲州葡萄酒的贩卖机——」\n\n「上午十点就喝葡萄酒？」健太从后排探过头来。\n\n「我说的是葡萄汁——」\n\n服务区最终停了一下。陽菜买了一盒信玄饼，还买了一个富士山造型的冰淇淋——十二月吃冰淇淋，被絵里吐槽了一句：「你是不是没有体温感应。」陽菜回答：「美食不分季节。」然后咬了一大口。\n\n瞬站在自动贩卖机前买咖啡。絵里走过来，投了一枚硬币。\n\n「桜井君。我问你一个问题。」\n\n「请。」\n\n「你的手机壁纸——我可以看一眼吗。」\n\n瞬转头看着她。絵里的表情不太好描述。不是敌意，而是一种冷静的判断。\n\n「为什么。」\n\n「不为什么。」\n\n瞬按了一下电源键。屏幕亮了。\n\n他的壁纸是一张很普通的照片——一枚红色的御守，挂在窗台的桔梗花盆边。没有拍到人，只拍到御守和花。\n\n「这是——谁给你的。」絵里问。\n\n「蛍。很多年前。浅草寺求的。」\n\n絵里沉默了。她推开咖啡罐的拉环，喝了一口。\n\n「桜井君。你知道陽菜每次看你的时候，你在看什么吗。」\n\n瞬没有说话。\n\n「你在看你的手机。按掉。」絵里说，「而她看到你按掉之前屏幕上那张照片——每次都会假装去拍肩膀上的灰。但她肩膀上根本没灰。」\n\n瞬握着咖啡罐。\n\n「我没有想伤害她。」\n\n「我知道。你这种人不会想伤害任何人。但伤害不是『想不想』的问题。是『有没有注意到』的问题。」絵里把咖啡罐丢进垃圾桶，「我说完了。剩下的你自己想。」\n\n絵里走回陽菜身边。陽菜举着冰淇淋问絵里要不要吃一口，絵里二话不说抢过去咬了一大口。陽菜发出惨叫。两个女生在服务区前面闹成一团。\n\n瞬低头看了一眼手机屏幕。那枚御守——是蛍十三岁那年跟他妈妈一起去浅草寺求的。她回来后递给他：「交通安全。因为瞬君每天骑自行车上学。」他当时说：「浅草寺离我们家一个小时车程。你为了一个交通安全跑那么远。」她说：「我想要灵一点的。」然后把御守塞进他书包侧袋里。\n\n他把手机放回口袋。\n\n从談合坂再往山梨方向走。窗外的风景慢慢从城郊变成田野，再从田野变成山麓。当富士山的轮廓从群山中突出来的时候——全车的人都安静了。\n\n冬富士。山顶的积雪被十二月的阳光照成纯白色的光晕。山体是深蓝色的，像是从未被人触碰过。\n\n「好漂亮——」陽菜把脸贴在车窗上。\n\n到了河口湖。他们先在湖边拍了一轮照片。陽菜拉着絵里、拉着优、拉着所有人合影。最后她拉着瞬——他不太情愿，但还是被健太推进了镜头。于是照片里陽菜举着剪刀手，瞬站在她旁边，表情是一贯的面瘫。\n\n但陽菜后来看这张照片的时候发现了一件事——瞬的身子稍微往左偏了一点，偏的方向正好是她的方向。\n\n她悄悄把这张照片设成了锁屏壁纸。\n\n下午他们坐了缆车到天上山。富士山在正前方完美地矗立着。陽菜站在展望台的栏杆前，冲着山的方向举起双手，像是在拥抱什么。\n\n瞬靠在后面的看板上。\n\n「瞬君——」陽菜回头，「你知道富士山还有一个名字吗——」\n\n「不死山。」\n\n「对——」陽菜的眼睛亮了一下，「竹取物语里面，かぐや姫最后回到月亮上之前，给了天皇一颗不死药。天皇说：『没有かぐや姫，不死药也没有意义。』于是在离天最近的地方——就是富士山——把药烧掉了。」\n\n「虽然是传说。」\n\n「嗯。虽然是传说。」陽菜看着远处的富士山，声音沉下去，「但我觉得天皇是对的。如果重要的人不在了，不死身也没有任何意义。」\n\n瞬没有说话。他看着陽菜的侧脸。山顶的风把她的碎发吹起来，呼啸着往山谷里灌。\n\n「陽菜。你刚才说——『重要的人』——」\n\n「就是你啊。」\n\n她说完这句话，转过身来。风把她的围巾吹得飘向一侧。她的脸红红的，不知道是冻的还是别的什么。\n\n「瞬君。你大概会说我太直接了吧。但是——我怕不说出来的话，有一天你会不在这里。」\n\n瞬的眼睛微微动了一下。\n\n陽菜没有等他的回答。她转过身，快步追上絵里一行人。\n\n天上山的风继续吹着。远处的富士山，白雪皑皑，沉默不语。\n\n傍晚，回程的车里。陽菜睡着了——玩了一整天，累了。她的头靠着车窗，呼吸均匀。絵里从后座伸出手来，把外套盖在她身上。\n\n瞬坐在陽菜斜后方。他从包里摸出手机。亮屏的那一瞬间——陽菜的眼睛忽然睁开了一条缝。\n\n她看到了。那张壁纸——红色御守。\n\n她的眼睛重新闭上了。但她握着围巾的手指不自觉地收紧了。\n\n瞬注意到陽菜动了一下，但他以为她只是翻身。\n\n车灯扫过高速的路牌。車内只有导航的声音和健太偶尔的小声吐槽。一切都很安静。\n\n傍晚回到东京。\n\n瞬放下包就去看蛍。静子在玄关迎接他，脸色不太好。\n\n「中午烧起来了。医生说——可能是感染。建议提前入院。」\n\n瞬的心往下沉了一点。他上楼。蛍的房间门虚掩着。他推开。\n\n蛍躺在床上。额头上贴着退烧贴。她的脸在昏黄的台灯光下显得很小。\n\n「你回来了。」她的声音比平时轻了很多。\n\n「你不是说只有抽血和心电图吗。」\n\n「我骗了你。」蛍闭上眼睛，停了很长的一会儿，「其实昨晚就有点低烧了。我不想让你不去富士山。」\n\n瞬在床边蹲下来。\n\n「你觉得富士山比你发烧重要吗。」\n\n「不是哪一个重要。」蛍慢慢睁开眼，「是你一年到头都没怎么出去玩过。上次去富士山——是中学生的时候吧。所以我想——你应该去。」\n\n瞬没有说话。他的手指在膝盖上握成拳头又松开。\n\n「蛍。你以后——不要再这样了。不要再瞒着我。」\n\n蛍看着他的眼睛。她慢慢地点了点头。\n\n「好。」她说，「不骗你了。」\n\n瞬不确定她说的是不是真的。但他没有拆穿。\n\n窗外东京的夜空，富士山的方向被楼群遮蔽了。但这屋内的两个人——都没有再说话。\n\n---\n\n**蛍的日记 — 十二月某日，发烧**\n\n今天骗了瞬君。\n\n不是第一次了。大概也不会是最后一次。\n\n但我答应了以后不骗他。所以我得想个办法——在不想骗他的时候，也不要让他知道我难过。\n\n富士山的照片，陽菜さん发在了Ins上。有一张是瞬君的侧脸。他又没看镜头。\n\n陽菜さん配的文案是：「不死山下。某个人。某句话。」\n\n我把它保存下来了。\n\n和以前一样。\n\n手机里的文件夹，名字叫「S」。\n\n里面现在有一百多张照片了。\n\n从陽菜さん第一次发瞬君的背影开始。\n\n到现在。\n\n我不是跟踪狂。我只是——想把他的生命轨迹留下来。因为我自己的轨迹，太短了。\n\n晚安。瞬君。\n\n晚安。不死山。\n\n（第十二卷 完）\n\n---\n\n*「竹取物语里，かぐや姫最后回到了月亮上。」*\n*「天皇把不死药在富士山烧掉了。」*\n*「因为——如果重要的人不在了，不死身也没有意义。」*\n*陽菜说完这句话，忽然觉得眼眶发热。*\n*她不知道为什么。那时候明明富士山还在。*\n'},
  {title:'第十三卷 病房与告白未遂',content:'# 第十三卷 病房与告白（未遂）\n\n一月初。东京落了第一场雪。\n\n蛍入院已经两周。東京大学医学部附属病院，十二楼的循环器内科病房。窗户正对着不忍池，冬天的不忍池灰蒙蒙的，池面上偶尔有一两只白鹭飞过。\n\n蛍的病情在这两周里像心电图一样起起伏伏。入院第二天烧退了。第五天又开始发烧。第十天呼吸急促，被上了氧气面罩。第十二天——情况终于开始稳定。\n\n而这十二天里，桜井瞬几乎每天都在。\n\n他早上来，晚上走。期間除了回家睡觉和必要的洗澡换衣，其他地方一概没去。静子劝他不要每天都来，他说：「我寒假。」\n\n静子没有再说。她知道他不是因为寒假。\n\n一月十三日下午。\n\n陽菜站在医院大厅。她手里提着一个果篮——苹果和梨，还有一盒草莓大福。\n\n她没有提前告诉瞬她要来。因为如果提前说的话，她怕他会说「不用来」。所以她直接来了。\n\n但她站在电梯前按了十二楼之后，忽然觉得自己不该来。不是「不想来」。而是不知道该用什么身份来。\n\n——同学？朋友？还是喜欢同一个男生的——「那个人」？\n\n电梯门开了。她走出去。\n\n十二楼走廊很安静。她的平底鞋踩在塑胶地板上，几乎没有声响。护士推着药车经过，冲她微微点头。\n\n她走到护士站问：「雨宮蛍さん——」\n\n护士刚要回答，走廊尽头传来声音。\n\n陽菜转头看去。\n\n病房门是半开的。透过门缝，她看到了瞬的背——他坐在床边，身体微微前倾。然后她看到他的手——握着蛍的手。\n\n蛍躺在床上。氧气面罩覆着她半张脸。她的眼睛闭着，但睫毛在轻轻颤抖。\n\n瞬没有说任何话。他只是握着她的手。\n\n走廊很长。窗户透进来灰白的天光。\n\n陽菜站在原地，看了一秒——两秒——三秒。\n\n然后她慢慢地、轻轻地把果篮放在护士站台面上。\n\n「这是给雨宮さん的——」她对护士说，声音压得很低，「请帮我转交。」\n\n「请问您是——」\n\n「——朋友。」陽菜说，「一个朋友。」\n\n然后她转身，原路返回。\n\n她走进电梯时没有哭。电梯门关上之后——她靠着电梯壁，闭上了眼睛。眼泪没有掉下来。但眼眶热了。\n\n她拿出手机发了一条LINE：「絵里。我今天做了多余的事。」\n\n絵里秒回：「什么事。」\n\n「去医院。」\n\n「……」\n\n「看到他了。他握着她的手。」\n\n絵里的回复停了好久。然后弹出来一行字：「那你还好吗。」\n\n陽菜把手机收起来。没有回。\n\n因为她也说不清自己到底好不好。\n\n在医院楼下走了很久。不忍池柳枝上挂着一层薄霜。陽菜把围巾裹紧——不知道是冷还是别的什么。\n\n傍晚。瞬从病房出来，去护士站倒水。他看到了那个果篮。\n\n「这是——谁送的。」他问护士。\n\n「一位女生。大概和桜井さん差不多年纪。她说是雨宮さん的朋友。放下果篮就走了。」\n\n瞬低下头看着果篮里的东西——苹果、梨、草莓大福。\n\n草莓大福。\n\n他拿起手机打了一行字：「你来过医院了。」\n\n陽菜没有立刻回复。过了十多分钟才回：「嗯。去了一会儿。看蛍ちゃん在休息就没打扰。」\n\n「为什么不留下来。」\n\n陽菜看着屏幕上这行字，忽然不知道回什么。\n\n她打字，删除，打字，删除，打字，删除。最后她只回了三个字：「下次吧。」\n\n瞬看着「下次吧」三个字。他知道她在说谎。但他不知道自己有没有资格去追问。\n\n病房里，蛍醒了。\n\n「——誰か来たの。」她摘了氧气面罩，声音像从很远处传来。\n\n「陽菜。她送了一个果篮。」\n\n蛍沉默了一下。然后她轻声说：「她看到了吧。」\n\n瞬没有说话。\n\n「你握着我的手。」蛍说，「她一定看到了。」\n\n「你怎么知道我当时握着你的手。」\n\n「因为每次發燒的時候——你都握著。從小就這樣。」蛍笑了一下，但笑意没有到达眼底，「這是瞬君的習慣。而習慣是最难改的。」\n\n瞬坐在床沿，看着不忍池上的白鷺。\n\n「蛍。你希望我改掉这个习惯吗。」\n\n蛍沉默了很久。久到白鷺飞走了。\n\n「我希望你做你自己。」她终于说。\n\n窗外又开始飘雪。\n\n半夜。陽菜的房间里，手機震了一下。她拿起——是瞬的LINE。\n\n「草莓大福，蛍尝了一口。她说好吃。」\n\n陽菜盯着屏幕好一会儿。然后慢慢地打出——\n\n「那就好。」\n\n已读。没有回复。\n\n她把手机放在枕边，翻身朝向窗户。玻璃上映出自己的脸——没有哭。但眼睛里那种热热的感觉一直没有退。\n\n一月二十日。蛍出院。\n\n不是治愈，是术前准备期结束。手术定在二月下旬。\n\n回到家的时候，蛍的窗台上积了薄薄一层雪。盆里的桔梗花早就谢了，只剩下干枯的枝茎。\n\n「春天还会发芽的。」静子把被子给蛍掖好。\n\n「嗯。」蛍应了一声。\n\n但她的视线没有离开窗台。她盯着花盆里干枯的根茎，像在确认什么。\n\n晚上。瞬来看她。\n\n「出院礼物。」他把一个纸袋放在矮桌上。\n\n蛍打开——是一本书。太宰治的《女生徒》。不是新书，是旧书店里的。书页有些泛黄，扉页上有前任主人写的铅笔字「昭和四十二年」。\n\n「昭和四十二年——比妈妈出生还早。」蛍轻轻翻着书页。\n\n「你不是说想读太宰治吗。」\n\n「那是很久以前说的了。去年三月——」她停下。\n\n瞬看着她。「你记得这么清楚。」\n\n「嗯。」蛍把书放在被子上了，「关于瞬君的事，我都记得很清楚。因为你每次提到什么，之后都会送给我。像是——把某段时间的你，留在我这里。」\n\n她抬头望着他。\n\n「所以我有好多瞬君。」\n\n这句话很轻。但每一个字都让瞬觉得像锤子。\n\n「蛍。等手术做完——」\n\n「做完之后，」蛍接过他的话，「我们去好多地方吧。浅草寺、台场、富士山——陽菜さん去过的地方。」\n\n她提到陽菜的时候没有任何停顿。那个名字理所当然地出现在她的愿望清单里。\n\n瞬不知道该接什么。\n\n蛍翻开那本书的第一页。\n\n她低着头说：「瞬君。如果手術做完之後——我想尝试畫畫。」\n\n「那很好。」\n\n「我想畫你。」\n\n「——我不好畫。」\n\n「那我就畫陽菜さん。」蛍弯起嘴角，「反正你们谁都可以。重要的是——我想画下来。因为画不会过期。照片也会过期的。墨水褪色。纸张发黄。但画——在褪色之前，它已经存在了很久。」\n\n瞬看着她的笑脸，忽然发现——蛍近来在「要求」什么东西的时候，都用未来的语气。不是「如果」「可能」「也许」。而是「想」「要」「会」。\n\n那个从来不谈未来的人，忽然开始谈未来——这不一定是好事。\n\n他想到这一点的时候，心口被什么揪了一下。\n\n一月末。新学期开学前某天，陽菜约瞬在「静流」见面。\n\n「给你。」陽菜从包里拿出一个信封，「帮我把这个给蛍ちゃん。」\n\n「是什么。」\n\n「上次去医院——后来我又去了一次。护士说她出院了。但我没见到她。所以在楼下礼品店买了一张卡片。」\n\n瞬看着信封。没有当场打开。\n\n陽菜看着他。「你不打開看看嗎——萬一我寫了不該寫的東西——」\n\n「你不会写不该写的东西。」他说。\n\n陽菜愣了一下。然后她低下头喝了一口焦糖玛奇朵。窗外的雪又飘起来了。\n\n「瞬君。我问你一个问题。」陽菜盯着咖啡杯，「你上次问我是不是『用热闹來騙自己』——现在我想问你了。」\n\n「什么。」\n\n「你是不是在——用蛍ちゃん来骗自己。假装自己对她的感情是责任而不是别的什么。」\n\n瞬端起杯子。但咖啡已经冷掉了。\n\n「我不知道。」他说，「但我知道一件事。如果有一天她不在了——我会变成什么样子。我不敢想。」\n\n陽菜把瑪奇朵喝完了。\n\n「没关系。你慢慢想。」她把杯子推开，「我等。而且不急。因为——」\n\n她看着窗外飘落的雪花。\n\n「我现在知道了。在这段关系里，不是只有我一个人在等。蛍ちゃん也在等。你在等你自己。所以没关系。我们一起等好了。」\n\n她站起来。拿起包。\n\n「咖啡我请。上次是你请的。」\n\n「陽菜——」\n\n「嗯？」\n\n瞬看着她。窗外的雪光打在她的側臉上。她的睫毛很長。表情很平静。\n\n「谢谢你的卡片。」他说。\n\n陽菜弯起嘴角笑了。是那个左臉有浅酒窝的笑。\n\n「本来就是给蛍ちゃん写的。」\n\n然后她推开门。风铃响。\n\n---\n\n**蛍的日记 — 一月某日，出院**\n\n陽菜さん的卡片，字迹和她本人一样圆。\n\n她写道——「蛍ちゃん，等你好了，我们三个一起去旅行吧。随便哪里都好。只要三个人都在就好。」\n\n三个人都在。\n\n她真傻。又真好。\n\n我把卡片压在枕头底下。这样每天晚上睡觉的时候，会听到纸页輕輕的声响。\n\n像是她在说话。\n\n晚安。瞬君。\n\n晚安。陽菜さん。\n\n晚安。那个我还没来得及画下来的未来。\n\n（第十三卷 完）\n\n---\n\n*「你是不是在用蛍ちゃん来骗自己。」*\n*他没有回答。*\n*不是因为他不知道答案。*\n*而是因为那个答案——对谁来说都太残忍。*\n'},
  {title:'第十四卷 涩谷的十字路口',content:'# 第十四卷 渋谷的十字路口\n\n二月。節分剛過。\n\n渋谷的街道上貼滿了情人節的宣傳海報。巧克力專門店的櫥窗堆著各式包裝精美的生巧克力、松露、布朗尼。百貨公司門口掛著巨大的橫幅——「本命チョコ。義理チョコ。あなたの気持ちはどっち。」\n\n陽菜站在渋谷站前的大型巧克力賣場前，對著兩排陳列櫃發呆。\n\n絵里在旁邊看著她。「你已經站了十五分鐘了。」\n\n「因為——不知道買哪個——」\n\n「義理還是本命先決定。」\n\n「……本命。」\n\n「那還有什麼好猶豫的。選最好吃的。」\n\n「可是他不太吃甜的。」\n\n絵里沉默了一秒。然後她走開去旁邊買了杯奶茶。「那你為什麼非要送巧克力不可。」\n\n「因為情人節快到了。雖然二月十四是週四，週四有課——但那天如果我不送，我會覺得自己很沒用。」\n\n絵里喝了一口奶茶。「陽菜。你知道嗎，你每次都說『他不太吃甜的』『他喜歡安靜』『他習慣一個人』——你全部都在為他找藉口。你到底有沒有為自己想過。」\n\n陽菜低頭看著那排巧克力。生巧上灑著可可粉，整整齊齊。\n\n「絵里。你想說什麼。」\n\n「我想說——」絵里把奶茶放在旁邊的貨架上，「你一直在等他轉頭看你。但如果他永遠不轉頭呢？你怎麼辦。」\n\n陽菜拿起一盒巧克力放進購物籃。\n\n「那我就繼續等。」\n\n「等到什麼時候。」\n\n「等到我不想等的時候。或者——等到我不能等的時候。」陽菜轉頭看著絵里，笑了一下，「現在還沒到。」\n\n絵里沉默了。她知道這種笑容——陽菜每次硬撐的時候都是這個笑容。從高中開始就沒變過。\n\n同一天，不同的十字路口。\n\n瞬推著蛍的輪椅，從東大病院的復健科出來。術前最後一次心功能評估。蛍的臉色很蒼白，因為評估要求她步行六分鐘——是的，走六分鐘。\n\n她走完了。走完後在輪椅上喘了好久，護士幫她上了氧氣。\n\n但結果顯示她的心肺儲備比兩個月前更差了。醫生建議提前手術。越快越好。二月底——不，盡量往前提。\n\n瞬推著輪椅穿過不忍通，拐上本鄉通。診所玻璃上映出他們的倒影——一個推著輪椅的年輕男子，一個瘦弱的年輕女子。冬末的陽光不怎麼暖和，但也沒有讓影子特別長。\n\n「瞬君。」蛍把手放在氧氣管上，「情人節——快到了吧。」\n\n「嗯。」\n\n「你收到什麼了——不對，你應該還沒收到。每年你都會收到我的。」\n\n「巧克力嗎。」\n\n「嗯。每年都是一樣的——美咲幫我去便利店買的，板チョコ。義理專用的那種。」\n\n「你用義理的名義送本命的東西。」\n\n蛍的手滑了一下。「……你在說什麼——」\n\n瞬沒有回答。他的步伐也沒有改變。推輪椅的手很穩。\n\n蛍的耳朵燒了一下。「你什麼時候知道的。」\n\n「大概——高中的時候。有一年你送了手作巧克力。包裝紙上有你用筆戳的小洞——因為你力氣不夠大，壓不出漂亮的形狀，所以每個洞都是用筆尖耐心戳出來的。義理巧克力不會有人這麼做。」\n\n蛍沒有說話。她低著頭，看著膝蓋上蓋著的毯子。\n\n「但我不打算拆穿你。」瞬說，「因為你不想被拆穿。你在窗台上放桔梗花也好，划日曆也好，每年送戳了很多洞的巧克力也好——都是你的語言。不是我的。所以我不能把它們翻譯成我的語言。」\n\n他停了下來。在紅綠燈前。\n\n「但今天是例外。」他說。\n\n因為蛍的手在發抖。不知道是因為冷，還是他剛才說了太多。\n\n「……謝謝你沒有拆穿。」蛍終於說，「如果真的被拆穿了，我可能就不敢送了。」\n\n「現在呢。」\n\n「現在——」蛍抬起頭，看著馬路對面快要變紅的綠燈，「現在被你這樣說了之後，覺得好像也沒什麼。就是——嗯。從小就喜歡你嘛。好像也不算什麼秘密。」\n\n她說完這句話，像是卸下了某個背了很久的東西。\n\n绿灯亮了。\n\n瞬推著她走過斑馬線。渋谷的スクランブル交差点，但這不是渋谷——而是本鄉三丁目的交差点。馬路對面，一個留著栗色長髮的女孩也正在過馬路。兩人相距幾米，沒有注意到對方。\n\n陽菜手裡提著那盒巧克力，正要回學校。\n\n她沒有看到瞬。\n\n瞬也沒有看到她。\n\n但蛍看到了。\n\n她没有出声。只是在轮椅转过街角的一瞬间，看了一眼陽菜背影消失的方向。\n\n情人節當天。二月十四。\n\n東都大學的校園裡，巧克力像流感一樣到處傳染。女生們三兩成群，男生們心不在焉地盯著手機，等待LINE跳出某條消息。\n\n瞬在教室裡收到三份義理巧克力。分別來自並不熟的隔壁班同學、一個社團後輩，以及佐藤優——「這是我表妹做的，她說要我轉交給你。」優推眼鏡時他自己都沒發現自己臉紅了。\n\n然後是陽菜。\n\n她站在他課桌前，手裡捧著一個用淡藍色包裝紙裹著的盒子。包裝紙上印著白樺樹的圖案。沒有愛心，沒有蝴蝶結。看起來像是某種冷靜的北歐設計。\n\n「これは——」\n\n「情人節巧克力。」陽菜說，「本命。」\n\n整個課室的空氣都凝住了。至少有七個人停止了自己手上的動作。\n\n瞬接過盒子。他的表情看起來和平時沒什麼兩樣。但他的手指，在包裝紙的邊緣停了一下。\n\n「ありがとう。」\n\n「——就這樣？」\n\n「回家再拆。」\n\n陽菜看著他。他沒有說「我不能收」。也沒有說「對不起」。他說「回家再拆」。\n\n這是不拒絕。\n\n陽菜努力壓下自己嘴角的弧度，但失敗了。她轉身走回座位上。走到一半的時候，她聽到瞬的聲音——\n\n「高橋。」\n\n她回頭。\n\n瞬舉起那盒巧克力，語氣淡淡的：「明天午休告訴你評價。」\n\n教室裡響起幾聲倒抽涼氣。\n\n陽菜衝他做了一個鬼臉：「要好好吃——全部吃完——」\n\n她坐回座位上，把臉埋在課本後面。耳根燒得通紅。\n\n傍晚。瞬回到家，把陽菜的巧克力放在桌上。他沒有立刻拆——他先拿了蛍每年都送的那盒「義理」巧克力。\n\n今年的還是便利店。還是板チョコ。但包裝上用很細很細的筆寫了——\n\n「瞬君へ。來年もよろしく——蛍。」\n\n——「明年也請多關照」。\n\n瞬把這行字看了三遍。然後小心地把包裝紙拆開，吃了一塊。\n\n很甜。\n\n巧克力吃的時候牙會黏住，但心裡鬆了一下。\n\n然後他拆開陽菜的巧克力。\n\n盒子打開——裡面是一塊塊切好的生巧克力。可可粉下面露出柔軟的夾層。旁邊有一張小卡片：「今年是第一年。如果能成為慣例就好了。不過不勉強——只是想告訴你，有個人認為你值得吃超甜的巧克力，因為你說過苦的東西能讓你覺得自己活著。今年換甜的試試？——陽菜。」\n\n瞬把那張卡片放進抽屜。抽屜裡有一個白色的信封——那是蛍入院時他幫她收好的病历複印件。卡片剛好和信封疊在一起。\n\n他看了好久。然後拿出手機回了一條LINE——\n\n「巧克力吃了。很甜。明天告訴你感想。」\n\n陽菜秒回：「不是說明天午休嗎!!現在就想知道!!」\n\n「明天。」\n\n「你太過分了——」\n\n「睡覺了。」\n\n「不許睡——」\n\n他沒有回。但他看著屏幕上的對話框，輕輕地——非常輕地——笑了一下。\n\n而他不知道的是，對面的窗戶那晚沒有拉窗簾。蛍趴在窗台上看到了他房間那個畫面——他低頭看手機，然後露出了一個很淡的微笑。\n\n蛍把那幅畫面記在心裡。然後拉上了窗簾。\n\n她從抽屜底層拿出一個文件夾。上面寫著「S」。她從資料夾裡又拿出一個沒有用過的新透明文件袋，放在桌上的那疊資料夾旁邊。然後她開始把過去從陽菜Ins上保存的、所有有瞬君出現的照片，一張一張按日期排列。\n\n這本相冊已經很厚了。但她沒有停。\n\n---\n\n**蛍的日记——二月十四日，情人節**\n\n瞬君收到了陽菜さん的本命巧克力。\n\n不——確切地說，他收到了好多。但他只在收到陽菜さん的時候，說了「回家再拆」。\n\n窗戶沒有關好，風把窗簾吹起了一角。所以我不小心看到了他拆開她的卡片時的表情。\n\n不是感動。不是不知所措。\n\n是那種要拼命忍住什麼的表情。\n\n我知道那個表情。因為我自己做過很多次。\n\n巧克力——今年我還是送了義理。\n\n但明年如果還有義理，我想在包裝紙上寫一行更長的字。比如「今年もありがとう」。比如「來年もちゃんと生きてるよ」。\n\n希望明年還能送。\n\n希望明年還活著。\n\n晚安。瞬君。\n\n晚安。巧克力味的二月。\n\n（第十四卷 完）\n\n---\n\n*「今年是第一年。如果能成為慣例就好了。」*\n*她寫道。*\n*「來年もよろしく。」*\n*她寫道。*\n*兩個女孩，在不同的紙上，寫下了同樣的願望。*\n*願明年——她們都還在。*\n'},
  {title:'第十五卷 她的相册',content:'# 第十五卷 她的相册\n\n二月下旬。手术被提前到三月第一周。\n\n蛍开始在每天下午做一件事——坐在窗台边，膝盖上摊着一本厚厚的相册。她把手机里的照片打印出来，一张一张按照日期往上贴。有的照片是从陽菜的Ins上截屏保存的——画质不太好，但她还是打印了。然后用剪刀仔细裁掉白边，再涂上胶棒。\n\n这本相册的封面是淡米色的，没有任何图案。翻开第一页——第一张是两张孩子站在樱花树下的照片。\n\n三岁的瞬和三岁的蛍。瞬穿着蓝色的儿童雨衣，蛍穿着红色的。那天下了很大的雨。瞬撑着伞站在巷子口，蛍跟在后面。妈妈在后面喊了什么——快门就按下了。\n\n往后翻。五六岁在公园滑梯。七岁在上小学前。十岁在入學式。十三岁在中学的图书室——蛍那天破例出门去看瞬借书。十四岁她在医院，瞬坐在床边把课本摊开让她看。十五岁——\n\n每一张的旁边都用铅笔写着标注。\n\n「三歳。雨の日。」\n「七歳。ランドセル。」\n「十三歳。図書室にて。」\n「十五歳。——手術前。」\n\n她的字很轻。轻到几乎看不清。像是怕铅色刺穿了相纸。\n\n翻到后半部分，照片里开始出现另一个人。陽菜的身影——最开始只是一张咖啡店窗外的偷拍。那是瞬和陽菜坐在窗边。应该是第一次见面那次，蛍不知道什么时候在「静流」对面拍的。照片上两个人隔着一张桌子，一个人看书，一个人吃蛋糕。\n\n蛍在那张旁边写道：「四月。静流にて。——彼女との始まり。」\n\n然后往后——浅草寺门口，陽菜站在瞬旁边冲镜头挥手。是一张陽菜自己的自拍，发在Ins上的。蛍存下来了。\n\n旁边写着：「五月。浅草寺。凶と大吉。」\n\n再往后——隅田川花火。陽菜拍的瞬，在看花火时的侧脸。蛍在旁边写：「七月。隅田川。初めての花火。——初めての三人。」\n\n再往后。台场的摩天轮，背景是海面。陽菜自己拍的天空，但玻璃上隐约映出了她旁边一个人的影子。蛍用铅笔圈出了那个影子，然后在旁边写：「多分、彼がいた。——九月、台場。」\n\n代々木公園的银杏。文化祭的Livehouse暗影。富士山河口湖边，陽菜举着剪刀手，而瞬偏着头看向她那一侧。蛍在每一张后面都写了日期，地点，以及一句很短的描述。\n\n她的手没有停过。一张接一张。\n\n相册还剩最后几页。她没有贴任何东西。而是用铅笔在最中央写了几行字。\n\n第一行：「あとがき。」\n\n第二行：「これらの写真の中で、彼はほとんどカメラを見ていない。でも彼はいつも、誰かの写真の中にいる。それだけで、私には十分だった。」\n\n——这些照片里，他几乎没看过镜头。但他一直在某个人的照片里。这对我来说就够了。\n\n第三行：「髙橋陽菜さんへ。」\n\n第四行：「お願いがある。」\n\n第五行——空着。\n\n她留了一个愿望，没有写。\n\n三月一日。蛍在厨房里。\n\n自从出院后，她比之前更频繁地下楼到厨房。力气不够，所以只能做一些很小的动作。比如切葱花，比如打鸡蛋，比如站在锅旁边看妈妈怎么调味。\n\n但二月最后一周，她忽然对瞬说：「我想学做饭。」\n\n瞬看着她。蛍穿着围裙——静子的围裙太大了，在她身上显得很空。她左手扶着流理台，右手拿着料理筷。\n\n「为什么。」\n\n「因为——想学会味噌汁。基础的那种。豆腐和わかめ的。不难。我做给你看。」\n\n瞬给她拿来了一张矮凳。她坐下来，开始用料理筷把味噌溶进だし里。动作很慢——因为用力太久手会抖。但她没有停。\n\n味噌汁煮好了。她盛了一碗，递给瞬。\n\n「尝尝。」\n\n瞬喝了一口。\n\n味噌有点淡。だし可以再熬久一些。豆腐切的大小不一。\n\n这是他味蕾告诉他的一切。\n\n但他说出口的是——\n\n「好喝。」\n\n蛍的眼睛弯了一下。她坐下来，自己盛了一口，喝得非常非常慢。\n\n「好淡。」她说。\n\n「不淡。刚好。」\n\n「骗人。」\n\n「因为是你煮的。所以刚好。」\n\n蛍的筷子停住了。\n\n她低头看着碗里的豆腐块。过了好久，才说：「你最近说话怎么变这样了。」\n\n「哪样。」\n\n「以前你会说『味噌汁は味噌汁だ。うまいか不味いかは客観的事実だ』——类似这样。现在不说话带刺了。」\n\n瞬把空碗搁在桌上。\n\n「人是会变的。」\n\n「变得温柔了。」\n\n瞬没有否认。\n\n蛍把碗放在腿上。热气已经散尽，汤面平静。\n\n「是因为陽菜さん吧。」她说。\n\n瞬抬起眼睛。\n\n「她在改变你。」蛍轻轻说完，然后一笑，「这样就很好呀。我们刚认识的时候，你不是那么容易说『好喝』的人。」\n\n瞬站起来。把空碗放进水槽。\n\n「蛍。今天教我什么。」\n\n「玉子烧。但要明天。今天——大概没力气了。」\n\n瞬转过身。蛍的脸色确实比刚才白了一些。额头有薄薄一层汗。\n\n「那我扶你上去。」\n\n「嗯。」\n\n他扶着她上楼。她在楼梯口停下来，回过头看了一眼厨房里的矮凳和剩下的鸡蛋。\n\n「瞬君。等我学会五道菜——你就出师了。」\n\n「什么叫出师。」\n\n「就是——以后不用来我这里吃了。」\n\n她说完这句话，走上了最后一级台阶。\n\n瞬站在楼梯口，看着她走进房间关上门。然后他低头看着自己刚刚端过汤的手。\n\n掌心里有一点味噌的味道。\n\n三月第一周。手术前三天。\n\n蛍的母亲——静子——站在医院走廊里。医生刚刚离开。诊断说明她已经听了几十遍。但这一次——医生说的是：如果不做手术，保守治疗的生存期——可能只有几个月。做完的话，生存率是百分之六十二。但即使手术成功，后期也有漫长排异反应。生活质量会进一步下降。\n\n静子的手抖了很久。她走进卫生间，用水洗了把脸。然后用纸巾把眼睛擦干，把纸巾扔进垃圾箱。然后拿出口红，对着镜子重新涂好。\n\n然后她走进病房。\n\n蛍正在翻那本相册。看到母亲进来，她把相册合上。\n\n「お母さん——」\n\n「嗯？」\n\n「这个。」蛍拍了拍相册，「如果我忘了把它放在哪里了，你要帮我找出来。很重要。」\n\n静子看着她的眼睛。蛍的眼神平静，和平时一样——但那平静太彻底了。彻底得不像是真平静。\n\n「……嗯。」静子说，「妈妈帮你收好。」\n\n蛍点了点头。然后把相册放进一个牛皮纸文件袋里，又把文件袋放在枕头下面，像儿时放洋娃娃的动作。\n\n做完这件事后，她躺回枕头上，闭眼。呼吸均匀。像是睡着了。\n\n但静子看到她眼角有一線很細很細的亮。\n\n她没有去擦。\n\n---\n\n**蛍的日记 — 二月末，手术前**\n\n相册快填完了。其实还有很多照片可以贴。陽菜さん的Ins上每天都有新的。但她最近不常更新了。大概是因为瞬君越来越少出现在照片里。\n\n不是他不出门。是她拍了之后不发了。\n\n为什么呢。\n\n我想了一個可能——因为拍照的人，不想让看照片的人看到。\n\n但是她不知道，我已经看到了。\n\n我全部看到了。\n\n而且我把它们都打印出来了。贴在这本相册里。如果你以后发现的话——陽菜さん——请一定不要生气。我不是在监视。我只是觉得，这些照片里的瞬君，比他自己放在手机里的都要好。因为是你拍的。你拍他喝咖啡，拍他看书，拍他在十字路口皱眉。你拍出了他自己看不到的他的表情。\n\n那些表情是温柔的。是柔软的。是属于你的。\n\n料理——今天还是只学会了一道。味噌汁太淡了。瞬君说好喝。他说谎说得很烂。\n\n料理笔记——我写在这里，免得忘了：\n\n1. 味噌汁（豆腐とわかめ）：だし要加多一点。味噌的份量是两小匙。豆腐切小方块，不要太早放。わかめ最后放。——要点：装进碗里才加七味粉，因为瞬君喜欢。\n\n2. 玉子烧：明天学。\n\n晚安。瞬君。\n\n晚安。料理台。\n\n晚安。被剪掉白边的照片们。\n\n（第十五卷 完）\n\n---\n\n*「等我学会五道菜——你就出师了。」*\n*「什么叫出师。」*\n*「就是——以后不用来我这里吃了。」*\n*——她把每个人都推出了自己的未来。*\n*唯独把他——推得最用力。*\n'},
  {title:'第十六卷 迪士尼的魔法',content:'# 第十六卷 迪士尼的魔法\n\n三月初。手术前最后一周。\n\n陽菜說要去迪士尼。理由是：「蛍ちゃん手術前要開心一下。你沒去過迪士尼對吧——東京迪士尼海洋！新開了夢幻泉鄉！我買票！誰都不許說不！」\n\n蛍確實很久很久沒去過迪士尼。最後一次是小學二年級。那天在排隊時暈倒了，被急救人員抱出來。之後就再沒去過遊樂園。\n\n但這一次——她說，好。\n\n三月的第一個週日。東京迪士尼海洋。\n\n天剛亮不久，三人在舞濱站下車。三月清晨的風還有點刺臉。迪士尼海洋的入口處已經排滿了人。各種髮箍、各種顏色的爆米花桶。\n\n陽菜從包裡掏出三個東西：「鏘——」\n\n三頂頭箍。一頂米奇（給瞬），一頂米妮（給自己），一頂達菲熊（給蛍）。\n\n瞬面無表情地看著米奇頭箍。\n\n「戴。」陽菜說。\n\n「不。」\n\n「蛍ちゃん和你戴一樣的紅——不對她是棕色達菲——但你必須戴。」\n\n「為什麼。」\n\n「因為這是迪士尼魔法的一部分。不戴頭箍的人不配玩『地心探險』。」\n\n「你這邏輯——」\n\n蛍坐在旁邊輕輕笑了。她把達菲熊的頭箍拿過來，戴在頭上。她今天氣色稍微好一點，穿了一件淡藍色的針織衫，外面是白色羽絨。她笑起來的時候，眼角有兩條淺淺的、少女特有的細紋。\n\n瞬看到蛍戴上了頭箍。然後他閉了一下眼，把米奇頭箍也戴上了。\n\n全樂園第一個坐的是旋轉木馬。\n\n蛍選了一匹靠外面的白木馬——因為不用太多力氣就能坐穩。瞬站在她旁邊一根柱子旁。陽菜騎在蛍後面一排的粉木馬上。\n\n音樂響起。旋轉木馬開始轉動。光線透過彩繪玻璃頂棚，斑斑駁駁地灑在每個人身上。\n\n蛍的白木馬升上去的時候，她轉頭看了一眼瞬。\n\n瞬正看著前方——但目光並沒有聚焦在任何東西上。他的側臉在旋轉木馬的燈光下，表情很平靜，但握著柱子的手指——很緊。\n\n蛍收回視線，沒有說話。\n\n陽菜在後面舉起手機。她拍了一張：前景是蛍的白木馬背影和被虛化的瞬，然後被米奇頭箍遮住了左半角。這張後來她發在Ins上，文案寫：「三人で、魔法の国。」\n\n接下來是「驚魂古塔」。\n\n陽菜拉著瞬說「一定要玩」，瞬說「蛍不能坐自由落體」，陽菜說「那你在下面陪蛍ちゃん——我自己去」。說完她衝進排隊通道。\n\n瞬推著蛍找了一張長椅坐下。旁邊是賣吉拿棒的小車。三月的風從東京灣吹過來，帶著一點海的鹹味。\n\n「開心的時候——反而更冷啊。」蛍把羽絨服的帽子拉上。\n\n「嗯。」\n\n「瞬君。你知道嗎。我以前看迪士尼的CM，一直覺得這是世界上最假的地方。因為所有人都在笑。但是笑多了會累。這麼多人同時假裝開心，想想就覺得很恐怖。」\n\n「現在呢。」\n\n「現在——」蛍看著不遠處一隻唐老鴨正在被小孩抱著拍照，「現在覺得，他們不是假裝開心。而是因為知道這裡是『魔法之國』。在這裡開心是義務。沒有人會問你——你為什麼開心。也沒有人會問你——你為什麼不開心。」\n\n她轉過頭看著瞬。\n\n「我今天很開心。不是義務的那種。是真的。」\n\n瞬看著她。蛍的眼睛在三月淡淡的光裡，顏色比平時淺一些——也許是因為光線。但也許不是。\n\n後來，陽菜從驚魂古塔出來，腿軟到需要扶著柵欄才能走到長椅邊。\n\n「好可怕——」她倒在長椅上，「自由落體——我在空中飛起來——」\n\n「你還活著。」瞬說。\n\n「你這種毫無人性的反應——正是我需要的——」\n\n蛍在旁邊笑了起來。\n\n下午他們去坐了海底兩萬里。一起。三個人擠在一艘「潛艇」裡。窗外是假的深海景色——海草、氣泡、發光的水母。潛艇輕微晃動，背景音樂是低沉的弦樂。\n\n深海裡沒有光。只有窗外的假光。水母虛擬的光照在三個人的臉上。陽菜趴在左邊的窗口。蛍趴在右邊。\n\n瞬坐在中間。\n\n在潛艇最深的那段，音樂忽然沉寂了幾秒。黑暗裡——他感覺到左邊有人碰了碰他的袖子。\n\n是陽菜的手。輕得像是不小心碰到的。\n\n他沒有抽開。\n\n右邊，蛍的手放在膝蓋上。她的指尖離他的袖子還有幾釐米。這麼多年來，她最近只到過這個距離。\n\n潛艇浮出水面。光重新灌進來。陽菜收回手，轉頭問蛍：「怎麼樣——水母美不美——」\n\n「很美。」蛍說。\n\n但她看的不是水母。是瞬的袖子。\n\n最後一站——夢幻泉鄉。\n\n這是迪士尼海洋去年新開的園區。所有設施都要抽整理券。陽菜提前半個月就在手機上排隊抽——她只抽中了「安娜與艾莎的冰雪之旅」，一張券能進兩個人。\n\n「你和蛍ちゃん去吧。」陽菜說。\n\n「為什麼——」\n\n「因為蛍ちゃん喜歡冰雪奇緣啊。」陽菜彎腰對蛍說，「你之前不是說想看看嗎——電視裡放的時候你住院錯過了。」\n\n蛍抬頭看著陽菜。她想起自己只提過一次這件事。是去年歲末。在文化祭的LIVEHOUSE，聊天時順口帶過。\n\n「陽菜さん——」蛍的聲音微微發抖，「你記得——」\n\n「當然記得。」陽菜眨了眨眼，「因為我也喜歡呀。Anna和Elsa嘛。」\n\n她把整理券塞進蛍的手裡。\n\n「快去吧。我在外面吃吉拿棒等你們。」\n\n瞬看著陽菜。她站在排隊口外面，手裡舉著吉拿棒衝他們揮。笑得和每次一樣大。\n\n瞬推著蛍走進排隊通道。\n\n他們坐上船。這是個慢速ride——不需要擔心蛍的身體。場景在眼前展開：艾倫戴爾的雪景，Olaf的笑話，Elsa唱著「Let It Go」時的冰宮。蛍從一開始就沒有說話。看到一半的時候——她伸出手，用手指輕輕碰了一下欄杆上的假雪。\n\n「冷たそう。」她说。\n\n出了设施，陽菜在出口長椅上等著。旁邊又多了一根吉拿棒的包裝紙。\n\n「怎麼樣——」她站起來。\n\n「很好看。」蛍說，「就像真的在雪裡一樣。陽菜さん，謝謝——」\n\n「誒——謝什麼——」陽菜揮了揮手，「下次一起來坐『安娜與艾莎』同一個船廂。」\n\n「嗯。」蛍笑了。\n\n傍晚。三人在港灣邊等著看「Fantasmic!」夜間秀。水面上的投影和音樂交織在一起，米奇在魔法帽上跳舞。最後的煙火升空——不是隅田川那種兩萬發的規模，只有幾十發。但配合港灣水面倒影，每朵都在天上開兩次。\n\n煙火綻開的瞬間，蛍轉頭看著瞬的側臉。然後又看向陽菜——她正舉著手機錄影，眼睛映出煙火的顏色。\n\n蛍把手機拿起來。沒有拍照，沒有錄影。只打了一行字在備忘錄裡——\n\n「ディズニー。三月の日曜。夜のショー。——私が見た最後のディズニーかもしれない。」\n\n但她發出去的時候刪掉了最後一句。只留下日期和時間。\n\n只留下一句：「很幸福。」\n\n---\n\n这一天结束的时候。舞滨站台上。往东京方向的电车缓缓入站，陽菜在站台上回头看着他们二人。\n\n「今天——很开心。真的。」她说。\n\n不是平时那种明亮的「很开心——」。而是慢了一些、轻了一些的「开心」。\n\n蛍坐在轮椅上，仰起头看着陽菜，轻轻说了句——\n\n「陽菜さん。今日のこと、忘れません。」\n\n陽菜愣了一下。然后她快步走上前，蹲下来抱了抱蛍。\n\n「忘れないよ。」她说，「绝对。」\n\n瞬站在一旁看着两个女孩相拥的画面——米妮的头箍和达菲熊的头箍碰在一起。站台的风吹过来，他按住自己头上的米奇头箍。\n\n这个画面。他后来——在很多很多个夜晚，反复在脑海里重放。\n\n站台广播响起来，電車要开了，三人上车。最后一节车厢。并排坐着。窗外是渐渐暗下来的東京湾，灯火星星点点，和海面上最后一缕深紫色的光交织在一起。\n\n那是一天中最后的魔法时刻。\n\n---\n\n**蛍的日记 — 三月某日，晴**\n\n去了迪士尼。\n\n坐了旋轉木馬。坐了海底兩萬里。看了艾倫戴爾的假雪。\n\n摸了一下假雪，很冰。\n\n陽菜さん一個人去坐了自由落體，說好可怕，腿都軟了。那一刻我覺得她好勇敢。不是坐自由落體的勇敢——是另一種。是那種明知道排隊只能兩個人、還把自己那張券讓給我的勇敢。\n\n晚上看水上秀的時候，我偷偷看了好多次瞬君。\n\n他還是老樣子——不笑不叫不揮手。但陽菜さん錄影的時候，他把手從口袋裡拿出來握住了扶手。因為音樂中間有一段突然大聲，他下意識地想護住旁邊的人。\n\n只是旁邊的人這次是兩個。他意識到之後，手就收回去了。\n\n但我看到了。\n\n我的相簿裡，還需要今晚的一張——水上秀全景照。我等陽菜さん發了。\n\n如果可以的話，我真的很想再這樣。再去一次舞濱。再坐一次旋轉木馬。再看一次陽菜さん和瞬君戴頭箍。再看一晚水上秀。\n\n可不可以呢。\n\n手術還有三天。\n\n我不怕。\n\n我只怕一件事。\n\n晚安。瞬君。\n\n晚安。陽菜さん。\n\n晚安。迪士尼的魔法——如果你真的存在的話。請保佑他們。不是保佑我。\n\n（第十六卷 完）\n\n---\n*「今天のこと、忘れません。」*\n*「忘れないよ。絶対。」*\n*——她们都不知道，对方说的「忘れない」，重量是不一样的。*\n'},
  {title:'第十七卷 料理教室',content:'# 第十七卷 料理教室\n\n手术前两天。\n\n蛍说今天要学第二道菜。玉子烧。\n\n厨房里，瞬站在灶台前。系着静子的备用围裙——一条深蓝色的，上面印着白色小鱼。蛍坐在旁边的矮凳上，手里拿着料理笔记。\n\n「鸡蛋，三个。」她念道，「だし，两大匙。砂糖，一小匙。盐，少许。酱油，几滴。」\n\n「你在念咒语吗。」\n\n「这是食谱。」蛍把笔记本翻过来给他看——上面用铅笔密密麻麻写着每一道菜的步骤。字很小，很整齐。每一页都有编号：1、味噌汁。2、玉子烧。3、咖喱。4、肉じゃが。5、——空着。\n\n「第5个是什么。」\n\n「还没想好。也许是汉堡排。」蛍把笔记本合上，「先把玉子烧学会再说。」\n\n打蛋、调味、热锅、倒油。瞬的动作不算生疏——他在家偶尔也会做。但蛍对他要求很高。\n\n「筷子要这样——」她伸出手，在空中比了一个弧度，「从锅底铲起来的时候不能停。要一直卷一直卷。玉子烧的口感取决于卷的速度和翻面的时机。」\n\n「你怎么知道得这么清楚。」\n\n「电视上看的。」蛍淡淡地说，「美食节目。每次都在下午三点播。那个厨师说玉子烧是最基础的料理，但也是最难做完美的。因为越简单的东西，越骗不了人。」\n\n瞬握着料理筷，按她的指示把蛋液倒进锅里。蛋液在热油上迅速凝固，发出细微的声响。他用筷子把蛋皮往另一边推——推得太快了，蛋皮破了一个洞。\n\n「失败了。」\n\n「不是失败。」蛍探头看着锅里的洞，「是第一个。第一个是用来给锅预热的。不管破不破。」\n\n「这也是电视上说的？」\n\n「不。这是妈妈说的。」蛍顿了顿「小时候我想学做饼干。揉了好几次面团都太软，烤出来不成形。妈妈说：『第一个不算。第一个是给自己吃的。』」\n\n瞬把破了洞的玉子烧铲到盘子里。\n\n「那这个是你吃还是我吃。」\n\n「你吃。因为是你做的第一个。」蛍把盘子拉到自己面前，用筷子夹起破了的那块，吹了吹放进嘴里。「嗯——很甜。」\n\n「你还没放糖。」\n\n「……那就是蛋本身很甜。」\n\n瞬看着蛍把破了洞的玉子烧一口一口吃完。她吃得慢，但全部吃完了。\n\n第二次尝试。蛋皮没有破。卷得歪歪扭扭的，像一个被压扁的瑞士卷。但蛍说这是进步——「上次是洞。这次只是歪。下次就是直的。」\n\n第三次。他终于卷出了一个还算规整的玉子烧。只是颜色偏淡，因为他没放够酱油。\n\n蛍用筷子切开，看了看切面。「层数不够。只有三层。标准是六层。不过——」她把一块放进嘴里，「好吃。」\n\n瞬靠在灶台边。「你每次都說好吃。」\n\n「因為每次确实都不难吃。」她把筷子放下，抬头看他，「而且——瞬君。你知道吗。你做的东西，有一个特点。不是味道。是——你做菜的时候很安静。不像有些男生那样乱翻乱炒。你每一步都很慢，很仔细。像是把每道菜都当作一本书在读。」\n\n她垂下眼睛。\n\n「以后给你做饭的人，会觉得这件事很幸福。」\n\n瞬没有说话。厨房里只剩水龙头没拧紧的滴水声。\n\n窗外的夕阳从碗柜的玻璃门上透过来，把她的侧脸染成淡金色。\n\n「陽菜さん——会做饭吗。」蛍忽然问。\n\n「我不知道。」\n\n「下次问问她。」蛍说，「说不定她也是料理高手。如果她是的话，你就不用学太多。」\n\n瞬把第三个玉子烧切成两块，一块推到蛍面前，一块自己吃。\n\n「蛍。你为什么要在笔记本上留一个空的第5道。」\n\n蛍嚼着玉子烧的速度慢了下来。\n\n「因为还没想好。也可能是留给——汉堡排。」\n\n「你不喜欢吃汉堡排。」\n\n「……你看出来了。」\n\n「嗯。每年你生日，伯母都会做汉堡排。你每次都吃得最慢。」\n\n蛍把筷子抵在盘边。「我不喜欢汉堡排。因为汉堡排的形状——圆圆的，很像一個完整的句号。我不喜欢句号。」\n\n「那换一道。炸虾天妇罗。」\n\n蛍的眼睛亮了一点。「你会做吗。」\n\n「不会。但我可以学。」\n\n「好——那就炸虾天妇罗。」\n\n她把笔记本翻到最后一页，在第5道的空行上，认真写下：「エビの天ぷら。」\n\n写完抬起脸，她的表情是一种十分清澈的满足。\n\n「这样，料理笔记就完整了。」她说。\n\n然后她站起来，把笔记本递给瞬。\n\n「给你。」\n\n「为什么给我。」\n\n「因為這些是我教你做的菜——自然是你保管。」她想了想，「万一以后我忘了什么步骤，你可以提醒我。」\n\n瞬接过笔记本。翻开第一页——「味噌汁——装进碗里才加七味粉，因为瞬君喜欢。」\n\n「你写了这个。」他指着那行字。\n\n「嗯。因为很重要。如果你做给别人吃的时候忘了放七味粉——对方会觉得不够おいしい。那就可惜了。」\n\n瞬把笔记本合上，放在围裙口袋里。\n\n「没有别人。」他说。\n\n蛍正拿着抹布擦料理台。她的手停了一下，然后又继续擦。\n\n「现在没有而已。以后会有的。」\n\n说完她低下头继续擦，好像刚才只是在讲天气。\n\n那个傍晚，蛍还教了他一道不写在笔记本上的料理——おにぎり。她说这个太简单，不值得写。\n\n她把盐放在手心里，让瞬看她的动作。「盐要先放手心，不能直接洒在米饭上。握的时候手要沾一点盐水——力度要轻。太用力米饭会被压碎。」\n\n她握了一个，递给他。三角饭团。海苔包得很整齐。\n\n瞬接过来咬了一口。梅干的和咸味和米饭的甜味一起涌上来。\n\n他想说些什么。但发现自己什么也说不出来。\n\n「好吃吗。」蛍问。\n\n「……うまい。」\n\n「那是当然の。」\n\n她笑了。是那种很久很久才会出现一次的真正的笑容。\n\n窗外的夜空，没有星星。但路灯的光打在巷子地上，把雨宫家和桜井家之间的路照得很清楚。\n\n晚上。瞬回到自己房间。把围裙挂好，料理笔记放在书桌上。\n\n他打开LINE。陽菜的消息——「出院了吗——手术具体几号——」\n\n「三月六日。」\n\n「——那很快了呀。还有几天。」\n\n「两天。」\n\n陽菜过了好一会儿才回。「你会紧张吗。」\n\n瞬看着屏幕。他不知道怎么回答。他不是病人，不是医生，不是家属——他只是他自己。而他自己在这一刻只知道一件事：后天，蛍会被推进手术室。而那个成功率——百分之六十二。\n\n他打字：「有一点。」\n\n陽菜：「那我周五陪你去医院。在外面等。」\n\n「可能会很久。十几个小时。」\n\n「我等过的。上次我等我妈妈做手术，等了九个小时。我知道怎么等——带充电宝、带零食、带一本书。还有——」她顿了顿，「带随时准备好哭的纸巾。」\n\n瞬握紧手机。「陽菜。你为什么愿意这么做。为了一个不是你自己的家人。」\n\n陽菜的回复过了很久才弹出来——\n\n「你还不知道吗。」\n\n「她是你重要的人。所以她才是我去医院等待的理由。不是因为她是雨宮蛍，她和我认识也才不到一年。但因为她对你好——所以我对她也好。就是这样。」\n\n瞬看着屏幕。\n\n他发现自己打了四个字——「ありがとう。」然后又加了一行：「手术完了我给你消息。」\n\n他发完就把手机放下了。\n\n但陽菜没有再回。为什么沒有回——因为她在屏幕那头，发现自己第一个打出来的回复是一句：「好きだよ。」但她删掉了那句。她觉得今晚不该说这句话。要说，也是等手术之后。等他心上的石头搬开之后。\n\n但她还是截了个屏。把他那句「ありがとう」存了下来。\n\n---\n\n**蛍的日记 — 三月某日，晴**\n\n料理教室第二天。\n\n瞬君现在会做味噌汁和玉子烧了。至少不会饿死。\n\n今天教他握饭团的时候，他站在我旁边，比我高好多。我坐着，他站着。围裙上的小鱼被厨房灯照得有点反光。\n\n那一刻，我忽然想——如果我不是这样的身体。如果我能像陽菜さん那样站在他旁边。那我现在会做什么呢。也许会从后面抱住他。也许不会。但「也许」本身就是奢侈了。\n\n笔记本给了他。第5道菜是炸虾天妇罗。他说他不会做，但可以学。\n\n但我想了想，好像教不到那一步了。\n\n因为手术是后天。后天之后我还会不会有力气站在厨房里——不知道。\n\n但这次的手术，不管结果如何——我不会哭。\n\n不是因为我不怕。而是因为我怕的事情，已经发生过了。\n\n我最怕的事情，就是看着他走向另一个人的背影。\n\n这件事已经发生了。所以别的都无所谓了。\n\n晚安。瞬君。\n\n晚安。料理笔记和破了洞的玉子烧。\n\n晚安。一切还没有发生的事情。\n\n（第十七卷 完）\n\n---\n\n*「以后给你做饭的人，会觉得这件事很幸福。」*\n*「没有别人。」他说。*\n*「现在没有而已。以后会有的。」她说。*\n*——厨房的灯照在两个人身上。一个站着。一个坐着。*\n*菜刀安静地躺在砧板上，刀刃反射出一点柔和的光。*\n'},
  {title:'第十八卷 书与信',content:'# 第十八卷 书与信\n\n手术前一天。三月五日。\n\n这是蛍被允许在家的最后一天。明天一早，她就要住进医院。然后接受全身麻醉，被推进那间亮着无数盏灯的手术室。\n\n她没有害怕的表现。一整个上午，她都坐在窗台边，把书架上的书一本一本地抽出来。不是整理，是选择。\n\n「这一本给你。」\n\n她把一本《雪国》递给瞬。川端康成的。封面是旧的，书脊上的烫金已经磨损。扉页上她寫了一行铅笔字——「最初に読んだ小説。瞬君と一緒に読んだ。」\n\n——第一本小说。和瞬君一起读的。\n\n「还有这本。」\n\n她把一本《こころ》摞在上面。夏目漱石的。扉页上写着——「高校の時、瞬君が貸してくれた。返すのを忘れてた。ごめん。今返す。」\n\n——高中时候瞬君借给我的。忘了还。对不起。现在还。\n\n一本接一本。《ノルウェイの森》《海辺のカフカ》《人間失格》《女生徒》（他送的那本）、《夜行》《星の王子さま》《銀河鉄道の夜》——\n\n每一本的扉页，她都写了字。不是遗言。只是记忆。比如哪年哪个季节读到它，比如当时瞬在她床边还是窗台对面。\n\n「全部，给你。」蛍把最后一本摞上去，那叠书在矮桌上堆成了一座小小的纸山。\n\n「为什么。」瞬看着那座书山。\n\n「因为我不需要了。这些书我都看过了。有些看了很多遍。内容我全记得。我可以默背《雪国》的开头——『国境の長いトンネルを抜けると雪国であった。』默背也不需要一个字都不差。因为人脑海里的句子，是可以稍有偏误的。稍有偏误——才叫记忆。」\n\n她拍了拍最上面那本书的封面。\n\n「它们是好书。不要放在旧书店里。放在你那里的话——偶尔你会翻一下。翻的时候会看到扉页上的字。」\n\n瞬接过书。一摞。不算太重。但每本的纸页都因为被翻过很多次而微微发胀。\n\n「这么多本，扉页你都写了。」他说。\n\n「嗯。从早上就开始写了。」\n\n「早饭没吃？」\n\n「吃了一片面包。」\n\n瞬把书放在旁边的地板上，站起来。蛍看着他的背影走到门口。\n\n「我去煮粥。」\n\n「瞬君——」\n\n「你继续写别的。书不是还有一半没拿下来的。」\n\n蛍看着他的背。他的肩膀比少年时期宽了一些。不知道什么时候变的。她看着他的背影消失在楼梯口，然后转回来，从书架上又抽出了一本。\n\n这本没有写在扉页。而是从书页间拿出一张叠了多次的信纸，夹在最后一章。那是她很久以前写的信。一直放在这本书里面。从来没有给过他。\n\n她把那本书放在了书堆最下面。没有特别说明。如果他翻到最后一章，会看到的。\n\n厨房里，瞬在淘米。水龙头流出的水很冷。他的手被冻得有些发麻。但他没有调水温。\n\n他想起刚才蛍说的那句话——「因为我不需要了。」\n\n他不知道这句话是真的，还是她拿来骗自己的。但無論真偽——她说这句话时的表情，是他见过的最平静的一次。\n\n平静到他只能转身走去厨房。\n\n粥煮好了。他端上去的时候，蛍已经把所有书都挑出来了。整整兩疊。一疊大的放地上，一疊小的放在矮桌上。小疊的那些是絵本——她說：「這些給美咲。如果她不要就拿去幼稚園。」\n\n她把给瞬的最后一本书搁在桌上。是一本《夜は短し歩けよ乙女》。森見登美彦的。扉页写的是——\n\n「これは一番新しい本。昨年の誕生日に買った。瞬君と一緒に読もうと思ってた。でも今はあなただけで読んでね。——蛍。」\n\n——这本是最新的。去年生日买的。本来想和瞬君一起看。但现在请你自己看吧。\n\n瞬把那本书放进了自己的书包里。\n\n傍晚，静子回来帮蛍收拾入院的行李。换洗衣物、保温杯、眼罩、耳机。还有——蛍坚持要带的相册。静子把它用布包了好几层才放进行李袋。\n\n「妈妈，」蛍坐在床边，看着静子整理，「如果我明天醒不过来——」\n\n「你会醒过来的。」\n\n「我知道。我是说如果。」蛍的语气很耐心，「行李里有那本相册。你要帮我寄出去。收件人的地址放在相册最后一页，白色的信封里。」\n\n静子的手停了下来。\n\n「寄给谁。」\n\n「寄给一个对我很重要的人。不是瞬君。」\n\n静子的嘴唇动了动。\n\n「……好。妈妈帮你寄。」\n\n蛍点点头。然后她说：「妈妈谢谢你。一直以来。」\n\n静子没有回头。但她肩膀抖了一下。她继续低头叠衣服，把一件淡紫色的睡衣非常仔细地叠进包里，棱角方正。\n\n晚上。瞬在自己房间里翻着蛍给的那些书。从《雪国》翻起。扉页上的字他读了很长时间。然后翻到中间——书里掉出一页便签。是她抄写的段落——「島村は、自分の虚しさを、彼女に、直接相手に逢わぬまでも、手紙なら書けるような気がしていた。」\n\n——《雪国》里的句子。岛村觉得，自己的空虚，即使不和对方见面，用信写出来也可以传达给她。\n\n他在《こころ》里也找到了便签。在最后一章。她写：「先生は、遺書の中で『私は今自分で自分の心を破って、その血であなたの顔を洗おうとしている』と言った。私もそう思う。——蛍。」\n\n——先生那封遺書里说：「我现在要撕裂自己的心，用那个血来洗你的脸。」我也这样想。\n\n瞬把便签纸一张一张翻过去。每找到一张，就要停下来，把句子在心里默念两遍。\n\n然后他翻到了最底部那本——《夜は短し歩けよ乙女》。起初没看到便签——但他翻到最后一章的时候，书页变得很厚。因为两张信纸，对折，夹在书脊里。\n\n他抽出来展开。\n\n第一行是：「瞬君へ。」\n\n他看下去。\n\n「この手紙を読んでいるということは、私はもういないのだと思います。」\n\n——当你在读这封信的时候，我想我已经不在了。\n\n「でも、言いたいことは、とてもシンプルです。ありがとう。そして、ごめんね。二つの間には、たくさんの言葉があるはずなのに、結局、この二つしか出てこなかった。ありがとう。私の世界を、最後まで照らしてくれて。ごめんね。あなたの未来を、最後まで見届けられなくて。」\n\n——但是我想说的话很简单。谢谢你。还有，对不起。这两句话之间应该有很多很多话才对。但到头来，只写得出这两句。谢谢。谢谢你在最后，照亮了我的世界。对不起。我不能陪你看到最后的未来。\n\n「だから、お願いがあります。私のことは、悲しまないで。というよりも——悲しむ時間を、短くしてください。何年も何年も、引きずらないで。それだけが、私の唯一のお願いです。私があなたに残せるものは、本だけ。本と、窓の外の桔梗。それだけしかないけど——それで十分でしょ？だって本は読めるし、桔梗は毎年咲くから。」\n\n——所以我有一个请求。不要为我悲伤。或者更准确地说——请让悲伤的时间短一些。不要拖到很多很多年。这是我唯一的请求。我能留给你的，只有书。书，和窗台的桔梗。只有这些——但这样就够了吧。因为书还可以读，桔梗每年还会开。\n\n「最後に——陽菜さんを、よろしくお願いします。——じゃなくて、陽菜さん、瞬君をよろしくお願いします。どっちも同じか。」\n\n——最后——陽菜さん，请多关照他的以后。——不对。应该是：陽菜さん，瞬君就拜托你了。嗯，都一样。\n\n「じゃあね、瞬君。私の人生は、短かったけど、悪くなかった。だって、毎日、毎日、あなたが窓の向こうにいたから。」\n\n——那么再见了，瞬君。我的人生虽然很短，但不坏。因为每一天，每一天，你都在窗户对面。\n\n「——雨宮蛍。」\n\n瞬放下信纸。\n\n他靠着书桌坐在地上。窗外是东京的夜空，没有星星，但是路灯很亮。对面二楼的窗户，窗帘后有橘黄色的灯光。\n\n还在。那盏灯还在。\n\n他攥着信纸的手，攥得太紧，把信纸边缘捏皱了。\n\n他不记得自己这样坐了多久。最后，他把信纸重新折好，夹回书里。\n\n然后把书摞整齐。一本挨着一本，书脊朝外，摆在他书架的中间层——最顺手的那层。\n\n他拿起手机。\n\n「明天几点入院。」\n\n蛍秒回：「八点。」\n\n「我七点过去。」\n\n「太早了——你睡眠不足。」\n\n「我叫我妹叫我。」\n\n「……好吧。瞬君，おやすみ。」\n\n「おやすみ。」\n\n他没有放下手机。他对着对话界面看了很久。\n\n然后他打出四个字：「手紙、読んだ。」\n\n已读。\n\n蛍的状态变成了「对方正在输入……」。持续了好久好久。然后——消失了。\n\n没有回复。\n\n---\n\n**蛍的日记 — 三月五日，手术前夜**\n\n信被他找到了。他回了「手紙、読んだ」。我不知道该回什么。所以没有回复。对不起。\n\n今天把所有的书都给了他。每一本的扉页写了字。这不是告别。因为就算能醒来——那些书还是应该给他。他会好好保管的。我知道。\n\n妈妈把相册放进了行李袋里。用布包了好几层。我没告诉她相册是给谁的。但我觉得她隐隐约约猜到了。\n\n妈妈今天在厨房哭了。她以为我没听到。但我听到了。不是那种嚎啕大哭，是那种水龙头开得很大、中间夹着几声很轻的抽泣。我没有下楼。因为如果我下去，她会擦干眼泪对我笑。而我不想让她勉强。\n\n今晚的夜空没有星星。\n\n但是路灯很亮。把巷子照得很清楚。\n\n如果这是最后一个晚上了——如果明天以后我真的没醒来——那我想说：我的人生不坏。不是因为有了什么了不起的东西。而是因为有一个人，从出生就住在对面。每一天，每一天，他都在窗户的对面。\n\n这样就行了。\n\n晚安。瞬君。明天的早晨，我可以再看你一眼吗。如果可以的话——再看一次就好。\n\n（第十八卷 完）\n\n---\n\n*——他找到了那封信。*\n*在书的最后一章。*\n*一个女孩用了自己最短最美的语言，告诉他：*\n*不必悲伤。*\n*但她没有告诉他的是——她自己也做不到。*\n'},
  {title:'第十九卷 抉择前夜',content:'# 第十九卷 抉择前夜\n\n三月十二日。手术已经过去六天。\n\n蛍活了下来。手术成功——心脏瓣膜被替换成了机械瓣膜。但术后出现了并发症：肺部感染，急性肾功能不全的前兆。她被留在ICU观察。\n\n在六天里，她只短暂清醒过两次。一次喊了「お母さん」。一次看到瞬之后——什么也没说，只是看着他，像是确认了什么。然后又闭上了眼睛。\n\n医生说——继续观察。情况不是最坏的，但不是最好的。\n\n这段时间里，瞬每天从大学下课后来医院。先坐电车，再步行十分钟。走到医院楼下的时候，他会习惯性地抬头数到十二楼的窗户。不知道哪一个窗户是她的病房——但他总是数。\n\n三月十二日晚。东京的夜空难得有几颗星。\n\n桜井家。瞬的房间。\n\n瞬坐在书桌前。面前摊着那本料理笔记。他翻到第5道——「エビの天ぷら」。蛍的字。铅笔写的。旁边还有一个小括号：「瞬君は多分、衣がうまくつけられないと思う。」\n\n——瞬君大概会裹不好面衣。\n\n他笑了一下。然后把笔记本合上。但手没有离开封面。他的手指在纸页边缘摩挲着，像是要擦掉什么看不见的东西。\n\n手机震了一下。\n\n陽菜：「周六有空吗。下午两点，新宿御苑。有重要的话想对你说。」\n\n瞬看着这行字。\n\n周六。三月十五日。三天后。\n\n他知道那句话是什么。从台场摩天轮开始他就知道。便利店里、银杏树下、富士山顶、代々木公園、LIVEHOUSE后台——她每一次看向他的眼神，都在提前预演那句还没有说出口的话。\n\n他之前没有让她说出来。因为他觉得自己还没有准备好。\n\n而现在——\n\n他翻来覆去地看了这句话三次。\n\n然后回复：「好。」\n\n几乎是瞬间。陽菜：「你答应了——」\n\n「嗯。」\n\n「那——周六下午两点。新宿御苑。正门。」\n\n「好。」\n\n他没有再说别的话。陽菜也没有再发消息。但他们之间的已读标记都亮着。像是两个人都握着手机，却谁都不想先放下。\n\n同一时刻，高橋陽菜的房间。\n\n陽菜把手机抱在胸前，仰躺在床上。\n\n他答应了。他终于把那个「好」字打出来了。\n\n她翻了个身，打开抽屉拿出那个塞满便签纸的小盒子。数了数——七张。第一张是代々木公園那天晚上写的：「如果有一天／你的眼里／不再只有她的身影／那我——／会告诉你。」最后一张是上周写的：「等她好了之后／我要说出来。」\n\n她把七张便签全部排在被子上。每一张都看过一遍。\n\n然后她给絵里发了一条LINE：「周六。新宿御苑。我要说了。」\n\n絵里的电话直接打进来了。\n\n「你真的要说了？」\n\n「真的。」\n\n「万一——」\n\n「没有万一了。」陽菜握紧手机，「絵里。我知道你在担心什么。但是——我等不了了。不是不想等了。是不能等了。因为我发现，每次看到他难过的时候，我想安慰他。但我伸出手，又觉得没有立场。只能发LINE说——『一切都会好的』。那种感觉很——」\n\n「手が届かない。」絵里替她说完了。\n\n「……对。就是那种。」\n\n絵里在电话那头沉默了几秒。然后她轻声说：「那你去吧。不管结果怎样——你还有我。」\n\n陽菜弯起嘴角。挂了电话后，她从衣橱里挑了一件淡粉色的连衣裙，熨好后挂在门背后。周六穿。\n\n然后她又给瞬发了一条LINE：「晚安。周六见。」\n\n瞬：「嗯。おやすみ。」\n\n她在被子里把手机屏幕贴在脸上。凉的，但心里很暖。\n\n同一时刻。東京大学医学部附属病院。十二楼ICU。\n\n蛍醒了。这一次清醒的时间比之前长。\n\n医生做完检查后，允许家属探视。静子先进去——握着女儿的手说了好多话。蛍一直点头，偶尔说一两个音节。脸色还是很苍白。身上插着好几根透明的管子，仪器在旁边不停地响。但她说话时的表情，是平静的。\n\n静子出来后，对瞬说：「她让你进去。」\n\n瞬穿上隔离衣，戴上口罩，走进ICU。\n\n蛍半躺在床上，头侧向他。她的嘴唇发干，但她没有要求水。只是看着他走近。\n\n「瞬君。こんばんは。」她的声音比平时更轻——轻得像一页薄纸从书上剥离。\n\n「こんばんは。」\n\n瞬在床边的椅子上坐下。机器规律的「ピッ、ピッ」声填满了他们之间的沉默。\n\n「手術は——うまくいったんだって。」蛍慢慢地说，「でも、まだ少し、体がついていかない。ごめんね。心配かけて。」\n\n——听说手术成功了。但身体还没跟上。对不起，让你担心了。\n\n「你不用道歉。」瞬说。\n\n蛍轻轻摇了摇头。「謝りたいわけじゃない。言いたいのは、別のこと。」\n\n——不是想道歉。想说的是别的。\n\n瞬等她。机器声很有规律地响着。\n\n「土曜日でしょ。」蛍说，「陽菜さんが、何か言うんでしょ。」\n\n——是周六对吧。陽菜さん，要说什么事情对
