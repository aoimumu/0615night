吧。\n\n瞬的呼吸滞了一下。\n\n「你怎么知道。」\n\n「インスタグラム。陽菜さんの——今日、新宿御苑の写真をアップしてた。『週末、大事な日』って。それに——瞬君の返信の書き方が、いつもとちょっと違ってた。優しかった。」\n\n——Ins。陽菜さん今天发了新宿御苑的照片。说「周末，重要的日子」。而且——瞬君回我消息的语气和平时有一点不一样。比较温柔。\n\n她说完，闭了一下眼睛。机器的「ピッ」声像是替她说完了一句话。\n\n「蛍。我——」\n\n「言わなくていい。」蛍打断他，「あなたが何を選んでも、私は大丈夫。昔から——ずっと大丈夫だった。だから今回も大丈夫。だから——ちゃんと行って。ちゃんと聞いて。」\n\n——不用说。不管你选什么我都没关系。从小开始就一直没关系。所以这次也没关系。所以——去吧。好好听她说。\n\n机器还在响。但瞬听得见自己的心跳在加急。\n\n「蛍。お前は——」\n\n「うん？」\n\n「お前は、俺に、もっと怒ってもいいんだ。」\n\n——你可以对我更生气一些的。\n\n蛍眨了眨眼。然后她笑了——是那种很淡很淡、几乎没有弧度的笑，但眼睛亮了一下。\n\n「怒ってるよ。」她说，「怒ってる。すごく。小さいころからずっと。あなたが私を妹みたいにしか見てくれなかったこと。私がいくつになっても、あなたにとっては『向かいの家の蛍』だったこと。ぜんぶ、怒ってる。」\n\n——生气啊。我很生气。从很小的时候开始就一直。气你一直只把我当妹妹看。气我不管长到几岁，对你来说都只是「对面那家的蛍」。全部都。\n\n「でも——」她深吸了一口气，机器的警报没有响。「でも、それ以上に、ありがとうって思ってる。だから大丈夫。——私は大丈夫。」\n\n——但是，比起那个，更觉得谢谢你。所以没关系。——我没关系。\n\n这句话说完，她闭上了眼睛。不是昏过去了，而是像说完了所有的话之后，整个人从里到外都松弛了。\n\n瞬站起来。他伸出手——本想去握她的手。但手在半空停住了。他想起自己的手上有隔离手套，手套外面不是他能碰到的皮肤。于是他把手收回来，放在床沿上。\n\n「土曜日。ちゃんと行く。でも——ちゃんと帰ってくる。」\n\n——周六。我会去。但是——我会回来。\n\n蛍没有睁开眼睛。但她轻轻点了点头。\n\n「うん。」她说，「帰ってきて。」\n\n——嗯。回来吧。\n\n晚上十点半。瞬走出医院。\n\n电车还有一班。他站在站台上时，手机响了LINE。\n\n陽菜：「睡了吗。」\n\n「没。刚从医院出来。」\n\n「这么晚去——蛍ちゃん怎么样了——」\n\n「醒了。说了几句话。现在睡了。」\n\n陽菜隔了几秒回：「那就好。瞬君，你累吗。」\n\n「有一点。」\n\n「那就早点休息。周六——如果累了可以不来的。延期也没关系——」\n\n「去。」他回，「一定到。」\n\n站台的风吹过来。很冷。他把手机揣进口袋。看着对面夜空中唯一可见的几颗星。\n\n同一时刻。高橋陽菜在房间里，看着手机屏幕上那两个字——「一定到。」她把手机捂在胸口，閉上眼睛。\n\n同一时刻。蛍躺在ICU的病床上，也闭着眼睛。她的嘴唇在轻微翕动，似乎在默念什么东西。如果凑得很近，也许能听见——她念的是他最后说的那句：「帰ってきて。」\n\n三人在东京不同的角落，在这个三月十二日的夜晚，各自闭眼。\n\n窗外的风从西高东低。吹过世田谷区的小巷，吹过新宿的高楼，吹过不忍池的薄冰。东京没有下雪。但这夜冷得像雪落在身上的前一秒。\n\n---\n\n**蛍的日记 — 三月十二日，深夜**\n\n今天醒了。和瞬君说了话。\n\n我告诉他：我很生气。\n\n这大概是我这辈子对他说过最诚实的一句话。\n\n诚实说话的代价是——胸腔里那颗新的机械瓣膜好像跳得比平时重了一点点。医生说它还没完全适应身体。也许它也不想适应。\n\n但不管怎样，我把话说了。\n\n然后我说：我没关系。\n\n这句是谎话。\n\n但没关系。\n\n如果周六一切顺利——那周日我会发LINE给你。发什么呢。还没想好。大概会发——「今日、ちゃんと話せてよかったね。」——今天好好说出来了，真好呀。\n\n就是这句吧。\n\n晚安。瞬君。\n\n晚安。陽菜さん。\n\n晚安。新买的连衣裙，和新到的心脏瓣膜。\n\n（第十九卷 完）\n\n---\n\n*「私は大丈夫。」*\n*她说没关系的时候——机器上的心律数字跳了一下。*\n*从六十二跳到六十三。*\n*只跳了一格。*\n*但机器不懂。那一格，是「さようなら」。*\n'},
  {title:'第二十卷 朝日之来ない朝',content:'# 第二十卷 朝日のない朝\n\n三月十五日。\n\n清晨六点，东京的天空开始泛白。\n\n桜井瞬醒得很早。他没有开灯，摸黑穿好衣服——深蓝色的衬衫，外面是灰色的风衣。这是美咲昨晚帮他准备好的，说「约会不要穿得像去图书馆」。\n\n他去厨房倒水喝的时候，美咲居然已经坐在餐桌前了。她穿着睡衣，双手捧着一杯热可可，眼睛还不太精神。但她看到瞬，立刻问——\n\n「哥哥，你今天是不是——要去見陽菜姐？」\n\n「嗯。」\n\n「那你準備好說什麼了嗎。」\n\n瞬喝了一口水。「不知道。」\n\n「不知道——是什么意思。」\n\n「意思是——」他把水杯放下，「我今天早上起来，还在想昨天晚上的事。」\n\n「昨晚什么事。」\n\n「蛍跟我说——她很生气。从小开始就一直在生气。因为她喜欢我，可我从没把她当女孩子看过。」\n\n美咲的热可可停在了半空。\n\n「……那你現在怎麼想。」\n\n瞬靠在厨房门框上。\n\n「我不知道。」他又说了一遍，「但我答应了蛍——去见她。去听陽菜要说的话。然后回去找她。」\n\n美咲把可可放下。\n\n「哥哥。你错了。」\n\n「什么错了。」\n\n「你不可能『回去』找蛍姐。不管陽菜姐对你说了什么——除非她说『我放弃』，否则你就不可能回去蛍姐身边。而你觉得陽菜姐会说那种话吗。她等了你这么久。」\n\n瞬没有说话。\n\n美咲站起身走到他面前。她的身高只到他肩膀。她仰着头看着他——\n\n「去新宿吧。不管怎样——先听完陽菜姐要说什么。然后，做你的决定。蛍姐也好，陽菜姐也好——你选谁，我都支持你。但你要选。不能两个都怕伤害。两个都怕的话——两个都会受伤。」\n\n瞬看着她。妹妹好像第一次用这种语气和他说话。\n\n「……ありがとう。」他说。\n\n「いえ。」美咲重新捧起可可，「牛奶。」然后补充：「只是牛奶。」\n\n清晨八点。高橋陽菜的房间。\n\n陽菜站在镜子前。她穿着那件淡粉色的连衣裙。头发放下来了，发尾用卷发棒微微卷过。画了淡妆——只有粉底和睫毛膏。嘴唇上涂了一点点带淡橘色的唇釉。\n\n她在镜子前转了一圈。深吸一口气。\n\n手机亮了一下。絵里的LINE：「新宿御苑の近くにいる。終わったらお茶。がんばって。」\n\n——我在新宿御苑附近。结束了喝茶。加油。\n\n陽菜回了一个「ありがとう」。然后她把手机收进包里。又把抽屉里叠得整整齐齐的一个信封拿出来——里面是一封手写的情书。写了改，改了写，一共重写了四次。\n\n她把它放进外套口袋里。\n\n然后她穿上最漂亮的米色风衣。围上围巾。换好鞋子。出门。\n\n清晨九点。东京大学医学部附属病院。\n\n蛍醒了。今天她的精神比前几天都好。医生测了指标，发现感染指标略有下降，肾功能也在恢复。虽然还在ICU，但所有人都觉得情况在慢慢好转。\n\n静子来了。蛍今天能坐起来几分钟了。她靠在床上，对静子说：「今朝は調子がいい。」\n\n——今天早上状态不错。\n\n静子的眼里全是泪水。「よかった——よかった。」\n\n蛍让妈妈帮她拿出那个包了好几层布的相册。她把相册放在床头柜子上。然后她拧开笔，翻开最后那页——那页之前被留了空白的「あとがき」。她开始写字。\n\n一笔一划，写得很慢。写到最后一行的最后一个字时，她停下笔，等了很久。然后把笔放下。\n\n「お母さん。」\n\n「はい。」\n\n「今夜——たぶん、これを出してほしい。」\n\n——今晚。大概。帮我把这个寄出去。\n\n静子看到相册封面打了个快递标签。上面写着：「東京都世田谷区——高橋陽菜様」。\n\n「ここにはクリニックの住所と——」蛍指了指标签旁边的小字，「——届かないときの連絡先。もし戻ってきたら——お母さんが持ってて。」\n\n——这是诊所的地址。如果寄不到退回的话——妈妈你收着。\n\n静子接过那个沉甸甸的牛皮纸包裹。\n\n她没有问为什么。\n\n因为她知道那里面装了什么东西，也知道女儿为什么要在这个早上把它准备好。\n\n「……はい。今夜、出します。」\n\n蛍点了一下头。然后重新躺回枕头上，闭上眼睛。\n\n但她的嘴唇在轻轻翕动。\n\n静子凑近去听——听不清。她听不清，但能猜到是谁的名字。\n\n上午十点十七分。桜井瞬在家门口接到了那通电话。\n\n来电显示：雨宮静子。\n\n他接起来。听到的第一秒是喘气声。不是说话，是喘气——有人在哭，哭得喘不上来气。\n\n「——伯母？」\n\n「——しゅん君——」\n\n「伯母、何があった——」\n\n「蛍が——今朝急に——心臓の負荷が——緊急でまた——」\n\n——蛍，今天早上突然，心脏的负荷过大，医生说要紧急——\n\n瞬握着手机的手指失去了感觉。\n\n「今、どこですか。」\n\n静子的声音断断续续：「病院——同じ——ICU、でも急変——先生が——今回、もしかしたら——持たないかもしれないって——」\n\n——医院，还是那个ICU。但是情况突变。医生说，这次可能撑不过去。\n\n手机从瞬的手里滑出来，但瞬接住了。\n\n「すぐ行きます。」\n\n他挂了电话，冲向巷口。一边跑一边给陽菜发了一条LINE——\n\n「蛍が急変した。ごめん。先に病院に行く。時間に間に合わなかったら——本当にごめん。」\n\n——蛍突发了紧急情况。对不起，我先去医院。如果赶不上的话——真的很对不起。\n\n已读。但是没有回复。\n\n因为此时的陽菜，正坐在电车上。她没有看手机。她在看着车窗外流逝的风景，在脑内排练第十一遍告白词。\n\n「好きです。ずっと前から——」\n\n——不行，太普通了。\n\n「あのね、瞬君——私は——」\n\n——太随便了。\n\n她不知道自己已经收到了那条LINE。等她到新宿御苑时，站在正门口掏出手机看一眼时间——她就会看到。\n\n但她此刻还不知道。\n\n新宿御苑。正午的阳光照在樱花上。今年桜花在三月初就开了，比往年都早。阳光透过淡粉色的花瓣洒在地上。陽菜准时出现在正门口。手里还捏着那封情书。她的呼吸很轻，嘴角微微翘着，眼睛里全是期待。\n\n然后她拿出手机。\n\n她想说：「我已经到了哦——」\n\n然后她看到了那条LINE。\n\n她的笑容凝固了。\n\n手指悬停在屏幕上方，一动不动。公园里的孩子跑过她身边，笑着闹着，她全然听不见。\n\n陽菜慢慢放下手机，在石阶上坐了下来。阳光很好。樱花很漂亮。她的情书在手里被轻轻攥紧。\n\n没有泪水。她只是坐了很久很久。然后她站起来，把情书仔细放回包里。\n\n她沒有走。她就在那裡——不知道是要等，还是不敢走。而她头顶的樱花落了。\n\n下午一点。東京大学医学部附属病院。\n\n瞬冲进大厅，跑到电梯前——但电梯门正关着。他转身冲进楼梯间。十二楼。一层又一层。\n\n他不记得自己爬了多久。只记得每一步落下去的时候，脑子里都有同一个画面——蛍的窗台。桔梗花。最后那行字：「じゃあね、瞬君。」\n\n他跑到十二楼的时候，静子站在ICU门口。她的眼睛红透了，但她没有哭出声音。她看到瞬，走上前，抓住他的两条胳膊。\n\n「伯母——」\n\n「しゅん君——」她的声音碎了，「まだ生きてる。まだ——だけど——先生が——」\n\n——她还活着。还活着。但是——医生说——\n\n静子没有说完。\n\n瞬看向ICU的门。门上那块磨砂玻璃，里面一切看不清楚。只有机器运作的隐隐声音，滴滴答答地漏出来。\n\n他在门口的塑胶椅子上坐下来。\n\n手机里陽菜的消息弹出来——不是对今天任何事情的质问。\n\n「蛍ちゃん——大丈夫？」她问。\n\n原来她已经到了新宿。看到了消息。然后问了这样一句。\n\n瞬回复：「まだわからない。」\n\n——还不知道。\n\n陽菜：「私もそっち、行っていい？」\n\n——我也可以去那边吗。\n\n瞬的手指停在屏幕上。\n\n他想起了美咲的话——「你不能两个都怕伤害。两个都怕的话，两个都会受伤。」\n\n他打字：「来てください。」\n\n这三个字是他打出来的最重的三个字。\n\n下午四点。陽菜到了医院。\n\n她来的时候还穿着那件淡粉色连衣裙。風衣外面沾了点花粉。她快步走到十二楼走廊里，看到瞬坐在ICU门口的椅子上。他没有抬头。\n\n陽菜没有走过去说话。她在走廊对面的椅子上坐下来。隔着一条塑胶地板的距离。看着同一个方向。\n\n新宿御苑的情书——还安静地躺在她的口袋里。\n\n她不知道等一下会发生什么。但她知道他需要她在这里。这就够了。\n\n两个人，隔着病房的门，隔着一条走廊。没有人说话。\n\n而门的里面——\n\n蛍在ICU的病床上，睁着眼睛。她的呼吸很轻。每一次氧气面罩上的薄雾出现又消失。她看到窗外的天色一点点变化。从淡蓝变成金黄，从金黄变成暗橙，从暗橙变成深灰。\n\n她想讓護士幫她把窗簾拉開一點。但沒有力氣說話。\n\n於是她想——如果瞬君來了的話。他會幫我拉開窗簾。\n\n然後她就等著。窗外的天暗下來的那一瞬間，走廊的燈亮起了白晝光色。而她的心拍監視器又響了一次不一樣的節奏。\n\n——靜脈搏動。不整脈。\n\n醫生衝進來。她在逐漸模糊的視線裡，看了一眼門口的影子。她想知道哪個是他——是走廊右邊那個站著的，還是左邊那個坐著的。\n\n但門很快被關上了。\n\n（第二十卷 完）\n\n---\n\n*「時間に間に合わなかったら——本当にごめん。」*\n*新宿御苑の桜が、三月十五日の風に散った。*\n*——那个曾约好告白的女孩，没有得到回答。*\n*那个曾学会做玉子烧的男孩，跑向病房。*\n*那个等在病床上的青梅，闭上了眼睛。*\n*这一天，没有人等到了他们想等的东西。*\n'},
  {title:'第二十一卷 瞬く蛍火',content:'# 第二十一卷 瞬く蛍火\n\n## 一、桜井瞬 —— 最後の選択\n\n三月十五日，下午四点四十分。\n\n桜井瞬接到静子的第二通电话。她说蛍暂时稳定下来了，但医生建议家属做好最坏的准备。他说，我马上到。\n\n从医院走廊到电梯、出大厅、过不忍通——这条路他走过无数遍。但今天，傍晚的街道在他眼里像是被拨慢了帧速率。夕阳很缓地沉进不忍池。水面上几只白鹭飞起来，翅膀扇动的弧线仿佛可以一帧一帧数到最后一帧。\n\n穿过本乡三丁目的十字路口时，他看到一个小孩。\n\n大约三四岁的男孩，蹲在马路中间捡掉落的玩具车。而那辆卡车——从东侧驶来的小型货运卡车，司机正在扭头看导航，没有减速。\n\n瞬在那一瞬间想了什么——后来没有人能知道。\n\n他只是跑了过去。\n\n用尽全身力气把小孩推开。\n\n然后——\n\n沉闷的撞击声。不是很大。大的是刹车。轮胎在地面上磨出刺耳的长号，把整条街的行人都惊得转过身来。\n\n他摔出去好几米。后脑先着地，然后整个人摊在柏油路上。头下的血慢慢渗开来。像不忍池水面撞碎的夕阳。\n\n有人尖叫。有人打一一九。有人跪下来把手放在他的胸口又拿开。\n\n而桜井瞬，在他意识消失前的最后几秒——据说人停止前的最后思想会变得非常清晰。\n\n他首先想到了陽菜。\n\n新宿御苑。她穿粉色的裙子。手里拿着信。她现在一定还在等。她等了那么久……对不起，又要让她等了。\n\n然后他想到了蛍。\n\n蛍说过——「帰ってきて。」\n\n她说这句话时的声音，和她趴在窗台上说「早点回来」时一模一样。他答应她会回来的。从小到大，这是第一次对她失约。\n\n最后他想到的是料理笔记上的空白第五道。\n\n「エビの天ぷら。」\n\n还没学会。\n\n四月还没到。桔梗花还没有开。料理笔记还放在他书桌上。而他想——如果蛍看到了，会不会在空白栏里帮他补完。补上一行字。一行只有四个字的说明。\n\n他想不出来那四个字是什么。\n\n然后他的意识沉了下去。\n\n远处，救护车的声音裹着东京三月的晚风，从本乡通传向不忍池。\n\n## 二、雨宮蛍 —— 待ち人来たらず\n\n下午五点四十分。\n\n雨宮蛍的病情暂时稳住了。\n\n她躺在ICU的病床上，身上依然插满了管子。机器规律地响着。氧饱和度稳定在九十三。心率偏快但勉强整齐。医生说她暂时脱离了最危险的阶段，但仍然不能转出ICU。\n\n她睁开眼睛的时候，问静子时间。\n\n「五点四十二分。」\n\n「瞬君は——」\n\n「来るって言ってた。」静子握着女儿的手，「もうすぐ着くはず。駐車場が混んでるのかもね。」\n\n——他说要来的。应该快到了。可能是停车场太堵。\n\n蛍点了一下头。\n\n她去看了自己床头那个牛皮纸包裹。还没寄出去。她想等瞬君来了之后，再和妈妈说。如果——如果在听到了那句话之后，她改变主意了。\n\n万一陽菜さん没有对他说什么呢。\n\n万一陽菜さん没有告白成功呢。\n\n万一——\n\n但她摇了摇头。因为这些万一都不重要了。刚才从鬼门关爬回来一次之后，她忽然想通了一件事——活着本身，就是最重要的那件事。只要能活着，剩下的，都可以等。\n\n下午六点十五分。门响了。\n\n不是瞬君。\n\n高橋陽菜推开ICU的门。她穿着淡粉色的连衣裙，風衣上沾着救护车的气味。她的头发被风打乱，脸上没有哭过的痕迹。但她眼睛里那种明亮的东西——全没了。只剩下一层像是隔着很厚玻璃看人的钝光。\n\n「……陽菜さん。」蛍的声音很轻。\n\n陽菜在床边的椅子上坐下。她没有靠近太多。没有握手。没有拥抱。\n\n「蛍ちゃん。」她说，「私——今から話すこと——どう言えばいいか——」\n\n——我接下来要说的话，应该怎么说才好。\n\n她停住了。然后她深吸一口气。\n\n「——事故だった。本郷三丁目の交差点で。トラック。子供を助けて——」\n\n——是事故。在本乡三丁目十字路口。卡车。为了救小孩。\n\n「——桜井君は、亡くなった。」\n\n——桜井君，去世了。\n\n机器规律地响着。ピッ、ピッ、ピッ、ピッ——滴答。滴答。滴答。\n\n蛍的表情没有变化。第一秒，没有变化。第二秒——她闭了一下眼睛。\n\n非常短暂。然后重新睁开。像是刚才只是眨了一下眼睛。\n\n她没有说「嘘でしょ」。没有说「信じられない」。没有哭。没有喊。就是那样躺在那里。看着陽菜的脸。然后轻轻地——\n\n「ありがとう。伝えてくれて。」\n\n陽菜的手在发抖。她不敢哭。因为蛍没有哭。她不知道为什么蛍没有哭，但她觉得如果自己先哭了，就会被蛍看穿。她在急诊室里听到消息时没有哭，在米花警察署确认了姓名时没有哭，在来医院的出租车上没有哭。现在也——不敢哭。两个人隔着一张ICU病床，隔着一个死讯。谁都没有让眼泪掉下来。\n\n过了很久，蛍先开口。\n\n「陽菜さん——今日、何を言うはずだったの。」\n\n陽菜张了张嘴。她的手伸进口袋，摸到了那封被攥了三小时的情书。\n\n「——好きだった。彼のこと。」她慢慢地说，「ずっと。四月のコーヒーショップからずっと。言おうと思ってた。でも——間に合わなかった。」\n\n——喜欢他。从四月的咖啡店开始就一直。今天本来想告诉他的。但是来不及了。\n\n「そう。」蛍轻声应了一句，「陽菜さんは、ちゃんと言えてなかったんだね。」\n\n——这样啊。陽菜，你还没来得及说出口呢。\n\n窗外的天空已经彻底暗了下去。东京塔在不远处亮着灯，温暖而遥远。\n\n「私は——」蛍的声音，从氧气面罩后缓缓传出来，「私はね——言ったの。一昨日の夜。『怒ってる』って。『でも大丈夫』って。そんなの——違うのに。大丈夫じゃないのに。言っちゃった。」\n\n——我呀。说了。前天的晚上。「我很生气。」「但是没关系。」明明不是的。明明不是没关系。但我还是说了。\n\n陽菜终于伸出手，握住了蛍的手。蛍的手指冰凉。手背上的静脉管，清晰地凸起。\n\n「私ね、小さい頃からずっと思ってたの——自分は長く生きられないから、誰かと一緒になんてなっちゃいけない、って。」蛍的目光停在天花板上，「でもほんとは——なりたかった。なりたくて、たまらなかった。だから——羨ましかった。陽菜さんのこと——すごく。」\n\n——我从小就这样想：因为自己活不久，所以不能和任何人在一起。但其实——我想的。想得不得了。所以很羡慕。羡慕陽菜你。非常。\n\n陽菜低下头。她的发梢掉在蛍的被子上。\n\n「私も——羨ましかった。」陽菜的声音哑了，「蛍ちゃんのこと。あなたは彼の小さい頃を知ってる。母親が作った味噌汁の味まで知ってる。私がどんなに頑張っても——知れないことを、たくさん持ってる。」\n\n——我也很羡慕蛍ちゃん。你知道他小时候的样子。知道他妈妈做的味噌汤是什么味道。有好多东西，我不管怎么努力，都不会知道。\n\n蛍轻轻弯了一下嘴角。然后她说——\n\n「彼、最后に——何か言ったのかな。」\n\n——他最后，有没有说什么。\n\n陽菜摇头。「警察が言ってたのは——最後の瞬間、子供を押した後に——何か、口が動いてたらしい。でも——聞こえなかったって。」\n\n——警察说，最后他推开小孩之后，嘴唇好像动了一下。但没人听到。\n\n两个孩子沉默了很長很長的时间。\n\n然后蛍说：「私、わかるかも。」\n\n——我，大概能猜到。\n\n陽菜看着蛍。\n\n蛍闭上眼，像是在默念什么。嘴唇动了几下。但没有声音。\n\n陽菜没有问她说了什么。\n\n很久很久以后——陽菜在无数个不眠之夜里，反复推演那一秒。他会说什么呢。「行け」——也许是「快去」。也许是某个人的名字。她希望蛍猜到了。又希望蛍没有猜到。因为如果猜到了却没有说出来——说明那个名字是他最后最后的秘密。\n\n晚上九点。陽菜离开了病房。她在走廊里站了一会儿，然后靠着墙壁蹲下来。把脸埋进膝盖里。\n\n她在黑暗里坐了很久。没有发出任何声音。\n\n## 三、蛍 —— 最後の夜\n\n晚上十一点。静子回家取换洗衣物。病房里只剩下蛍一个人。\n\n她让护士帮她把床头摇高了一点。把妈妈留下的便当盒推开——吃不下的。然后她伸手拿过那个牛皮纸包裹。相册。布包了好几层。标签写好了——收件人：高橋陽菜。\n\n她从抽屉里拿了一支铅笔。\n\n然后翻开相册的最后一页。那页原来只写了几行——\n\n「あとがき。」\n「髙橋陽菜さんへ。」\n「お願いがある。」\n\n——有个请求。\n\n她拿着笔。在「お願いがある」的下面，接着写。用力很深，字迹却仍然是轻轻的那种。铅笔灰落在纸上。\n\n「二人とも、彼の未来を——あげられなかった。ごめんね。」\n\n——我们两个，都没能给他未来。对不起。\n\n她把笔放下。重新翻到相册前面需要她写完的地方——第三十七页。那是她贴在相册靠后位置的最后一张照片。昨天才印出来的——迪士尼。水上秀那天，陽菜拍的三人影子。米奇、达菲、米妮。她很仔细地把那张照片的透明薄膜袋贴在页上。\n\n然后她在旁边用铅笔写道：「三月。ディズニー。最後の魔法。——三人でいられて、幸せだった。」\n\n——三月。迪士尼。最后的魔法。——三个人在一起，很幸福。\n\n然后她把相册包好。封上牛皮纸。用透明胶带仔仔细细地把开口贴紧。手指没力，就用手腕顶。\n\n做完这一切之后，她按了呼叫铃。\n\n护士来了。「どうされました——」\n\n「すみません——お水をください。それと——この包みを、一階の宅配ボックスに入れてほしいんです。母が来たら渡そうと思ってたんですけど——今日中に出したいので。」\n\n——对不起，请给我一杯水。还有——请帮我把这个包裹放进一楼的快递箱。本来想让妈妈来的时候转交——但我想今天之内寄出去。\n\n护士看看包裹。又看看蛍的脸色——蒼白，但没发烧。\n\n「わかりました。」\n\n护士走了。\n\n蛍喝了那杯水。然后她把便当盒重新打开，吃了两口饭团。梅干し的。静子握的。饭团已经冷掉了，海苔也软了，米粒也略发干。但她说：「うまい。」\n\n她整理了一下被子。把床上散着的日历翻到三月十五日。手边没有红色笔，就用了桌上的中性笔，没有红墨，只有黑的——但她仍然用力画了一个×。\n\n然后她穿上外套——那件白色的羽绒服，迪士尼穿过的那件——最暖的那件。然后她慢慢下了床。\n\nICU的警报没有响。护士在走廊另一头照顾别的病人。她扶着床沿站起来，走了两步——有点喘，但没事。新的機械瓣膜工作得很认真。每一步的耗时都比常人长三倍，但每一步都落在塑胶地板上，稳而安静。\n\n她推开防火门，走进楼梯间。下楼。一层一层。七楼、六楼、五楼——她扶着栏杆很慢很稳地往下走。\n\n在医院门口，她拦了一辆出租车。司机看着她的脸色，犹豫了一下。她说：「世田谷区——家の近くまで。」\n\n——世田谷区，我家附近。\n\n司机把她送到了巷口。\n\n她付了车费之后还说了声谢谢。司机说：「お大事に。」她点了点头。车门关上之后，她站在原地，看着这条她住了二十年的巷子。\n\n瞬君家的灯暗着。自己家的灯也暗着——妈妈还在医院。路灯还是亮着的。照亮两扇门之间的那条窄巷。窗台上的桔梗花，干枯的根茎还插在盆里。她看着那个花盆看了好一会儿。\n\n然后她没有回家。她转身，往不忍通的方向走。不忍池。那条河的桥洞下。水流不湍急——这个季节不该湍急。但水温很低。三月中旬的河水，还带着冬天末尾的刺骨。\n\n她走到桥边的时候，停下来。东京塔的光芒在远处亮着，和每一天都一样。\n\n她掏出手机。打开LINE。点进和瞬君的聊天记录。最后几条——\n\n「手紙、読んだ。」\n「……」\n「土曜日。ちゃんと行く。でも——ちゃんと帰ってくる。」\n「うん。帰ってきて。」\n\n她的手指在屏幕上停了很久。然后她打了最后一行字——\n\n「私もそっちに行くね。ちょっとだけ——待ってて。」\n\n——我也去那边了。就稍微——等一下。\n\n发送时间：二十三点四十七分。\n\n她把手机放在桥栏上。然后翻过栏杆落进水里的声响，被夜风掩过。水花只溅了一瞬间就平复了。\n\n河面什么都没有留下。\n\n只有月亮很淡很淡地浮在水纹上。\n\n## 四、陽菜 —— 最後の手紙\n\n三月十七日。雨。\n\n高橋陽菜在玄關收到了那件郵件。宅急便。紙箱外面寫著差出人地址：「東京都世田谷区——雨宮静子」。但打開之後，第一張掉出來的不是靜子的字。\n\n是一張白色卡片。蛍的字。\n\n「陽菜さんへ。これは私があげられる、最初で最後のものです。受け取ってください。——雨宮蛍。」\n\n——陽菜，这是我能给你的，最初也是最后的东西。请收下。\n\n陽菜翻開相冊。\n\n第一頁是小孩子时期的瞬和蛍。照片旁边有日期和备注。她一张一张翻过去。翻到在咖啡店——她在自己不知道的時候被人拍了一張和瞬同桌的照片。照片旁边写着：「四月。静流にて。——彼女との始まり。」\n\n浅草寺。隅田川花火。台場。代々木公園。富士山。文化祭。迪士尼——\n\n她的Ins，她的每一张照片。她被保存在一個陌生人的文件夾裡。那個人說：「这些照片里的他，比他自己手机里的都要好。因为是你拍的。」\n\n那个人还说了：「如果有一天我不在了——你能不能帮我，把属于他的那份幸福继续下去呢。」\n\n可是这句话写到一半就停笔了。\n\n下一页是最后一页。那页写着：「二人とも、彼の未来を——あげられなかった。ごめんね。」\n\n陽菜跪在地板上，那张卡片掉在膝盖上。\n\n蛍死了。\n\n消息是絵里告诉她的。「蛍ちゃんが——昨夜、不忍池で——」她当时正在厨房泡茶。茶壶摔在地上。\n\n而现在她看到这句话——「我们两个，都没能给他未来。」淚水從她臉上滑下來。她抱著那本相冊，哭出聲來。哭聲從玄關傳到走廊，穿透了雨聲。\n\n她邊哭邊想——是我害的。如果我不在的话。如果咖啡店那天我没有坐到他对面，如果我不那么频繁地找他说话见面，如果我早一点表白或早一点放弃——那他们两个人是不是就能一直在那个小小的世界里待得更久一点。\n\n不——如果有某一天，我没有对新宿御苑说「我要表白」——他那天就不会出门。如果他不出门——他就不会在那个时间点，那个路口。\n\n她想了很多版本的「如果」。每个版本里，他都活着。每个版本里，蛍也没有跳河。\n\n但现实只有一种版本。\n\n那天晚上，陽菜服下了积攒了一整个春天的安眠药。她曾因为失眠去医院开过——每次一粒，剩下的都放在抽屉最里面。一共四十六粒。\n\n全部吞下去之后，她躺在地板上。怀里抱着那本相册。她说——「待っててね。私もそっちに行くから——」\n\n——等等我。我也去那边了。\n\n然后意識被割断。\n\n絵里发现了她。絵里在半夜给陽菜打电话说晚安，没人接，絵里的直觉让她直接打了幺幺九。救护车来得比任何一辆都急。洗胃、监护、除颤——三次。医生说：「命はとりとめました。しかし——」\n\n——命保住了。但是。\n\n缺氧时间太长。大脑皮层广泛性损伤。病人有意识——但失去了语言能力和自主运动能力。\n\n她从此睁不开眼睛，也动不了任何一根手指。从医学角度来说——她被锁在了自己的身体里。\n\n而在那具不动的身体里，高橋陽菜的意识正在做着漫长的、安静的梦。梦里，她还记得一种感情——那种很深很深、像刻进骨头里的爱和亏欠。她记得自己曾经等过一个人，在那里的樱花等过。也记得自己做了一件对不起别人的事。\n\n但她想不起那个人是谁了。\n\n他的脸、他的声音、他的背影——全部消失成一团很淡很淡的雾。\n\n她也想不起另一个女孩的样子。那个女孩，总是坐在窗台上，抱着书，说话很轻。但长什么样呢——记不得了。\n\n她只记得两个名字——桜井瞬。雨宮蛍。这两个名字每天都在脑海里浮上来，然后沉下去。她不知道它们代表什么。不知道那是爱。那是死亡。那是一本厚厚的、贴满了照片的相册的重量。\n\n而她的家人们，每天来医院看她。母亲握着她的手喊她的名字。父亲安静地坐在床尾。絵里来的时候，会在她耳边说很多很多话——「陽菜，今天樱花全开了。你要醒过来看啊。」\n\n陽菜都听得见。全部听得见。\n\n她想说「ありがとう」。想说「ごめんね」。想说「私、ここにいるよ——ちゃんと生きてるよ。」\n\n但她的嘴唇动不了。她的眼睛睁不开。她的声带发不出任何音节。\n\n她只能听。每一天，每一天，听着窗外的风。听着护士换点滴。听着走廊里家属送走探病后的脚步声。\n\n听着这个世界还在运转的声音。\n\n而她不知道自己在等什么。不知道床边为什么有人哭。不知道窗外樱花开到什么程度了。不知道那个叫桜井瞬的人是不是也在某个地方。不知道那个叫雨宮蛍的人，是不是也不在了。\n\n她知道的只有一件事——\n\n在心底最深的那个角落，有个声音总在重复同一句话。\n\n「对不起。他的未来，我们都没能给他。」\n\n她不记得这是自己写的。不记得这是一本相册的最后一句。不记得这是一个跳河的女孩留给她的最后的字。\n\n但她每天都在默念这句话。像念经。像数羊。像在空无一人的房间里，反复把一支烂熟的曲子回放。\n\n一天。\n\n一年。\n\n很久很久以后。\n\n## 尾声\n\n桜井美咲继承了哥哥的房间。\n\n她收拾书桌的时候，发现了那本料理笔记。是雨宮蛍的字。封面上写着「瞬君の料理ノート。」翻开，五道菜。\n\n1. 味噌汁。2. 玉子烧。3. 咖喱。4. 肉じゃが。5. エビの天ぷら。\n\n第五道旁边有铅笔写的小括号：「瞬君は多分、衣がうまくつけられないと思う。」\n\n——瞬君大概会裹不好面衣。\n\n她翻到最后一页。一张便签纸。蛍的最后一笔——\n\n「瞬君へ。この五つができれば、一人でも生きていける。——蛍。」\n\n——瞬君。会做这五道菜的话，一个人也能活下去。\n\n美咲把笔记本抱在怀里。在空房间里坐了很长时间。窗外，对面二楼空荡荡的窗台上，那盆桔梗不知何时冒出了新的绿芽。\n\n东京的四月。樱前线再次划过世田谷的上空。巷子里的电线杆上，站着一只不知道是第几代的黄鶲。\n\n它叫了一声。和每年春天的叫声一模一样。\n\n（第二十一卷 完）\n\n---\n\n# あとがき\n\n桜井瞬。享年二十岁。遗物：耳机一副，旧书店会员卡一张，料理笔记本一本。\n\n雨宮蛍。享年二十岁。遗物：桔梗花盆一只，日历一本（最后一页被划掉了三月十五日），手机一部（最后一条LINE发给了「瞬君」）。在她房间里，还有那本她从未给任何人看过的《雪国》复本书，夹着一张泛黄的银杏叶标本。\n\n高橋陽菜。无期徒刑。她被锁在一具不听使唤的身体里。触觉、听觉、冷热全部完好。她记得爱和亏欠，却忘了人脸。她的眼皮永远阖着，但她意识完全清醒。医生说她的大脑还在运转——只是被锁住了。\n\n就像她的手、她的嘴、她的全部世界。都被某个残忍的作家用红笔重重写下：「END」。\n\n但她的身边，始终有人陪伴。\n\n絵里每隔一周就来一次。春夏秋冬。每年三月，絵里会从新宿御苑捡一枚刚落下的樱花花瓣夹在陽菜的枕边书里——那是村上春树的《挪威的森林》。因为陽菜曾经说过，这是瞬君书架上最旧的一本。\n\n絵里不知道她能不能听见。但絵里不管。\n\n静子和桜井家的父母偶尔也会来。静子带来蛍种过的桔梗花的种子，分给陽菜的母亲，说可以种在陽菜病房的窗台上——因为蛍以前总把这种花养在窗台上。\n\n美咲偶尔也来。她坐在陽菜床边，什么也不说——只是翻着那本料理笔记本，一页一页。\n\n陽菜听见周围的声音，却听不懂为什么有人来。她的意识在一片没有边界的空间里，反反复复想着那七个字——\n\n「对不起。他的未来——」\n\n下一句是什么来着。\n\n忘了。\n\n再想一遍。\n\n窗外，又一年过去了。世田谷区那条窄巷里，樱花开得和往年一样盛大。对面两扇窗户都空了。但桔梗花——桔梗花还在开。\n\n*「你知道Firefly（萤火虫）的光，只能亮一个夏天。」*\n*「不。」*\n*「它亮过。就够了。」*\n\n（全文完）\n\n---\n\n*El Psy Kongroo.*\n'}

    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // 标题
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // 分段：连续两个换行
  var blocks = html.split(/\n\n+/);
  var result = [];
  for (var i = 0; i < blocks.length; i++) {
    var b = blocks[i].trim();
    if (!b) continue;
    if (/^<h[123]>/.test(b)) {
      result.push(b);
    } else {
      // 段内换行合并
      b = b.replace(/\n/g, '<br>');
      result.push('<p>' + b + '</p>');
    }
  }
  return result.join('\n');
}

VOLUMES.forEach(function(v, i) {
  var a = document.createElement('a');
  a.href = '#';
  a.innerHTML = '<span class="num">' + (i+1) + '.</span>' + v.title.replace(/^第.+卷 /, '');
  a.addEventListener('click', function(e) { e.preventDefault(); openVol(i); });
  volGrid.appendChild(a);
});

function openVol(idx) {
  if (idx < 0 || idx >= VOLUMES.length) return;
  cur = idx;
  home.style.display = 'none';
  reader.style.display = 'block';
  volTitle.textContent = VOLUMES[idx].title;
  document.title = VOLUMES[idx].title + ' - 萤火闪烁时';
  window.scrollTo(0, 0);
  localStorage.setItem(STORAGE, JSON.stringify({i: idx, s: 0}));

  var pt = document.getElementById('prevTop');
  var nt = document.getElementById('nextTop');
  pt.classList.toggle('muted', idx <= 0);
  nt.classList.toggle('muted', idx >= VOLUMES.length - 1);
  pt.onclick = idx > 0 ? function(){openVol(idx-1)} : null;
  nt.onclick = idx < VOLUMES.length-1 ? function(){openVol(idx+1)} : null;

  content.innerHTML = renderMD(VOLUMES[idx].content);

  var pf = document.getElementById('prevFoot');
  var nf = document.getElementById('nextFoot');
  pf.textContent = idx > 0 ? '← 上一卷' : '';
  pf.classList.toggle('muted', idx <= 0);
  pf.onclick = idx > 0 ? function(e){e.preventDefault();openVol(idx-1)} : null;
  nf.textContent = idx < VOLUMES.length-1 ? '下一卷 →' : '';
  nf.classList.toggle('muted', idx >= VOLUMES.length - 1);
  nf.onclick = idx < VOLUMES.length-1 ? function(e){e.preventDefault();openVol(idx+1)} : null;

  var s = JSON.parse(localStorage.getItem(STORAGE) || '{}');
  if (s.i === idx && s.s > 0) requestAnimationFrame(function(){window.scrollTo(0, s.s)});
}

function goHome() {
  cur = -1;
  home.style.display = 'block';
  reader.style.display = 'none';
  document.title = '萤火闪烁时';
  window.scrollTo(0, 0);
}

document.getElementById('homeLink').addEventListener('click', function(e) { e.preventDefault(); goHome(); });
document.getElementById('homeFoot').addEventListener('click', function(e) { e.preventDefault(); goHome(); });

document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (cur >= 0) {
    if (e.key === 'ArrowLeft' && cur > 0) openVol(cur - 1);
    if (e.key === 'ArrowRight' && cur < VOLUMES.length - 1) openVol(cur + 1);
    if (e.key === 'Escape') goHome();
  }
});

var t;
window.addEventListener('scroll', function() {
  clearTimeout(t);
  t = setTimeout(function() {
    if (cur >= 0) localStorage.setItem(STORAGE, JSON.stringify({i: cur, s: window.scrollY}));
  }, 300);
});

var s = JSON.parse(localStorage.getItem(STORAGE) || '{}');
if (s.i != null && s.i >= 0 && s.i < VOLUMES.length) openVol(s.i);
</script>
