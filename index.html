<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>轻小说</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f5f0e8;
  color: #3d3226;
  font-family: Georgia, 'Noto Serif SC', 'STSong', 'Songti SC', serif;
  min-height: 100vh;
}

/* 顶部导航 */
.topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  background: #f5f0e8;
  border-bottom: 1px solid #d4c8b8;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
}

.topbar select {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  font-size: 15px;
  padding: 6px 12px;
  border: 1px solid #c4b8a8;
  border-radius: 6px;
  background: #faf7f0;
  color: #3d3226;
  cursor: pointer;
  max-width: 260px;
  outline: none;
}
.topbar select:focus { border-color: #8b5e3c; }

.topbar .arrow {
  font-size: 18px;
  cursor: pointer;
  color: #8b5e3c;
  padding: 4px 8px;
  border-radius: 4px;
  user-select: none;
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.topbar .arrow:hover { background: #e0d5c0; }
.topbar .arrow.disabled { color: #c4b8a8; cursor: default; }
.topbar .arrow.disabled:hover { background: none; }

/* 阅读区 */
.content {
  max-width: 680px;
  margin: 0 auto;
  padding: 40px 24px 80px;
  font-size: 18px;
  line-height: 1.9;
  letter-spacing: 0.02em;
}

.content h1 {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  font-size: 1.7em;
  font-weight: 700;
  margin-bottom: 0.8em;
  padding-bottom: 0.5em;
  border-bottom: 1px solid #d4c8b8;
  color: #8b5e3c;
  text-align: center;
}

.content h2 {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  font-size: 1.25em;
  font-weight: 600;
  margin: 1.6em 0 0.7em;
}

.content p {
  margin-bottom: 1em;
  text-indent: 2em;
}

/* 底部导航 */
.footer-nav {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 24px 60px;
  display: flex;
  gap: 16px;
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

.footer-nav a {
  flex: 1;
  padding: 10px 16px;
  border: 1px solid #d4c8b8;
  border-radius: 6px;
  color: #8b5e3c;
  text-decoration: none;
  text-align: center;
  font-size: 14px;
  transition: all 0.15s;
}
.footer-nav a:hover { border-color: #8b5e3c; background: #ede6d8; }
.footer-nav a.disabled { color: #c4b8a8; pointer-events: none; }

/* 首页 */
.welcome {
  text-align: center;
  padding: 100px 20px;
  color: #6b5e52;
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.welcome h2 { font-size: 22px; color: #8b5e3c; margin-bottom: 10px; }
.welcome p { font-size: 14px; }

@media (max-width: 600px) {
  .content { font-size: 16px; padding: 24px 16px 60px; }
  .content h1 { font-size: 1.35em; }
  .topbar { gap: 8px; padding: 10px 12px; }
  .topbar select { font-size: 14px; max-width: 200px; }
  .footer-nav { flex-direction: column; padding: 0 16px 40px; }
}
</style>
</head>
<body>

<div class="topbar">
  <span class="arrow" id="prevArrow" title="上一卷">◂</span>
  <select id="volSelect"></select>
  <span class="arrow" id="nextArrow" title="下一卷">▸</span>
</div>

<div class="content" id="content">
  <div class="welcome">
    <h2>选择一卷开始阅读</h2>
    <p>使用顶部下拉菜单或左右箭头切换卷目</p>
  </div>
</div>

<script>
const VOLUMES = [
  { file: '第一卷_静流咖啡店.md', title: '第一卷 静流咖啡店' },
  { file: '第二卷_文学部的午后.md', title: '第二卷 文学部的午后' },
  { file: '第三卷_青梅与闯入者.md', title: '第三卷 青梅与闯入者' },
  { file: '第四卷_浅草寺的签.md', title: '第四卷 浅草寺的签' },
  { file: '第五卷_雨天的便利店.md', title: '第五卷 雨天的便利店' },
  { file: '第六卷_隅田川花火大会.md', title: '第六卷 隅田川花火大会' },
  { file: '第七卷_她的秘密.md', title: '第七卷 她的秘密' },
  { file: '第八卷_台场的摩天轮.md', title: '第八卷 台场的摩天轮' },
  { file: '第九卷_秋叶原的午后.md', title: '第九卷 秋叶原的午后' },
  { file: '第十卷_代代木公园的落叶.md', title: '第十卷 代代木公园的落叶' },
  { file: '第十一卷_下北泽的演出.md', title: '第十一卷 下北泽的演出' },
  { file: '第十二卷_富士山的雪.md', title: '第十二卷 富士山的雪' },
  { file: '第十三卷_病房与告白未遂.md', title: '第十三卷 病房与告白未遂' },
  { file: '第十四卷_涩谷的十字路口.md', title: '第十四卷 涩谷的十字路口' },
  { file: '第十五卷_她的相册.md', title: '第十五卷 她的相册' },
  { file: '第十六卷_迪士尼的魔法.md', title: '第十六卷 迪士尼的魔法' },
  { file: '第十七卷_料理教室.md', title: '第十七卷 料理教室' },
  { file: '第十八卷_书与信.md', title: '第十八卷 书与信' },
  { file: '第十九卷_抉择前夜.md', title: '第十九卷 抉择前夜' },
  { file: '第二十卷_朝日之来ない朝.md', title: '第二十卷 朝日之来ない朝' },
  { file: '第二十一卷_瞬く蛍火.md', title: '第二十一卷 瞬く蛍火' }
];

const STORAGE_KEY = 'novel_reader_v2';
const content = document.getElementById('content');
const volSelect = document.getElementById('volSelect');
const prevArrow = document.getElementById('prevArrow');
const nextArrow = document.getElementById('nextArrow');

let currentIdx = -1;

// 初始化下拉菜单
VOLUMES.forEach((vol, idx) => {
  const opt = document.createElement('option');
  opt.value = idx;
  opt.textContent = vol.title;
  volSelect.appendChild(opt);
});

volSelect.addEventListener('change', () => {
  loadVolume(parseInt(volSelect.value));
});

prevArrow.addEventListener('click', () => {
  if (currentIdx > 0) loadVolume(currentIdx - 1);
});
nextArrow.addEventListener('click', () => {
  if (currentIdx < VOLUMES.length - 1) loadVolume(currentIdx + 1);
});

// 键盘翻页
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (e.key === 'ArrowLeft' && currentIdx > 0) loadVolume(currentIdx - 1);
  if (e.key === 'ArrowRight' && currentIdx < VOLUMES.length - 1) loadVolume(currentIdx + 1);
});

function updateArrows() {
  prevArrow.classList.toggle('disabled', currentIdx <= 0);
  nextArrow.classList.toggle('disabled', currentIdx >= VOLUMES.length - 1);
}

async function loadVolume(idx) {
  if (idx < 0 || idx >= VOLUMES.length) return;
  currentIdx = idx;
  volSelect.value = idx;
  updateArrows();
  document.title = VOLUMES[idx].title;
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ idx, scrollTop: 0 }));

  content.innerHTML = '<p style="text-align:center;color:#8b5e3c;padding:40px;">加载中...</p>';

  try {
    const resp = await fetch(VOLUMES[idx].file);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const md = await resp.text();
    const html = await marked.parse(md);

    content.innerHTML = html;

    // 底部导航
    const nav = document.createElement('div');
    nav.className = 'footer-nav';
    const prev = document.createElement('a');
    prev.href = '#';
    prev.textContent = idx > 0 ? '← ' + VOLUMES[idx - 1].title : '已经是第一卷';
    if (idx <= 0) prev.className = 'disabled';
    prev.addEventListener('click', (e) => { e.preventDefault(); if (idx > 0) loadVolume(idx - 1); });

    const next = document.createElement('a');
    next.href = '#';
    next.textContent = idx < VOLUMES.length - 1 ? VOLUMES[idx + 1].title + ' →' : '已经是最后一卷';
    if (idx >= VOLUMES.length - 1) next.className = 'disabled';
    next.addEventListener('click', (e) => { e.preventDefault(); if (idx < VOLUMES.length - 1) loadVolume(idx + 1); });

    nav.appendChild(prev);
    nav.appendChild(next);
    content.appendChild(nav);

    // 恢复滚动位置
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (saved.idx === idx && saved.scrollTop > 0) {
      requestAnimationFrame(() => window.scrollTo(0, saved.scrollTop));
    }
  } catch (err) {
    content.innerHTML = '<p style="text-align:center;color:#8b5e3c;padding:40px;">加载失败：' + err.message + '</p>';
  }
}

// 保存滚动位置
let scrollTimer;
window.addEventListener('scroll', () => {
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => {
    if (currentIdx >= 0) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ idx: currentIdx, scrollTop: window.scrollY }));
    }
  }, 300);
});

// 恢复上次阅读
const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
if (saved.idx != null && saved.idx >= 0 && saved.idx < VOLUMES.length) {
  loadVolume(saved.idx);
} else {
  updateArrows();
}
</script>
</body>
</html>
